<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 하이퍼 커넥티드 마스터 타임라인 시스템</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --accent-color: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color);
        }

        .title-container { display: flex; align-items: center; gap: 10px; }
        .title-input {
            background: #0f172a; border: 1px solid var(--border-color); color: var(--text-color);
            font-size: 1.2rem; font-weight: 700; padding: 6px 12px; border-radius: 6px; width: 320px;
        }
        .title-input:disabled { background: transparent; border-color: transparent; }

        .control-panel { display: flex; gap: 8px; align-items: center; }
        button {
            background-color: var(--primary-color); color: white; border: none;
            padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: #475569; }
        button.danger { background-color: var(--danger-color); }

        .timeline-board { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .timeline-container-scroll { overflow-x: auto; width: 100%; }
        .timeline-table { display: flex; flex-direction: column; width: max-content; position: relative; }

        /* 🎬 3단 반응형 통합 헤더 스타일 */
        .table-header { display: flex; flex-direction: column; background: #111827; border-bottom: 2px solid var(--border-color); }
        .header-row { display: flex; }
        .header-frozen-zone {
            width: 420px; min-width: 420px; padding-left: 15px; display: flex; align-items: center;
            font-weight: bold; font-size: 0.85rem; color: var(--text-muted); border-right: 2px solid var(--border-color);
            background: #0f172a; position: sticky; left: 0; z-index: 25; height: 36px;
        }
        .header-grid-zone { display: flex; }
        .grid-header-cell {
            border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; color: var(--text-color); background: #111827; height: 36px; cursor: pointer;
        }
        .grid-header-cell:hover { background: var(--primary-color); }
        .grid-header-cell.active-layer { background: #1e1b4b; color: var(--accent-color); }

        /* 행 디자인 */
        .task-row { display: flex; border-bottom: 1px solid var(--border-color); background: var(--card-bg); }
        .task-row.completed { opacity: 0.5; background: #1e293b66; }
        
        .task-left-panel {
            width: 420px; min-width: 420px; padding: 8px 12px; border-right: 2px solid var(--border-color);
            display: flex; align-items: center; gap: 6px; background: #1e293b; position: sticky; left: 0; z-index: 15;
        }
        
        .task-checkbox { width: 16px; height: 16px; cursor: pointer; }
        .toggle-arrow { cursor: pointer; width: 14px; text-align: center; color: var(--accent-color); font-size: 0.8rem; }

        .task-name-wrapper { flex: 1; display: flex; align-items: center; gap: 4px; }
        .task-name-input {
            background: transparent; border: 1px solid transparent; color: var(--text-color);
            font-size: 0.85rem; width: 100%; padding: 4px; border-radius: 4px;
        }
        .task-name-input:disabled { color: var(--text-color); background: transparent; border-color: transparent; }
        .task-name-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; }

        .task-right-track { position: relative; display: flex; background: #0f172a; height: 50px; }
        .track-grid-unit { border-right: 1px dashed rgba(51, 65, 85, 0.25); height: 100%; }

        /* 타임라인 스펙트럼 바 */
        .time-bar-element {
            position: absolute; height: 32px; top: 9px;
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: grab;
        }
        .time-bar-element.child-bar { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .bar-label { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 700; color: white; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 4px; }
        .resizer { width: 6px; height: 100%; background: rgba(255, 255, 255, 0.25); cursor: ew-resize; }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <input type="text" id="main-title" class="title-input" value="🎬 마스터 워크플랜 프로덕션 트래커" disabled>
            <button id="lock-btn" onclick="toggleTitleLock()">🔒 수정</button>
        </div>
        <div class="control-panel">
            <button onclick="addNewRow(null)">➕ 최상위 분류 추가</button>
            <button class="secondary" onclick="adjustZoom(-10)">➖ 축소</button>
            <button class="secondary" onclick="adjustZoom(10)">➕ 확대</button>
            <button class="danger" onclick="resetAllData()">🔄 초기화</button>
        </div>
    </header>

    <div class="timeline-board">
        <div class="timeline-container-scroll">
            <div class="timeline-table">
                <div class="table-header" id="render-header-wrapper"></div>
                <div id="dynamic-rows-container"></div>
            </div>
        </div>
    </div>

    <script>
        // 📍 상하위 유기적 연결을 보장하는 단일 마스터 대형 트리 데이터셋
        let projectTasks = [
            { id: "p1", name: "2026년 메인 영화 프로덕션 플랜", start: 0, end: 4, parentId: null, open: true, checked: false },
            { id: "c1", name: "상반기 프리 시나리오 분석 및 캐릭터 캐스팅", start: 0, end: 2, parentId: "p1", open: true, checked: false },
            { id: "c2", name: "세트장 로케이션 대관 및 인프라 구축", start: 2, end: 4, parentId: "p1", open: true, checked: false }
        ];

        let currentViewMode = 'year'; // year, month, day, hour
        let cellWidth = 85;

        // 마우스 드래그 포인터 캐싱 기어
        let currentDragBarId = null;
        let dragType = null;
        let dragStartX = 0;
        let dragStartLeft = 0;
        let dragStartEnd = 0;

        function init() {
            const saved = localStorage.getItem('connected_timeline_tasks_v4');
            if (saved) projectTasks = JSON.parse(saved);
            renderAll();
        }

        function saveData() {
            localStorage.setItem('connected_timeline_tasks_v4', JSON.stringify(projectTasks));
        }

        function toggleTitleLock() {
            const input = document.getElementById('main-title');
            const btn = document.getElementById('lock-btn');
            if (input.disabled) {
                input.disabled = false; input.focus(); btn.innerText = "🔓 저장";
            } else {
                input.disabled = true; btn.innerText = "🔒 수정"; saveData();
            }
        }

        function getMaxCells() {
            if (currentViewMode === 'year') return 12;  // 12개월
            if (currentViewMode === 'month') return 5;  // 5주차
            if (currentViewMode === 'day') return 7;    // 7일간
            if (currentViewMode === 'hour') return 24 * 12; // 24시간 * 12칸 (5분 단위) = 288칸
            return 12;
        }

        // 📍 소요시간/할애시간으로 매핑 파싱해주는 엔진
        function formatDurationLabel(start, end) {
            let diff = end - start;
            if (currentViewMode === 'year') return `${diff}개월`;
            if (currentViewMode === 'month') return `${diff}주`;
            if (currentViewMode === 'day') return `${diff}일`;
            if (currentViewMode === 'hour') return `${diff * 5}분`;
            return `${diff}칸`;
        }

        // 🎬 3단 헤더 인터페이스 빌더 (원클릭 상하위 레벨 이동 연동)
        function renderHeader() {
            const wrapper = document.getElementById('render-header-wrapper');
            wrapper.innerHTML = '';

            const modes = ['year', 'month', 'day', 'hour'];
            const labels = ["1층: 연간 모드 (월 단위 제어)", "2층: 월간 모드 (주 단위 제어)", "3층: 주간 모드 (일 단위 제어)", "4층: 시간 모드 (5분 마이크로 제어)"];

            modes.forEach((mode, idx) => {
                const row = document.createElement('div');
                row.className = 'header-row';

                const frozen = document.createElement('div');
                frozen.className = `header-frozen-zone ${currentViewMode === mode ? 'active-layer' : ''}`;
                frozen.innerText = labels[idx];
                frozen.onclick = () => { currentViewMode = mode; renderAll(); };
                row.appendChild(frozen);

                const gridZone = document.createElement('div');
                gridZone.className = 'header-grid-zone';

                let totalCells = (mode === 'hour') ? 24 * 12 : (mode === 'day' ? 7 : (mode === 'month' ? 5 : 12));
                let blockWidth = (mode === currentViewMode) ? cellWidth : (getMaxCells() / totalCells) * cellWidth;

                for (let i = 0; i < totalCells; i++) {
                    const cell = document.createElement('div');
                    cell.className = `grid-header-cell ${currentViewMode === mode ? 'active-layer' : ''}`;
                    cell.style.width = `${blockWidth}px`;

                    if (mode === 'year') cell.innerText = `${i+1}월`;
                    else if (mode === 'month') cell.innerText = `${i+1}주차`;
                    else if (mode === 'day') cell.innerText = `${i+1}일차`;
                    else if (mode === 'hour') {
                        if (i % 12 === 0) cell.innerText = `${i / 12}시`;
                        else cell.style.borderRight = "none";
                    }

                    cell.onclick = () => { currentViewMode = mode; renderAll(); };
                    gridZone.appendChild(cell);
                }
                row.appendChild(gridZone);
                wrapper.appendChild(row);
            });
        }

        // 마스터 렌더러
        function renderRows() {
            const container = document.getElementById('dynamic-rows-container');
            container.innerHTML = '';

            const roots = projectTasks.filter(t => !t.parentId);
            let totalCells = getMaxCells();

            function drawTask(task, depth = 0) {
                const row = document.createElement('div');
                row.className = `task-row ${task.checked ? 'completed' : ''}`;

                const left = document.createElement('div');
                left.className = 'task-left-panel';
                if (depth > 0) left.style.paddingLeft = `${20 + depth * 15}px`;

                // ✅ 체크박스 완료 처리 기능 복원
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'task-checkbox';
                cb.checked = task.checked;
                cb.onchange = () => { task.checked = cb.checked; saveData(); renderRows(); };
                left.appendChild(cb);

                // 토글 화살표
                const arrow = document.createElement('span');
                arrow.className = 'toggle-arrow';
                const hasChild = projectTasks.some(t => t.parentId === task.id);
                arrow.innerText = hasChild ? (task.open ? '▼' : '▶') : '•';
                arrow.onclick = () => { task.open = !task.open; renderRows(); };
                left.appendChild(arrow);

                // 엔터 입력 및 수정 락 시스템 가동 인풋 필드
                const nameWrapper = document.createElement('div');
                nameWrapper.className = 'task-name-wrapper';
                
                const input = document.createElement('input');
                input.className = 'task-name-input';
                input.value = task.name;
                input.disabled = true;

                // 엔터키 입력 시 자동 세이브 락 기능
                input.onkeydown = (e) => {
                    if (e.key === 'Enter') {
                        task.name = input.value;
                        input.disabled = true;
                        editBtn.innerText = "수정";
                        saveData();
                        renderRows();
                    }
                };

                const editBtn = document.createElement('button');
                editBtn.className = 'secondary';
                editBtn.style.padding = '2px 6px'; editBtn.style.fontSize = '0.7rem';
                editBtn.innerText = "수정";
                editBtn.onclick = () => {
                    if (input.disabled) {
                        input.disabled = false; input.focus(); editBtn.innerText = "입력";
                    } else {
                        task.name = input.value; input.disabled = true; editBtn.innerText = "수정"; saveData(); renderRows();
                    }
                };

                nameWrapper.appendChild(input);
                nameWrapper.appendChild(editBtn);
                left.appendChild(nameWrapper);

                // ➕ 자식 하위 목록 만들기 버튼 복원
                if (depth === 0) {
                    const childBtn = document.createElement('button');
                    childBtn.className = 'secondary';
                    childBtn.style.padding = '2px 6px'; childBtn.style.fontSize = '0.7rem'; childBtn.innerText = '+ 자식';
                    childBtn.onclick = () => addNewRow(task.id);
                    left.appendChild(childBtn);
                }

                const delBtn = document.createElement('button');
                delBtn.className = 'danger';
                delBtn.style.padding = '2px 6px'; delBtn.style.fontSize = '0.7rem'; delBtn.innerText = '✕';
                delBtn.onclick = () => deleteRow(task.id);
                left.appendChild(delBtn);

                row.appendChild(left);

                // 우측 트랙 생성
                const rightTrack = document.createElement('div');
                rightTrack.className = 'task-right-track';
                rightTrack.style.width = `${totalCells * cellWidth}px`;

                for (let i = 0; i < totalCells; i++) {
                    const unit = document.createElement('div');
                    unit.className = 'track-grid-unit';
                    unit.style.width = `${cellWidth}px`;
                    rightTrack.appendChild(unit);
                }

                // 스케줄 바 바인딩
                const bar = document.createElement('div');
                bar.className = `time-bar-element ${task.parentId ? 'child-bar' : ''}`;
                bar.style.left = `${task.start * cellWidth}px`;
                bar.style.width = `${(task.end - task.start) * cellWidth}px`;

                const hL = document.createElement('div'); hL.className = 'resizer';
                const lbl = document.createElement('div'); lbl.className = 'bar-label'; 
                lbl.innerText = `[${formatDurationLabel(task.start, task.end)}] ${task.name}`;
                const hR = document.createElement('div'); hR.className = 'resizer';

                bar.appendChild(hL); bar.appendChild(lbl); bar.appendChild(hR);

                hL.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'left', e.clientX); };
                hR.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'right', e.clientX); };
                lbl.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'move', e.clientX); };

                rightTrack.appendChild(bar);
                row.appendChild(rightTrack);
                container.appendChild(row);

                if (task.open) {
                    projectTasks.filter(t => t.parentId === task.id).forEach(c => drawTask(c, depth + 1));
                }
            }

            roots.forEach(r => drawTask(r, 0));
        }

        // 📍 하위 태스크 조절 시 상위 자동 연동 구조 연산 파이프라인 (Upward Rollup)
        function syncParentBounds(childId) {
            const child = projectTasks.find(t => t.id === childId);
            if (!child || !child.parentId) return;

            const parent = projectTasks.find(t => t.id === child.parentId);
            if (!parent) return;

            const siblings = projectTasks.filter(t => t.parentId === parent.id);
            if (siblings.length === 0) return;

            let minStart = Math.min(...siblings.map(s => s.start));
            let maxEnd = Math.max(...siblings.map(s => s.end));

            // 하위 일정이 부모의 한계 영역을 밀어내도록 유기적 자동 동기화
            parent.start = minStart;
            parent.end = maxEnd;

            // 재귀적으로 최상위 할아버지 분류 구조까지 밀어 올림
            if (parent.parentId) syncParentBounds(parent.id);
        }

        function startDrag(id, type, x) {
            currentDragBarId = id; dragType = type; dragStartX = x;
            const task = projectTasks.find(t => t.id === id);
            dragStartLeft = task.start; dragStartEnd = task.end;

            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', endDrag);
        }

        function onDragMove(e) {
            if (!currentDragBarId) return;
            const task = projectTasks.find(t => t.id === currentDragBarId);
            let totalCells = getMaxCells();

            let deltaX = e.clientX - dragStartX;
            let cellDelta = Math.round(deltaX / cellWidth);

            if (dragType === 'move') {
                let ns = dragStartLeft + cellDelta;
                let ne = dragStartEnd + cellDelta;
                if (ns >= 0 && ne <= totalCells) { task.start = ns; task.end = ne; }
            } else if (dragType === 'left') {
                let ns = dragStartLeft + cellDelta;
                if (ns >= 0 && ns < task.end) task.start = ns;
            } else if (dragType === 'right') {
                let ne = dragStartEnd + cellDelta;
                if (ne > task.start && ne <= totalCells) task.end = ne;
            }

            if (task.parentId) {
                syncParentBounds(task.id);
            }
            renderRows();
        }

        function endDrag() {
            currentDragBarId = null;
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', endDrag);
            saveData();
            renderRows();
        }

        function addNewRow(parentId = null) {
            let s = 0, e = 2;
            if (parentId) {
                const p = projectTasks.find(t => t.id === parentId);
                if (p) { s = p.start; e = Math.min(p.end, p.start + 1); }
            }
            projectTasks.push({
                id: "t_" + Date.now(),
                name: parentId ? "↳ 세부 워크포커스 하위 태스크" : "새 마스터 분류 프로젝트 범주 항목",
                start: s,
                end: e,
                parentId: parentId,
                open: true,
                checked: false
            });
            if (parentId) syncParentBounds("t_" + Date.now());
            saveData(); renderRows();
        }

        function deleteRow(id) {
            if (confirm("이 항목을 정말 제거할까요?")) {
                projectTasks = projectTasks.filter(t => t.id !== id && t.parentId !== id);
                saveData(); renderRows();
            }
        }

        function adjustZoom(amt) {
            cellWidth = Math.max(35, Math.min(200, cellWidth + amt));
            renderAll();
        }

        function resetAllData() {
            if (confirm("정말 모든 데이터를 초기화하시겠습니까?")) {
                localStorage.clear(); location.reload();
            }
        }

        function renderAll() {
            renderHeader();
            renderRows();
        }

        window.onload = init;
    </script>
</body>
</html>
