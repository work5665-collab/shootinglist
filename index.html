<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 On-Set Tracker Pro (초정밀 타임라인)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color);
        }

        .title-container { display: flex; align-items: center; gap: 8px; }
        .title-input {
            background: transparent; border: 1px solid transparent; color: var(--text-color);
            font-size: 1.2rem; font-weight: 700; padding: 6px 12px; border-radius: 6px; width: 340px; cursor: pointer;
        }
        .title-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; cursor: text; }

        .navigation-trail {
            display: flex; align-items: center; gap: 6px; font-size: 0.9rem; background: #0f172a; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color);
        }
        .trail-link { color: #f59e0b; cursor: pointer; font-weight: bold; }
        .trail-link:hover { text-decoration: underline; }

        .control-panel { display: flex; gap: 8px; align-items: center; }
        button {
            background-color: var(--primary-color); color: white; border: none;
            padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: #475569; }
        button.danger { background-color: var(--danger-color); }

        .timeline-board { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .timeline-container-scroll { overflow-x: auto; width: 100%; }
        .timeline-table { display: flex; flex-direction: column; width: max-content; position: relative; }

        .table-header { display: flex; flex-direction: column; background: #111827; border-bottom: 2px solid var(--border-color); }
        .header-row { display: flex; }
        .header-frozen-zone {
            width: 380px; min-width: 380px; padding-left: 15px; display: flex; align-items: center;
            font-weight: bold; font-size: 0.85rem; color: var(--text-muted); border-right: 2px solid var(--border-color);
            background: #0f172a; position: sticky; left: 0; z-index: 25; height: 42px;
        }
        
        .header-grid-zone { display: flex; }
        
        .main-time-cell {
            border-right: 2px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: bold; color: var(--text-color); background: #111827; height: 42px; cursor: pointer;
        }
        .main-time-cell:hover { background: #1e293b; }
        
        .sub-tick-row { display: flex; background: #0b0f19; height: 24px; border-bottom: 1px solid var(--border-color); }
        .sub-tick-cell {
            border-right: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: var(--text-muted); font-family: monospace; cursor: pointer;
        }
        .sub-tick-cell:hover { background: #1e293b; color: white; }

        .task-row { display: flex; border-bottom: 1px solid var(--border-color); background: var(--card-bg); position: relative; }
        .task-row.completed-shading { opacity: 0.4; background: #0f172a; } 
        .task-row.drag-over-active { background: #1e3a8a !important; border-left: 4px solid #3b82f6; }
        .task-row.drag-left-escape { border-left: 6px solid #ef4444 !important; background: #3b0712 !important; }

        .task-left-panel {
            width: 380px; min-width: 380px; padding: 6px 8px; border-right: 2px solid var(--border-color);
            display: flex; align-items: center; gap: 6px; background: #1e293b; position: sticky; left: 0; z-index: 15;
        }

        .row-grab-handle {
            cursor: grab; color: var(--text-muted); font-size: 1rem; padding: 0 4px; display: flex; align-items: center;
        }
        .row-grab-handle:active { cursor: grabbing; color: white; }

        .indent-space { display: inline-block; width: 14px; }
        .toggle-arrow { cursor: pointer; color: #f59e0b; font-weight: bold; padding: 0 2px; font-size: 0.8rem; }
        .task-checkbox { width: 16px; height: 16px; cursor: pointer; z-index: 5; }
        
        .color-dot-palette { display: flex; gap: 2px; }
        .color-dot { width: 8px; height: 8px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        .task-name-input {
            background: transparent; border: 1px solid transparent; color: var(--text-color);
            font-size: 0.8rem; flex: 1; padding: 4px; border-radius: 4px; font-weight: bold; cursor: pointer; min-width: 0;
        }
        .task-name-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; cursor: text; }

        .task-right-track { position: relative; display: flex; background: #0f172a; height: 52px; }
        .track-grid-unit { border-right: 1px dashed rgba(51, 65, 85, 0.2); height: 100%; }

        .time-bar-element {
            position: absolute; height: 34px; top: 9px;
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; z-index: 5;
            margin-left: 6px; margin-right: 6px;
        }
        .time-bar-element.rest-auto-bar {
            background: repeating-linear-gradient(45deg, #22293a, #22293a 10px, #334155 10px, #334155 20px) !important;
            opacity: 0.85; border: 1px dashed #64748b; z-index: 2; pointer-events: auto;
        }

        .bar-label { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 700; color: white; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 4px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .resizer { width: 8px; height: 100%; background: rgba(255, 255, 255, 0.2); cursor: ew-resize; z-index: 10; }
        .resizer:hover { background: rgba(255, 255, 255, 0.5); }

        .archive-section { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-top: 10px; }
        .archive-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .archive-content { display: none; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .archive-content.open { display: block; }
        
        .archived-item { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-bottom: 1px solid #334155; background: #111827; border-radius: 6px; margin-bottom: 8px; }
        .archive-top { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <input type="text" id="main-title" class="title-input" value="🎬 On-Set Tracker Pro (초정밀 타임라인)">
        </div>
        <div class="navigation-trail" id="nav-trail-container"></div>
        <div class="control-panel">
            <button onclick="addNewRow()">➕ 최상위 마스터 추가</button>
            <button class="secondary" onclick="adjustZoom(-8)">➖ 축소</button>
            <button class="secondary" onclick="adjustZoom(8)">➕ 확대</button>
            <button class="danger" onclick="resetAllData()">🔄 초기화</button>
        </div>
    </header>

    <div class="timeline-board">
        <div class="timeline-container-scroll">
            <div class="timeline-table">
                <div class="table-header" id="master-render-header"></div>
                <div id="dynamic-rows-container"></div>
            </div>
        </div>
    </div>

    <div class="archive-section">
        <div class="archive-header" onclick="toggleArchiveView()">
            <h3>📦 완료된 항목 프로덕션 피드백</h3>
            <div style="background:#334155; padding:4px 10px; border-radius:6px; font-size:0.8rem; color:#f59e0b; font-weight:bold;" id="archive-count-badge">0개 완료됨</div>
        </div>
        <div class="archive-content" id="archive-content-panel"></div>
    </div>

    <script>
        const MONTH_DAYS = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        const MONTH_STARTS = [];
        let acc = 0;
        for(let m=0; m<12; m++) {
            MONTH_STARTS.push(acc);
            acc += MONTH_DAYS[m];
        }

        let state = {
            viewMode: 'ALL', 
            focusMonth: 0,   
            focusWeek: 0,    
            focusDay: 0,     
            projectFocusId: null, 
            cellWidth: 40, 
            titleBackup: "",
            inputBackups: {},
            collapsedNodes: {},
            tasks: [
                { id: "p-1", parentId: null, name: "새로운 최상위 마스터 공정", start: 0, end: 120, color: "#3b82f6", checked: false },
                { id: "p-2", parentId: "p-1", name: "└ 세부 서브 태스크 라인 1", start: 0, end: 45, color: "#a855f7", checked: false },
                { id: "p-3", parentId: "p-1", name: "└ 세부 서브 태스크 라인 2", start: 60, end: 120, color: "#a855f7", checked: false }
            ]
        };

        const PALETTE = ["#3b82f6", "#a855f7", "#eab308", "#10b981", "#ef4444"];
        const DAYS_OF_WEEK = ["일", "월", "화", "수", "목", "금", "토"];

        function getDayOfWeekString(dayIndex) {
            let d = new Date(2026, 0, dayIndex + 1);
            return DAYS_OF_WEEK[d.getDay()];
        }

        function getWeeksMapOfMonth(mIdx) {
            let totalDays = MONTH_DAYS[mIdx];
            let startDayIdx = MONTH_STARTS[mIdx];
            let weeks = [];
            let current = [];
            for (let d = 0; d < totalDays; d++) {
                current.push(startDayIdx + d);
                if (current.length === 7 || d === totalDays - 1) {
                    weeks.push(current);
                    current = [];
                }
            }
            return weeks;
        }

        function init() {
            const saved = localStorage.getItem('onset_tracker_absolute_v25');
            if (saved) state = JSON.parse(saved);
            setupTitleInput();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('onset_tracker_absolute_v25', JSON.stringify(state));
        }

        function setupTitleInput() {
            const titleInput = document.getElementById('main-title');
            titleInput.onfocus = () => { state.titleBackup = titleInput.value; };
            titleInput.onblur = () => { titleInput.value = state.titleBackup; }; 
            titleInput.onkeydown = (e) => {
                if (e.key === 'Enter') { state.titleBackup = titleInput.value; titleInput.blur(); saveData(); }
                else if (e.key === 'Escape') { titleInput.value = state.titleBackup; titleInput.blur(); }
            };
        }

        function renderTrail() {
            const container = document.getElementById('nav-trail-container');
            container.innerHTML = '';
            let html = `<span class="trail-link" onclick="clearProjectFocus(); changeView('ALL')">🏠 2026년 전체</span>`;
            
            if (state.viewMode === 'MONTH' || state.viewMode === 'WEEK' || state.viewMode === 'DAY') {
                html += ` <span>&gt;</span> <span class="trail-link" onclick="changeView('MONTH', ${state.focusMonth})">${state.focusMonth + 1}월</span>`;
            }
            if (state.viewMode === 'WEEK' || state.viewMode === 'DAY') {
                html += ` <span>&gt;</span> <span class="trail-link" onclick="changeView('WEEK', ${state.focusMonth}, ${state.focusWeek})">${state.focusWeek + 1}주차</span>`;
            }
            if (state.viewMode === 'DAY') {
                let weeks = getWeeksMapOfMonth(state.focusMonth);
                let dayAbs = weeks[state.focusWeek][state.focusDay];
                let dateNum = dayAbs - MONTH_STARTS[state.focusMonth] + 1;
                html += ` <span>&gt;</span> <span class="trail-link">${dateNum}일 초정밀 24h</span>`;
            }
            if (state.projectFocusId) {
                let pTask = state.tasks.find(t => t.id === state.projectFocusId);
                if (pTask) {
                    html += ` <span style="color:#2dd4bf; margin-left:6px; font-weight:bold;">[🎯 집중뷰: ${pTask.name}]</span> <span class="trail-link" style="color:var(--danger-color);" onclick="clearProjectFocus()">✕ 해제</span>`;
                }
            }
            container.innerHTML = html;
        }

        function clearProjectFocus() { state.projectFocusId = null; saveData(); renderAll(); }
        function changeView(mode, m = 0, w = 0, d = 0) {
            state.viewMode = mode; state.focusMonth = m; state.focusWeek = w; state.focusDay = d;
            if (mode === 'DAY') state.cellWidth = 75; // 일단위 뷰에서는 가독성을 위해 셀 기본크기 보정
            renderAll();
        }

        function getActiveTimeRange() {
            if (state.viewMode === 'ALL') return { start: 0, end: 365 };
            if (state.viewMode === 'MONTH') return { start: MONTH_STARTS[state.focusMonth], end: MONTH_STARTS[state.focusMonth] + MONTH_DAYS[state.focusMonth] };
            if (state.viewMode === 'WEEK') {
                let weeks = getWeeksMapOfMonth(state.focusMonth);
                let currentWeek = weeks[state.focusWeek];
                return { start: currentWeek[0], end: currentWeek[currentWeek.length - 1] + 1 };
            }
            if (state.viewMode === 'DAY') {
                // 일단위 뷰는 하루(1일)를 24시간 범위로 매핑
                return { start: 0, end: 24 };
            }
        }

        function renderHeader() {
            const wrapper = document.getElementById('master-render-header'); wrapper.innerHTML = '';
            const row1 = document.createElement('div'); row1.className = 'header-row';
            const row2 = document.createElement('div'); row2.className = 'header-row';
            const f1 = document.createElement('div'); f1.className = 'header-frozen-zone'; f1.innerText = "진행 단계 / 컷 목록";
            const f2 = document.createElement('div'); f2.className = 'header-frozen-zone'; f2.innerText = "시간 스케일 타임라인 연동";
            row1.appendChild(f1); row2.appendChild(f2);
            const g1 = document.createElement('div'); g1.className = 'header-grid-zone';
            const g2 = document.createElement('div'); g2.className = 'header-grid-zone';

            if (state.viewMode === 'ALL') {
                for (let m = 0; m < 12; m++) {
                    let mDays = MONTH_DAYS[m];
                    const cell = document.createElement('div'); cell.className = 'main-time-cell'; cell.style.width = `${state.cellWidth * mDays}px`;
                    cell.innerText = `${m + 1}월`; cell.onclick = () => changeView('MONTH', m); g1.appendChild(cell);
                    
                    let weeks = getWeeksMapOfMonth(m);
                    weeks.forEach((wDays, wIdx) => {
                        const sub = document.createElement('div'); sub.className = 'sub-tick-cell'; sub.style.width = `${state.cellWidth * wDays.length}px`; sub.innerText = `${wIdx + 1}주`;
                        sub.onclick = () => changeView('WEEK', m, wIdx); g2.appendChild(sub);
                    });
                }
            } else if (state.viewMode === 'MONTH') {
                const cell = document.createElement('div'); cell.className = 'main-time-cell'; cell.style.width = `${state.cellWidth * MONTH_DAYS[state.focusMonth]}px`;
                cell.innerText = `${state.focusMonth + 1}월 집중 스케일`; cell.onclick = () => changeView('ALL'); g1.appendChild(cell);
                let weeks = getWeeksMapOfMonth(state.focusMonth);
                for (let d = 0; d < MONTH_DAYS[state.focusMonth]; d++) {
                    let absDay = MONTH_STARTS[state.focusMonth] + d;
                    const sub = document.createElement('div'); sub.className = 'sub-tick-cell'; sub.style.width = `${state.cellWidth}px`;
                    let yoil = getDayOfWeekString(absDay); sub.innerHTML = `${d + 1}<span style="font-size:0.55rem;color:var(--text-muted);">(${yoil})</span>`;
                    let wIdx = weeks.findIndex(w => w.includes(absDay)); sub.onclick = () => changeView('WEEK', state.focusMonth, wIdx); g2.appendChild(sub);
                }
            } else if (state.viewMode === 'WEEK') {
                let weeks = getWeeksMapOfMonth(state.focusMonth); let currentWeekDays = weeks[state.focusWeek];
                const cell = document.createElement('div'); cell.className = 'main-time-cell'; cell.style.width = `${state.cellWidth * currentWeekDays.length}px`;
                cell.innerText = `${state.focusMonth + 1}월 ${state.focusWeek + 1}주차 상세 (클릭 시 일간 진입)`; cell.onclick = () => changeView('MONTH', state.focusMonth); g1.appendChild(cell);
                currentWeekDays.forEach((absDay, dIdx) => {
                    const sub = document.createElement('div'); sub.className = 'sub-tick-cell'; sub.style.width = `${state.cellWidth}px`;
                    let dateNum = absDay - MONTH_STARTS[state.focusMonth] + 1; let yoil = getDayOfWeekString(absDay);
                    sub.innerHTML = `${dateNum}일<span style="font-size:0.55rem;color:var(--text-muted);">(${yoil})</span>`;
                    sub.onclick = () => changeView('DAY', state.focusMonth, state.focusWeek, dIdx);
                    g2.appendChild(sub);
                });
            } else if (state.viewMode === 'DAY') {
                // 🛠️ 일단위 집중뷰: 24시간 + 5분 단위 분할 렌더링
                for (let h = 0; h < 24; h++) {
                    const cell = document.createElement('div'); cell.className = 'main-time-cell'; cell.style.width = `${state.cellWidth * 12}px`; // 1시간 = 5분짜리 12개
                    cell.innerText = `${h}시`; g1.appendChild(cell);
                    
                    for (let min = 0; min < 60; min += 5) {
                        const sub = document.createElement('div'); sub.className = 'sub-tick-cell'; sub.style.width = `${state.cellWidth}px`;
                        sub.innerText = `${min === 0 ? '00' : min}분`; g2.appendChild(sub);
                    }
                }
            }
            row1.appendChild(g1); row2.appendChild(g2); wrapper.appendChild(row1); wrapper.appendChild(row2);
        }

        function getDepth(task) {
            let depth = 0; let p = state.tasks.find(t => t.id === task.parentId);
            while(p) { depth++; p = state.tasks.find(t => t.id === p.parentId); }
            return depth;
        }

        function isAncestorCollapsed(task) {
            let p = state.tasks.find(t => t.id === task.parentId);
            while(p) { if (state.collapsedNodes[p.id]) return true; p = state.tasks.find(t => t.id === p.parentId); }
            return false;
        }

        function isFilteredByProjectFocus(task) {
            if (!state.projectFocusId) return false;
            if (task.id === state.projectFocusId) return false;
            let p = state.tasks.find(t => t.id === task.parentId);
            while(p) { if (p.id === state.projectFocusId) return false; p = state.tasks.find(t => t.id === p.parentId); }
            return true;
        }

        function getColorByDepth(depth) {
            return PALETTE[depth % PALETTE.length];
        }

        function updateParentTimeChain(parentId) {
            if (!parentId) return;
            let parent = state.tasks.find(t => t.id === parentId);
            if (!parent) return;
            let children = state.tasks.filter(t => t.parentId === parentId);
            if (children.length > 0) {
                parent.start = Math.min(...children.map(c => c.start));
                parent.end = Math.max(...children.map(c => c.end));
            }
            if (parent.parentId) updateParentTimeChain(parent.parentId);
        }

        function moveAllChildrenSet(parentId, delta) {
            let children = state.tasks.filter(t => t.parentId === parentId);
            children.forEach(c => {
                c.start += delta; c.end += delta;
                moveAllChildrenSet(c.id, delta); 
            });
        }

        let rowDragSourceId = null;
        function onRowDragStart(e, id) { rowDragSourceId = id; e.dataTransfer.effectAllowed = "move"; }

        function onRowDragOver(e, targetId) {
            e.preventDefault(); if (rowDragSourceId === targetId) return;
            const targetRow = document.getElementById(`row-node-${targetId}`); if (!targetRow) return;
            // 🛠️ 왼쪽 패널 근처로 드래그 유도 시 계층 탈출 트리거 활성화
            if (e.clientX < 290) {
                targetRow.classList.remove('drag-over-active'); targetRow.classList.add('drag-left-escape');
            } else {
                targetRow.classList.remove('drag-left-escape'); targetRow.classList.add('drag-over-active');
            }
        }

        function onRowDragLeave(targetId) {
            const targetRow = document.getElementById(`row-node-${targetId}`);
            if (targetRow) { targetRow.classList.remove('drag-over-active'); targetRow.classList.remove('drag-left-escape'); }
        }

        function onRowDrop(e, targetId) {
            e.preventDefault();
            const targetRow = document.getElementById(`row-node-${targetId}`);
            if (targetRow) { targetRow.classList.remove('drag-over-active'); targetRow.classList.remove('drag-left-escape'); }
            if (!rowDragSourceId || rowDragSourceId === targetId) return;

            let sourceTask = state.tasks.find(t => t.id === rowDragSourceId);
            let targetTask = state.tasks.find(t => t.id === targetId);
            if (!sourceTask || !targetTask) return;

            let oldParentId = sourceTask.parentId;
            let p = targetTask; let cyclical = false;
            while (p) { if (p.id === rowDragSourceId) { cyclical = true; break; } p = state.tasks.find(t => t.id === p.parentId); }

            if (!cyclical) {
                // 🛠️ [복원] 좌측으로 당기면 소속을 해제하고 상위 레벨(부모의 형제레벨)로 탈출시킴
                if (e.clientX < 290) { sourceTask.parentId = targetTask.parentId; } 
                else { sourceTask.parentId = targetId; }
                updateParentTimeChain(oldParentId); updateParentTimeChain(sourceTask.parentId);
                saveData(); renderAll();
            }
            rowDragSourceId = null;
        }

        function duplicateTask(taskId) {
            let src = state.tasks.find(t => t.id === taskId); if (!src) return;
            let newId = "p_" + Date.now() + "_" + Math.floor(Math.random()*1000);
            state.tasks.push({
                id: newId, parentId: src.parentId, name: src.name + " (복사본)",
                start: src.start, end: src.end, color: src.color, checked: false
            });
            updateParentTimeChain(src.parentId); saveData(); renderAll();
        }

        function renderRows() {
            const container = document.getElementById('dynamic-rows-container'); container.innerHTML = '';
            let timeConfig = getActiveTimeRange();
            
            // 일단위 뷰에서는 24시간 * 12칸(5분 단위) = 288개 셀 구조
            let totalVisibleUnits = (state.viewMode === 'DAY') ? 288 : (timeConfig.end - timeConfig.start);

            let sortedTasks = [...state.tasks].sort((a, b) => a.start - b.start);
            let treeSorted = [];
            function buildTree(pId) { sortedTasks.filter(t => t.parentId === pId).forEach(t => { treeSorted.push(t); buildTree(t.id); }); }
            buildTree(null);

            if (state.projectFocusId) {
                treeSorted = [];
                let rootFocus = state.tasks.find(t => t.id === state.projectFocusId);
                if (rootFocus) {
                    treeSorted.push(rootFocus);
                    function buildSubTree(pId) { sortedTasks.filter(t => t.parentId === pId).forEach(t => { treeSorted.push(t); buildSubTree(t.id); }); }
                    buildSubTree(state.projectFocusId);
                }
            }

            treeSorted.forEach(task => {
                if (isAncestorCollapsed(task) || (state.projectFocusId && isFilteredByProjectFocus(task))) return;

                let isParentNode = state.tasks.some(t => t.parentId === task.id);
                let depth = getDepth(task);
                task.color = getColorByDepth(depth); 

                const row = document.createElement('div');
                row.className = `task-row ${task.checked ? 'completed-shading' : ''}`;
                row.id = `row-node-${task.id}`;
                row.ondragover = (e) => onRowDragOver(e, task.id);
                row.ondragleave = () => onRowDragLeave(task.id);
                row.ondrop = (e) => onRowDrop(e, task.id);

                const left = document.createElement('div'); left.className = 'task-left-panel';
                const grabHandle = document.createElement('div'); grabHandle.className = 'row-grab-handle';
                grabHandle.innerText = "☰"; grabHandle.draggable = true;
                grabHandle.ondragstart = (e) => onRowDragStart(e, task.id);
                left.appendChild(grabHandle);

                if (state.projectFocusId) {
                    let rootFocusTask = state.tasks.find(t => t.id === state.projectFocusId);
                    let rootDepth = rootFocusTask ? getDepth(rootFocusTask) : 0;
                    depth = Math.max(0, depth - rootDepth);
                }
                for(let d=0; d<depth; d++) {
                    let space = document.createElement('span'); space.className = 'indent-space'; left.appendChild(space);
                }

                if (isParentNode) {
                    const arrow = document.createElement('span'); arrow.className = 'toggle-arrow';
                    arrow.innerText = state.collapsedNodes[task.id] ? "▶" : "▼";
                    arrow.onclick = (e) => {
                        e.stopPropagation(); state.collapsedNodes[task.id] = !state.collapsedNodes[task.id];
                        saveData(); renderRows();
                    };
                    left.appendChild(arrow);
                } else {
                    let space = document.createElement('span'); space.className = 'indent-space'; left.appendChild(space);
                }

                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'task-checkbox';
                cb.checked = task.checked; cb.onchange = () => { task.checked = cb.checked; saveData(); renderAll(); };
                left.appendChild(cb);

                const pal = document.createElement('div'); pal.className = 'color-dot-palette';
                PALETTE.forEach(c => {
                    const dot = document.createElement('div'); dot.className = 'color-dot'; dot.style.backgroundColor = c;
                    dot.onclick = () => { task.color = c; saveData(); renderRows(); }; pal.appendChild(dot);
                });
                left.appendChild(pal);

                const nameInput = document.createElement('input'); nameInput.className = 'task-name-input';
                nameInput.value = task.name;
                nameInput.onfocus = () => { state.inputBackups[task.id] = nameInput.value; };
                nameInput.onblur = () => { nameInput.value = state.inputBackups[task.id]; };
                nameInput.onkeydown = (e) => {
                    if (e.key === 'Enter') {
                        state.inputBackups[task.id] = nameInput.value; task.name = nameInput.value; 
                        nameInput.blur(); saveData(); renderAll();
                    } else if (e.key === 'Escape') { nameInput.value = state.inputBackups[task.id]; nameInput.blur(); }
                };
                left.appendChild(nameInput);

                const dupBtn = document.createElement('button'); dupBtn.style.padding = '3px 5px'; dupBtn.style.fontSize = '0.7rem'; dupBtn.style.backgroundColor = '#4b5563'; dupBtn.innerText = "📋";
                dupBtn.onclick = () => duplicateTask(task.id); left.appendChild(dupBtn);

                const subAddBtn = document.createElement('button'); subAddBtn.style.padding = '3px 5px'; subAddBtn.style.fontSize = '0.7rem'; subAddBtn.innerText = "➕";
                subAddBtn.onclick = () => { addChildRow(task.id); }; left.appendChild(subAddBtn);

                const delBtn = document.createElement('button'); delBtn.className = 'danger'; delBtn.style.padding = '3px 5px'; delBtn.innerText = "✕";
                delBtn.onclick = () => { 
                    let pId = task.parentId; state.tasks = state.tasks.filter(t => t.id !== task.id); 
                    if(pId) updateParentTimeChain(pId); saveData(); renderAll(); 
                };
                left.appendChild(delBtn);
                row.appendChild(left);

                const rightTrack = document.createElement('div'); rightTrack.className = 'task-right-track';
                rightTrack.style.width = `${totalVisibleUnits * state.cellWidth}px`;
                for (let i = 0; i < totalVisibleUnits; i++) {
                    const unit = document.createElement('div'); unit.className = 'track-grid-unit'; unit.style.width = `${state.cellWidth}px`;
                    rightTrack.appendChild(unit);
                }

                // 🛠️ [정밀 교정] 동일 줄 안에서 항목과 항목 사이에만 정확하게 자동 휴식 바 렌더링
                let siblings = state.tasks.filter(t => t.parentId === task.parentId).sort((a,b)=>a.start - b.start);
                let currentIdx = siblings.findIndex(s => s.id === task.id);
                if (currentIdx > 0) {
                    let prevSibling = siblings[currentIdx - 1];
                    if (prevSibling.end < task.start) {
                        let rStart = Math.max(timeConfig.start, prevSibling.end);
                        let rEnd = Math.min(timeConfig.end, task.start);
                        if (rStart < rEnd && state.viewMode !== 'DAY') {
                            const restBar = document.createElement('div');
                            restBar.className = 'time-bar-element rest-auto-bar';
                            restBar.style.left = `${(rStart - timeConfig.start) * state.cellWidth}px`;
                            restBar.style.width = `${((rEnd - rStart) * state.cellWidth) - 12}px`;
                            restBar.innerHTML = `<div class="bar-label">☕ 휴식 및 정비 (${rEnd - rStart}일간)</div>`;
                            rightTrack.appendChild(restBar);
                        }
                    }
                }

                // 메인 바 위치 계산
                let oStart = task.start;
                let oEnd = task.end;
                let barRenderable = false;

                if (state.viewMode === 'DAY') {
                    // 일간 모드일 때는 하루 전체(288셀)에 꽉 채워서 보정 렌더링
                    barRenderable = true;
                    oStart = 0; oEnd = 24;
                } else {
                    let tRange = getActiveTimeRange();
                    oStart = Math.max(tRange.start, task.start);
                    oEnd = Math.min(tRange.end, task.end);
                    if (oStart < oEnd) barRenderable = true;
                }

                if (barRenderable) {
                    const bar = document.createElement('div'); bar.className = 'time-bar-element';
                    bar.style.backgroundColor = task.color;
                    
                    let leftOffset = (state.viewMode === 'DAY') ? 0 : (oStart - timeConfig.start);
                    let widthUnits = (state.viewMode === 'DAY') ? 288 : (oEnd - oStart);

                    bar.style.left = `${leftOffset * state.cellWidth}px`;
                    bar.style.width = `${(widthUnits * state.cellWidth) - 12}px`;

                    const hL = document.createElement('div'); hL.className = 'resizer';
                    const lbl = document.createElement('div'); lbl.className = 'bar-label';
                    lbl.innerHTML = `<span>⏳ ${task.name} (${task.end - task.start}일간)</span>`;
                    
                    // 🛠️ 상위/하위 상관없이 클릭 우선순위를 보장하기 위한 분리 레이어 처리
                    let isMovingGuard = false;
                    bar.onmousedown = (e) => {
                        if (e.target.classList.contains('resizer')) return; // 리사이저 클릭 패스
                        if (e.buttons !== 1) return;
                        e.stopPropagation();
                        isMovingGuard = false;
                        startDrag(task.id, 'move', e.clientX);
                    };
                    bar.onmousemove = () => { isMovingGuard = true; };
                    
                    bar.onmouseup = (e) => {
                        if (!isMovingGuard && !e.target.classList.contains('resizer')) {
                            e.stopPropagation();
                            state.projectFocusId = (state.projectFocusId === task.id) ? null : task.id;
                            saveData(); renderAll();
                        }
                    };

                    const hR = document.createElement('div'); hR.className = 'resizer';

                    // 상위 목록 길이 조절 봉인 규칙 유지
                    if (!isParentNode && state.viewMode !== 'DAY') {
                        bar.appendChild(hL); bar.appendChild(lbl); bar.appendChild(hR);
                        hL.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'left', e.clientX); };
                        hR.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'right', e.clientX); };
                    } else {
                        bar.appendChild(lbl);
                    }
                    rightTrack.appendChild(bar);
                }
                row.appendChild(rightTrack); container.appendChild(row);
            });
        }

        let currentDragId = null, dragType = null, dragStartX = 0, dragStartS = 0, dragStartE = 0;
        let originalTasksState = [];

        function startDrag(id, type, x) {
            currentDragId = id; dragType = type; dragStartX = x;
            let task = state.tasks.find(t => t.id === id);
            if(!task) return;
            dragStartS = task.start; dragStartE = task.end;
            originalTasksState = JSON.parse(JSON.stringify(state.tasks));
            
            window.removeEventListener('mousemove', onDragMove, true);
            window.removeEventListener('mouseup', endDrag, true);
            window.addEventListener('mousemove', onDragMove, true);
            window.addEventListener('mouseup', endDrag, true);
        }

        function onDragMove(e) {
            if (!currentDragId || state.viewMode === 'DAY') return; // 일간 모드에서는 드래그 수정 잠금
            e.stopPropagation();
            
            let deltaX = e.clientX - dragStartX;
            let cellDelta = Math.round(deltaX / state.cellWidth);

            state.tasks = JSON.parse(JSON.stringify(originalTasksState));
            let task = state.tasks.find(t => t.id === currentDragId);

            if (dragType === 'move') {
                let ns = dragStartS + cellDelta; let ne = dragStartE + cellDelta;
                if (ns < 0) { ne = task.end - task.start; ns = 0; }
                if (ne > 365) { ns = 365 - (task.end - task.start); ne = 365; }
                task.start = ns; task.end = ne; 
                moveAllChildrenSet(task.id, ns - dragStartS);
            } else if (dragType === 'left') {
                let ns = dragStartS + cellDelta; if (ns >= 0 && ns < task.end) task.start = ns;
            } else if (dragType === 'right') {
                let ne = dragStartE + cellDelta; if (ne > task.start && ne <= 365) task.end = ne;
            }
            updateParentTimeChain(task.parentId); renderRows();
        }

        function endDrag(e) {
            if (e) e.stopPropagation(); currentDragId = null;
            window.removeEventListener('mousemove', onDragMove, true);
            window.removeEventListener('mouseup', endDrag, true);
            saveData(); renderAll(); 
        }

        function addNewRow() {
            state.tasks.push({ id: "p_" + Date.now(), parentId: null, name: "새로운 최상위 마스터 공정", start: 0, end: 45, color: "#3b82f6", checked: false });
            saveData(); renderAll();
        }

        function addChildRow(pId) {
            let p = state.tasks.find(t => t.id === pId);
            state.tasks.push({
                id: "p_" + Date.now(), parentId: pId, name: "└ 세부 서브 태스크 라인", start: p.start, end: Math.min(p.end, p.start + 15), color: p.color, checked: false
            });
            state.collapsedNodes[pId] = false; updateParentTimeChain(pId); saveData(); renderAll();
        }

        function renderArchive() {
            const container = document.getElementById('archive-content-panel'); const badge = document.getElementById('archive-count-badge');
            let completed = state.tasks.filter(t => t.checked); badge.innerText = `${completed.length}개 완료됨`;
            if (completed.length === 0) { container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:10px;">완료 보관함이 비어있습니다.</div>`; return; }
            let html = '';
            completed.forEach(task => {
                html += `<div class="archived-item"><div class="archive-top"><span>🟩 <strong>${task.name}</strong></span><button class="secondary" style="padding:4px 8px; font-size:0.75rem;" onclick="restoreTask('${task.id}')">🔄 타임라인 복원</button></div></div>`;
            });
            container.innerHTML = html;
        }

        function restoreTask(id) { let task = state.tasks.find(t => t.id === id); if (task) { task.checked = false; saveData(); renderAll(); } }
        function toggleArchiveView() { document.getElementById('archive-content-panel').classList.toggle('open'); }
        
        // 🛠️ 1월부터 12월이 화면에 다 보이도록 배율 축소 한계폭 완화 (최소값 5로 하향조정)
        function adjustZoom(amt) { state.cellWidth = Math.max(5, Math.min(200, state.cellWidth + amt)); renderAll(); }
        function resetAllData() { if (confirm("모든 데이터를 포맷팅하시겠습니까?")) { localStorage.clear(); location.reload(); } }

        function renderAll() { renderTrail(); renderHeader(); renderRows(); renderArchive(); }
        window.onload = init;
    </script>
</body>
</html>
