<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 On-Set Tracker (촬영 마스터 플랜)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color);
        }

        .title-container { display: flex; align-items: center; gap: 8px; }
        .title-input {
            background: transparent; border: 1px solid transparent; color: var(--text-color);
            font-size: 1.2rem; font-weight: 700; padding: 6px 12px; border-radius: 6px; width: 340px; cursor: pointer;
        }
        .title-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; cursor: text; }

        .navigation-trail {
            display: flex; align-items: center; gap: 6px; font-size: 0.9rem; background: #0f172a; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color);
        }
        .trail-link { color: #f59e0b; cursor: pointer; font-weight: bold; }
        .trail-link:hover { text-decoration: underline; }

        .control-panel { display: flex; gap: 8px; align-items: center; }
        button {
            background-color: var(--primary-color); color: white; border: none;
            padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: #475569; }
        button.danger { background-color: var(--danger-color); }

        /* 타임라인 레이아웃 인프라 */
        .timeline-board { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .timeline-container-scroll { overflow-x: auto; width: 100%; }
        .timeline-table { display: flex; flex-direction: column; width: max-content; position: relative; }

        .table-header { display: flex; flex-direction: column; background: #111827; border-bottom: 2px solid var(--border-color); }
        .header-row { display: flex; }
        .header-frozen-zone {
            width: 380px; min-width: 380px; padding-left: 15px; display: flex; align-items: center;
            font-weight: bold; font-size: 0.85rem; color: var(--text-muted); border-right: 2px solid var(--border-color);
            background: #0f172a; position: sticky; left: 0; z-index: 25; height: 42px;
        }
        .header-grid-zone { display: flex; }
        
        .main-time-cell {
            border-right: 2px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: bold; color: var(--text-color); background: #111827; height: 42px; cursor: pointer;
        }
        .main-time-cell:hover { background: #1e293b; }
        
        .sub-tick-row { display: flex; background: #0b0f19; height: 24px; border-bottom: 1px solid var(--border-color); }
        .sub-tick-cell {
            border-right: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: var(--text-muted); font-family: monospace; cursor: pointer;
        }
        .sub-tick-cell:hover { background: #1e293b; color: white; }

        /* 항목 레벨 디자인 및 트리 뎁스 들여쓰기 */
        .task-row { display: flex; border-bottom: 1px solid var(--border-color); background: var(--card-bg); position: relative; }
        .task-row.completed-shading { opacity: 0.4; background: #0f172a; } 
        .task-row.hidden-node { display: none; } /* 아코디언 접기 기능 */
        
        .task-left-panel {
            width: 380px; min-width: 380px; padding: 6px 12px; border-right: 2px solid var(--border-color);
            display: flex; align-items: center; gap: 8px; background: #1e293b; position: sticky; left: 0; z-index: 15;
        }

        .indent-space { display: inline-block; width: 16px; }
        .toggle-arrow { cursor: pointer; color: #f59e0b; font-weight: bold; padding: 0 4px; }

        .task-checkbox { width: 18px; height: 18px; cursor: pointer; z-index: 5; }
        
        .color-dot-palette { display: flex; gap: 3px; }
        .color-dot { width: 10px; height: 10px; border-radius: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        .task-name-input {
            background: transparent; border: 1px solid transparent; color: var(--text-color);
            font-size: 0.85rem; flex: 1; padding: 4px; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        .task-name-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; cursor: text; }

        .task-right-track { position: relative; display: flex; background: #0f172a; height: 52px; }
        .track-grid-unit { border-right: 1px dashed rgba(51, 65, 85, 0.3); height: 100%; }

        /* 인디케이터 바 디자인 */
        .time-bar-element {
            position: absolute; height: 34px; top: 9px;
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer;
            z-index: 5;
        }
        .bar-label { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 700; color: white; overflow: hidden; white-space: nowrap; text-overflow: clip; padding: 0 2px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .resizer { width: 8px; height: 100%; background: rgba(255, 255, 255, 0.3); cursor: ew-resize; z-index: 10; }

        .time-bar-element.break-auto-bar {
            background: repeating-linear-gradient(45deg, #0d9488, #0d9488 10px, #115e59 10px, #115e59 20px) !important;
            cursor: not-allowed; opacity: 0.4; z-index: 1;
        }

        /* 완료 보관소 */
        .archive-section { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-top: 10px; }
        .archive-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .archive-content { display: none; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .archive-content.open { display: block; }
        
        .archived-item { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-bottom: 1px solid #334155; background: #111827; border-radius: 6px; margin-bottom: 8px; }
        .archive-top { display: flex; justify-content: space-between; align-items: center; }
        .feedback-form { display: flex; gap: 10px; align-items: center; width: 100%; margin-top: 5px; background: #1e293b; padding: 8px; border-radius: 6px; }
        .feedback-input { background: #0f172a; border: 1px solid var(--border-color); color: var(--text-color); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .feedback-select { background: #0f172a; border: 1px solid var(--border-color); color: #f59e0b; padding: 4px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <input type="text" id="main-title" class="title-input" value="🎬 On-Set Tracker (촬영 마스터 플랜)">
        </div>
        
        <div class="navigation-trail" id="nav-trail-container"></div>

        <div class="control-panel">
            <button onclick="addNewRow()">➕ 최상위 항목 추가</button>
            <button class="secondary" onclick="adjustZoom(-10)">➖ 축소</button>
            <button class="secondary" onclick="adjustZoom(10)">➕ 확대</button>
            <button class="danger" onclick="resetAllData()">🔄 초기화</button>
        </div>
    </header>

    <div class="timeline-board">
        <div class="timeline-container-scroll">
            <div class="timeline-table">
                <div class="table-header" id="master-render-header"></div>
                <div id="dynamic-rows-container"></div>
            </div>
        </div>
    </div>

    <div class="archive-section">
        <div class="archive-header" onclick="toggleArchiveView()">
            <h3>📦 완료된 항목 및 프로덕션 피드백 분석기</h3>
            <div style="background:#334155; padding:4px 10px; border-radius:6px; font-size:0.8rem; color:#f59e0b; font-weight:bold;" id="archive-count-badge">0개 완료됨</div>
        </div>
        <div class="archive-content" id="archive-content-panel"></div>
    </div>

    <script>
        // 2026년 마스터 전역 고해상도 셀 매핑 상태
        let state = {
            year: 2026,
            viewFilter: 'all', // all, month, week
            filterMonthIdx: 0,
            filterWeekIdx: 0,
            cellWidth: 65,
            titleBackup: "",
            inputBackups: {},
            collapsedNodes: {}, // 아코디언 접힘 상태 추적 추적기
            tasks: [
                { id: "t-1", parentId: null, name: "수박 판매 프로덕션 빌드업", start: 0, end: 15, color: "#3b82f6", checked: false, repeatCount: 1, reviewScore: "⭐⭐⭐⭐⭐", issueText: "" },
                { id: "t-2", parentId: "t-1", name: "시장 트렌드 분석 및 자료조사", start: 0, end: 8, color: "#a855f7", checked: false, repeatCount: 1, reviewScore: "⭐⭐⭐⭐⭐", issueText: "" },
                { id: "t-3", parentId: "t-2", name: "온라인 유통 채널 현황 조사", start: 2, end: 7, color: "#eab308", checked: false, repeatCount: 1, reviewScore: "⭐⭐⭐⭐⭐", issueText: "" }
            ]
        };

        const PALETTE = ["#3b82f6", "#a855f7", "#eab308", "#10b981", "#ef4444"];
        
        // 2026년 실제 달력 데이터베이스 팩토리 고정 변환
        const MONTH_WEEKS = [5, 4, 4, 5, 4, 5, 4, 5, 4, 4, 5, 5]; // 2026년 각 월별 실제 주차 개수
        const TOTAL_GRID_WEEKS = MONTH_WEEKS.reduce((a, b) => a + b, 0); // 총 54개 주차 세부 가이드 라인

        function init() {
            const saved = localStorage.getItem('onset_tree_timeline_v8');
            if (saved) state = JSON.parse(saved);
            setupTitleInput();
            renderTrail();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('onset_tree_timeline_v8', JSON.stringify(state));
            renderArchive();
        }

        function setupTitleInput() {
            const titleInput = document.getElementById('main-title');
            titleInput.onfocus = () => { state.titleBackup = titleInput.value; };
            titleInput.onblur = () => { titleInput.value = state.titleBackup; }; 
            titleInput.onkeydown = (e) => {
                if (e.key === 'Enter') { state.titleBackup = titleInput.value; titleInput.blur(); saveData(); }
                else if (e.key === 'Escape') { titleInput.value = state.titleBackup; titleInput.blur(); }
            };
        }

        function renderTrail() {
            const container = document.getElementById('nav-trail-container');
            container.innerHTML = '';
            let html = `<span class="trail-link" onclick="setFilter('all')">🏠 2026년 전체보기</span>`;
            if (state.viewFilter === 'month') {
                html += ` <span>&gt;</span> <span class="trail-link">${state.filterMonthIdx + 1}월 집중 뷰</span>`;
            }
            container.innerHTML = html;
        }

        function setFilter(type, mIdx = 0) {
            state.viewFilter = type;
            state.filterMonthIdx = mIdx;
            renderTrail(); renderAll();
        }

        // 특정 범위 셀만 슬라이싱 계산하는 기어
        function getActiveCellRange() {
            if (state.viewFilter === 'all') {
                return { start: 0, end: TOTAL_GRID_WEEKS };
            } else {
                let start = 0;
                for(let i=0; i<state.filterMonthIdx; i++) start += MONTH_WEEKS[i];
                return { start: start, end: start + MONTH_WEEKS[state.filterMonthIdx] };
            }
        }

        // 📅 두 번째 줄에 .. 대신 주차가 완벽히 채워지는 헤더 렌더러
        function renderHeader() {
            const wrapper = document.getElementById('master-render-header');
            wrapper.innerHTML = '';

            const row1 = document.createElement('div'); row1.className = 'header-row';
            const row2 = document.createElement('div'); row2.className = 'header-row';

            const f1 = document.createElement('div'); f1.className = 'header-frozen-zone'; f1.innerText = "진행 단계 / 컷 목록";
            const f2 = document.createElement('div'); f2.className = 'header-frozen-zone'; f2.innerText = "시간 스케일 세부 가이드";
            row1.appendChild(f1); row2.appendChild(f2);

            const g1 = document.createElement('div'); g1.className = 'header-grid-zone';
            const g2 = document.createElement('div'); g2.className = 'header-grid-zone';

            let range = getActiveCellRange();

            if (state.viewFilter === 'all') {
                let currentGlobalWeek = 0;
                MONTH_WEEKS.forEach((weeksCount, mIdx) => {
                    // 첫 번째 줄: 월 표시 (클릭시 해당 월로 정밀 필터 확장)
                    const cell = document.createElement('div');
                    cell.className = 'main-time-cell';
                    cell.style.width = `${state.cellWidth * weeksCount}px`;
                    cell.innerText = `${mIdx + 1}월`;
                    cell.onclick = () => setFilter('month', mIdx);
                    g1.appendChild(cell);

                    // 두 번째 줄: 이제 .. 이 아니라 실제 주차가 완벽하게 보임!
                    for (let w = 0; w < weeksCount; w++) {
                        const subTick = document.createElement('div');
                        subTick.className = 'sub-tick-cell';
                        subTick.style.width = `${state.cellWidth}px`;
                        subTick.innerText = `${w + 1}주`;
                        g2.appendChild(subTick);
                    }
                });
            } else {
                // 특정 월 집중 보기 모드
                const cell = document.createElement('div');
                cell.className = 'main-time-cell';
                cell.style.width = `${state.cellWidth * MONTH_WEEKS[state.filterMonthIdx]}px`;
                cell.innerText = `${state.filterMonthIdx + 1}월 집중 뷰 (클릭 시 전체 복귀)`;
                cell.onclick = () => setFilter('all');
                g1.appendChild(cell);

                for (let w = 0; w < MONTH_WEEKS[state.filterMonthIdx]; w++) {
                    const subTick = document.createElement('div');
                    subTick.className = 'sub-tick-cell';
                    subTick.style.width = `${state.cellWidth}px`;
                    subTick.innerText = `${w + 1}주차`;
                    g2.appendChild(subTick);
                }
            }

            row1.appendChild(g1); row2.appendChild(g2);
            wrapper.appendChild(row1); wrapper.appendChild(row2);
        }

        // 🔗 하위 목록의 총합 연동 규칙 제어 엔진
        function synchronizeHierarchyChain(childTaskId) {
            let child = state.tasks.find(t => t.id === childTaskId);
            if (!child || !child.parentId) return;

            let parent = state.tasks.find(t => t.id === child.parentId);
            if (!parent) return;

            let siblings = state.tasks.filter(t => t.parentId === parent.id);
            if (siblings.length === 0) return;

            let minStart = Math.min(...siblings.map(s => s.start));
            let maxEnd = Math.max(...siblings.map(s => s.end));

            // 하위 합보다 상위가 좁아질 수 없도록 차단하고 자동 동적 확장 연동
            if (parent.start > minStart) parent.start = minStart;
            if (parent.end < maxEnd) parent.end = maxEnd;

            synchronizeHierarchyChain(parent.id);
        }

        // 트리 계층 뎁스 계산기
        function getDepth(task) {
            let depth = 0; let p = state.tasks.find(t => t.id === task.parentId);
            while(p) { depth++; p = state.tasks.find(t => t.id === p.parentId); }
            return depth;
        }

        // 조상 노드가 접혀있는지 확인 여부
        function isAncestorCollapsed(task) {
            let p = state.tasks.find(t => t.id === task.parentId);
            while(p) {
                if (state.collapsedNodes[p.id]) return true;
                p = state.tasks.find(t => t.id === p.parentId);
            }
            return false;
        }

        function renderRows() {
            const container = document.getElementById('dynamic-rows-container');
            container.innerHTML = '';

            let range = getActiveCellRange();
            let displayCount = range.end - range.start;

            // 계층 정렬 알고리즘 트리 배치
            let sortedTasks = [];
            function buildTree(pId) {
                state.tasks.filter(t => t.parentId === pId).forEach(t => {
                    sortedTasks.push(t); buildTree(t.id);
                });
            }
            buildTree(null);

            sortedTasks.forEach(task => {
                const row = document.createElement('div');
                row.className = `task-row ${task.checked ? 'completed-shading' : ''}`;
                if (isAncestorCollapsed(task)) row.classList.add('hidden-node');

                const left = document.createElement('div'); left.className = 'task-left-panel';

                // 트리 계층 화살표 및 들여쓰기
                let depth = getDepth(task);
                for(let d=0; d<depth; d++) {
                    let space = document.createElement('span'); space.className = 'indent-space';
                    left.appendChild(space);
                }

                let children = state.tasks.filter(t => t.parentId === task.id);
                if (children.length > 0) {
                    const arrow = document.createElement('span'); arrow.className = 'toggle-arrow';
                    arrow.innerText = state.collapsedNodes[task.id] ? "▶" : "▼";
                    arrow.onclick = (e) => {
                        e.stopPropagation();
                        state.collapsedNodes[task.id] = !state.collapsedNodes[task.id];
                        saveData(); renderRows();
                    };
                    left.appendChild(arrow);
                } else {
                    let space = document.createElement('span'); space.className = 'indent-space'; left.appendChild(space);
                }

                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'task-checkbox';
                cb.checked = task.checked;
                cb.onchange = () => { task.checked = cb.checked; saveData(); renderRows(); };
                left.appendChild(cb);

                const pal = document.createElement('div'); pal.className = 'color-dot-palette';
                PALETTE.forEach(c => {
                    const dot = document.createElement('div'); dot.className = 'color-dot'; dot.style.backgroundColor = c;
                    dot.onclick = () => { task.color = c; saveData(); renderRows(); };
                    pal.appendChild(dot);
                });
                left.appendChild(pal);

                // ESC 완벽 복귀 튜닝 인풋 박스
                const nameInput = document.createElement('input'); nameInput.className = 'task-name-input';
                nameInput.value = task.name;
                nameInput.onfocus = () => { state.inputBackups[task.id] = nameInput.value; };
                nameInput.onblur = () => { nameInput.value = state.inputBackups[task.id]; };
                nameInput.onkeydown = (e) => {
                    if (e.key === 'Enter') {
                        state.inputBackups[task.id] = nameInput.value;
                        task.name = nameInput.value; nameInput.blur(); saveData(); renderRows();
                    } else if (e.key === 'Escape') {
                        nameInput.value = state.inputBackups[task.id]; nameInput.blur();
                    }
                };
                left.appendChild(nameInput);

                // 하위 항목 직계 생성 바로가기 단축 버튼 추가
                const subAddBtn = document.createElement('button'); subAddBtn.style.padding = '3px 6px'; subAddBtn.style.fontSize = '0.7rem'; subAddBtn.innerText = "➕";
                subAddBtn.onclick = () => { addChildRow(task.id); };
                left.appendChild(subAddBtn);

                const delBtn = document.createElement('button'); delBtn.className = 'danger'; delBtn.style.padding = '3px 6px'; delBtn.innerText = "✕";
                delBtn.onclick = () => { state.tasks = state.tasks.filter(t => t.id !== task.id); saveData(); renderAll(); };
                left.appendChild(delBtn);

                row.appendChild(left);

                // 우측 그리드 트랙 영역 계산
                const rightTrack = document.createElement('div'); rightTrack.className = 'task-right-track';
                rightTrack.style.width = `${displayCount * state.cellWidth}px`;

                for (let i = 0; i < displayCount; i++) {
                    const unit = document.createElement('div'); unit.className = 'track-grid-unit'; unit.style.width = `${state.cellWidth}px`;
                    rightTrack.appendChild(unit);
                }

                // 글로벌 절대 좌표를 현재 필터 상대 좌표로 투영 보정 계산
                let relativeStart = task.start - range.start;
                let relativeEnd = task.end - range.start;

                // 인디케이터 렌더링 검사 범위 가드
                if (!(relativeEnd <= 0 || relativeStart >= displayCount)) {
                    let drawStart = Math.max(0, relativeStart);
                    let drawEnd = Math.min(displayCount, relativeEnd);

                    const bar = document.createElement('div'); bar.className = 'time-bar-element';
                    bar.style.backgroundColor = task.color || '#3b82f6';
                    bar.style.left = `${drawStart * state.cellWidth}px`;
                    bar.style.width = `${(drawEnd - drawStart) * state.cellWidth}px`;

                    const hL = document.createElement('div'); hL.className = 'resizer';
                    
                    // 🛑 이제 인디케이터 누르면 페이지 이동 대신 아코디언 토글이 시원하게 작동!
                    const lbl = document.createElement('div'); lbl.className = 'bar-label';
                    lbl.innerHTML = `<span>⏳ ${task.end - task.start}주간</span>`;
                    lbl.onclick = (e) => {
                        e.stopPropagation();
                        if (children.length > 0) {
                            state.collapsedNodes[task.id] = !state.collapsedNodes[task.id];
                            saveData(); renderRows();
                        }
                    };

                    const hR = document.createElement('div'); hR.className = 'resizer';

                    bar.appendChild(hL); bar.appendChild(lbl); bar.appendChild(hR);

                    // 드래그 제어 정밀 인터페이스 바인딩
                    hL.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'left', e.clientX); };
                    hR.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'right', e.clientX); };
                    lbl.onmousedown = (e) => { e.stopPropagation(); if (e.buttons === 1 && e.movementX !== 0) startDrag(task.id, 'move', e.clientX); };

                    rightTrack.appendChild(bar);
                }

                row.appendChild(rightTrack);
                container.appendChild(row);
            });
        }

        // 드래그 마우스 무브 실시간 수치 보정 시스템
        let currentDragBarId = null, dragType = null, dragStartX = 0, dragStartLeft = 0, dragStartEnd = 0;

        function startDrag(id, type, x) {
            currentDragBarId = id; dragType = type; dragStartX = x;
            let task = state.tasks.find(t => t.id === id);
            dragStartLeft = task.start; dragStartEnd = task.end;
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', endDrag);
        }

        function onDragMove(e) {
            if (!currentDragBarId) return;
            let task = state.tasks.find(t => t.id === currentDragBarId);
            let deltaX = e.clientX - dragStartX;
            let cellDelta = Math.round(deltaX / state.cellWidth);

            let siblings = state.tasks.filter(t => t.parentId === task.id);
            let minAllowedStart = TOTAL_GRID_WEEKS;
            let maxAllowedEnd = 0;

            if (siblings.length > 0) {
                minAllowedStart = Math.min(...siblings.map(s => s.start));
                maxAllowedEnd = Math.max(...siblings.map(s => s.end));
            }

            if (dragType === 'move') {
                let ns = dragStartLeft + cellDelta;
                let ne = dragStartEnd + cellDelta;
                if (ns >= 0 && ne <= TOTAL_GRID_WEEKS && (siblings.length === 0 || (ns <= minAllowedStart && ne >= maxAllowedEnd))) {
                    task.start = ns; task.end = ne;
                }
            } else if (dragType === 'left') {
                let ns = dragStartLeft + cellDelta;
                if (ns >= 0 && ns < task.end && (siblings.length === 0 || ns <= minAllowedStart)) task.start = ns;
            } else if (dragType === 'right') {
                let ne = dragStartEnd + cellDelta;
                if (ne > task.start && ne <= TOTAL_GRID_WEEKS && (siblings.length === 0 || ne >= maxAllowedEnd)) task.end = ne;
            }
            
            synchronizeHierarchyChain(task.id);
            renderRows();
        }

        function endDrag() {
            currentDragBarId = null;
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', endDrag);
            saveData(); renderRows();
        }

        function addNewRow() {
            state.tasks.push({
                id: "t_" + Date.now(),
                parentId: null,
                name: "새 마스터 최상위 프로젝트 대장정",
                start: 0,
                end: 5,
                color: "#3b82f6",
                checked: false,
                repeatCount: 1,
                reviewScore: "⭐⭐⭐⭐⭐",
                issueText: ""
            });
            saveData(); renderRows();
        }

        function addChildRow(pId) {
            let pTask = state.tasks.find(t => t.id === pId);
            state.tasks.push({
                id: "t_" + Date.now(),
                parentId: pId,
                name: "└ 하위 세부 가이드 연동 태스크",
                start: pTask.start,
                end: Math.min(pTask.end, pTask.start + 2),
                color: "#a855f7",
                checked: false,
                repeatCount: 1,
                reviewScore: "⭐⭐⭐⭐⭐",
                issueText: ""
            });
            state.collapsedNodes[pId] = false; // 강제 확장 해제
            saveData(); renderAll();
        }

        function renderArchive() {
            const container = document.getElementById('archive-content-panel');
            const badge = document.getElementById('archive-count-badge');
            let completed = state.tasks.filter(t => t.checked);
            badge.innerText = `${completed.length}개 완료됨`;

            if (completed.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:10px;">완료 보관함이 비어있습니다.</div>`;
                return;
            }

            let html = '';
            completed.forEach(task => {
                html += `
                    <div class="archived-item">
                        <div class="archive-top">
                            <span>🟩 <strong>${task.name}</strong> <span style="color:var(--text-muted); font-size:0.75rem;">(총 기간: ${task.end - task.start}주간)</span></span>
                            <button class="secondary" style="padding:4px 8px; font-size:0.75rem;" onclick="restoreTask('${task.id}')">🔄 복원</button>
                        </div>
                        <div class="feedback-form">
                            <label style="font-size:0.75rem; color:var(--text-muted);">반복 횟수:</label>
                            <input type="number" class="feedback-input" style="width:50px;" value="${task.repeatCount || 1}" min="1" onchange="updateFeedback('${task.id}', 'repeatCount', this.value)">
                            <label style="font-size:0.75rem; color:var(--text-muted); margin-left:10px;">평가:</label>
                            <select class="feedback-select" onchange="updateFeedback('${task.id}', 'reviewScore', this.value)">
                                <option value="⭐⭐⭐⭐⭐" ${task.reviewScore === '⭐⭐⭐⭐⭐' ? 'selected' : ''}>⭐⭐⭐⭐⭐ 만족</option>
                                <option value="⭐⭐⭐⭐" ${task.reviewScore === '⭐⭐⭐⭐' ? 'selected' : ''}>⭐⭐⭐⭐ 우수</option>
                                <option value="⭐⭐⭐" ${task.reviewScore === '⭐⭐⭐' ? 'selected' : ''}>⭐⭐⭐ 보통</option>
                                <option value="⭐⭐" ${task.reviewScore === '⭐⭐' ? 'selected' : ''}>⭐⭐ 애로</option>
                                <option value="⭐" ${task.reviewScore === '⭐' ? 'selected' : ''}>⭐ 수정</option>
                            </select>
                            <input type="text" class="feedback-input" style="flex:1; margin-left:10px;" value="${task.issueText || ''}" placeholder="현장 분석 내용 기입" onchange="updateFeedback('${task.id}', 'issueText', this.value)">
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function updateFeedback(id, field, value) {
            let task = state.tasks.find(t => t.id === id);
            if(task) { task[field] = value; saveData(); }
        }

        function restoreTask(id) {
            let task = state.tasks.find(t => t.id === id);
            if (task) { task.checked = false; saveData(); renderRows(); }
        }

        function toggleArchiveView() { document.getElementById('archive-content-panel').classList.toggle('open'); }
        function adjustZoom(amt) { state.cellWidth = Math.max(30, Math.min(180, state.cellWidth + amt)); renderAll(); }
        function resetAllData() { if (confirm("데이터를 완전히 포맷팅하시겠습니까?")) { localStorage.clear(); location.reload(); } }

        function renderAll() {
            renderHeader();
            renderRows();
            renderArchive();
        }

        window.onload = init;
    </script>
</body>
</html>
