<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 하이퍼 스케일 프로덕션 타임라인</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --accent-color: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color);
        }

        .title-container { display: flex; align-items: center; gap: 10px; }
        .title-input {
            background: #0f172a; border: 1px solid var(--border-color); color: var(--text-color);
            font-size: 1.2rem; font-weight: 700; padding: 6px 12px; border-radius: 6px;
            max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* 📍 상단 헤더 경로 내비게이션 (Breadcrumb) */
        .breadcrumb-trail {
            display: flex; align-items: center; gap: 8px; background: #0f172a;
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 0.9rem;
        }
        .crumb-item { color: var(--accent-color); cursor: pointer; font-weight: bold; }
        .crumb-item:hover { text-decoration: underline; }
        .crumb-separator { color: var(--text-muted); }

        .control-panel { display: flex; gap: 8px; }
        button {
            background-color: var(--primary-color); color: white; border: none;
            padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: #475569; }
        button.secondary:hover { background-color: #334155; }
        button.danger { background-color: var(--danger-color); }

        .timeline-board {
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden;
        }
        .timeline-container-scroll { overflow-x: auto; width: 100%; }
        .timeline-table { display: flex; flex-direction: column; width: max-content; position: relative; }

        /* 2줄 계층 헤더 */
        .table-header { display: flex; flex-direction: column; background: #111827; border-bottom: 2px solid var(--border-color); }
        .header-row { display: flex; }
        .header-frozen-zone {
            width: 380px; min-width: 380px; padding-left: 15px; display: flex; align-items: center;
            font-weight: bold; font-size: 0.85rem; color: var(--text-muted); border-right: 2px solid var(--border-color);
            background: #0f172a; position: sticky; left: 0; z-index: 25; height: 40px;
        }
        .header-grid-zone { display: flex; }
        .grid-header-cell {
            border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; color: var(--text-color); background: #111827; height: 40px; cursor: pointer;
        }
        .grid-header-cell:hover { background: var(--primary-color); }
        .grid-header-cell .sub-date { font-size: 0.65rem; color: var(--text-muted); }

        /* 행 디자인 */
        .task-row { display: flex; border-bottom: 1px solid var(--border-color); background: var(--card-bg); }
        .task-left-panel {
            width: 380px; min-width: 380px; padding: 8px 12px; border-right: 2px solid var(--border-color);
            display: flex; align-items: center; gap: 6px; background: #1e293b; position: sticky; left: 0; z-index: 15;
        }
        .task-name-input {
            background: transparent; border: 1px solid transparent; color: var(--text-color);
            font-size: 0.85rem; flex: 1; padding: 4px; border-radius: 4px;
        }
        .task-name-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; }

        .task-right-track { position: relative; display: flex; background: #0f172a; height: 50px; }
        .track-grid-unit { border-right: 1px dashed rgba(51, 65, 85, 0.3); height: 100%; }

        /* 스케줄 스팬 바 */
        .time-bar-element {
            position: absolute; height: 32px; top: 9px;
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: grab;
        }
        .bar-label { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 700; color: white; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 4px; }
        .resizer { width: 6px; height: 100%; background: rgba(255, 255, 255, 0.25); cursor: ew-resize; }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <input type="text" id="main-title" class="title-input" value="🎬 마스터 워크플랜 프로덕션 트래커">
        </div>
        <!-- 📍 현재 위치 이동을 돕는 브레드크럼 헤더 경로 내비게이션 -->
        <div class="breadcrumb-trail" id="breadcrumb-container"></div>
        <div class="control-panel">
            <button onclick="addNewRow()">➕ 현재 레벨에 분류 추가</button>
            <button class="secondary" onclick="adjustZoom(-15)">➖ 축소</button>
            <button class="secondary" onclick="adjustZoom(15)">➕ 확대</button>
            <button class="danger" onclick="resetAllData()">🔄 초기화</button>
        </div>
    </header>

    <div class="timeline-board">
        <div class="timeline-container-scroll">
            <div class="timeline-table">
                <div class="table-header" id="render-header-wrapper"></div>
                <div id="dynamic-rows-container"></div>
            </div>
        </div>
    </div>

    <script>
        // 📍 계층 구조를 분리 저장하기 위한 글로벌 키 기반 딕셔너리 데이터베이스 구조
        let db = {
            "root": [
                { id: "p1", name: "2026년 콘텐츠 제작 기획 및 슈팅", start: 0, end: 5 },
                { id: "p2", name: "새 마스터 대분류 과업 항목", start: 6, end: 10 }
            ]
        };

        // 내비게이션 상태 추적기
        let currentMode = 'year'; // year -> month -> day -> hour
        let currentPath = { year: 2026, month: null, week: null, day: null };
        let cellWidth = 90;

        // 드래그 제어 가드 변수
        let currentDragBarId = null;
        let dragType = null;
        let dragStartX = 0;
        let dragStartLeft = 0;
        let dragStartEnd = 0;

        function init() {
            const saved = localStorage.getItem('isolated_timeline_db_v3');
            if (saved) db = JSON.parse(saved);
            renderBreadcrumb();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('isolated_timeline_db_v3', JSON.stringify(db));
        }

        // 현재 진입한 경로에 기반하여 고유한 독립 데이터 키를 생성 (예: "2026-5", "2026-5-2주차")
        function getCurrentStorageKey() {
            if (currentMode === 'year') return "root";
            if (currentMode === 'month') return `m-${currentPath.year}-${currentPath.month}`;
            if (currentMode === 'day') return `w-${currentPath.year}-${currentPath.month}-${currentPath.week}`;
            if (currentMode === 'hour') return `d-${currentPath.year}-${currentPath.month}-${currentPath.week}-${currentPath.day}`;
            return "root";
        }

        function getCurrentTasks() {
            let key = getCurrentStorageKey();
            if (!db[key]) db[key] = [];
            return db[key];
        }

        function getMaxCells() {
            if (currentMode === 'year') return 12; // 12개월
            if (currentMode === 'month') return 5;  // 5주차 기본 세팅
            if (currentMode === 'day') return 7;   // 7일간
            if (currentMode === 'hour') return 24 * 12; // 24시간을 5분 단위(한 시간에 12칸)로 쪼갬 = 288칸
            return 12;
        }

        // 📍 상단 헤더 클릭 바인딩 및 경로 렌더러
        function renderBreadcrumb() {
            const container = document.getElementById('breadcrumb-container');
            container.innerHTML = '';

            let html = `<span class="crumb-item" onclick="jumpToMode('year')">📅 ${currentPath.year}년 전체</span>`;
            
            if (currentMode === 'month' || currentMode === 'day' || currentMode === 'hour') {
                html += ` <span class="crumb-separator">&gt;</span> <span class="crumb-item" onclick="jumpToMode('month', ${currentPath.month})">${currentPath.month + 1}월 계획</span>`;
            }
            if (currentMode === 'day' || currentMode === 'hour') {
                html += ` <span class="crumb-separator">&gt;</span> <span class="crumb-item" onclick="jumpToMode('day', ${currentPath.month}, ${currentPath.week})">${currentPath.week + 1}주차</span>`;
            }
            if (currentMode === 'hour') {
                html += ` <span class="crumb-separator">&gt;</span> <span class="crumb-item">${currentPath.day}일 (5분 인터벌 타임)</span>`;
            }
            container.innerHTML = html;
        }

        function jumpToMode(mode, m = null, w = null, d = null) {
            currentMode = mode;
            if (mode === 'year') { currentPath.month = null; currentPath.week = null; currentPath.day = null; }
            else if (mode === 'month') { currentPath.month = m; currentPath.week = null; currentPath.day = null; }
            else if (mode === 'day') { currentPath.month = m; currentPath.week = w; currentPath.day = null; }
            renderBreadcrumb();
            renderAll();
        }

        function renderHeader() {
            const wrapper = document.getElementById('render-header-wrapper');
            wrapper.innerHTML = '';

            const row1 = document.createElement('div'); row1.className = 'header-row';
            const row2 = document.createElement('div'); row2.className = 'header-row';

            const f1 = document.createElement('div'); f1.className = 'header-frozen-zone'; f1.innerText = "분류 구조 및 타임라인 설정";
            const f2 = document.createElement('div'); f2.className = 'header-frozen-zone'; f2.innerText = "단위 스케줄 바 제어";
            row1.appendChild(f1); row2.appendChild(f2);

            const g1 = document.createElement('div'); g1.className = 'header-grid-zone';
            const g2 = document.createElement('div'); g2.className = 'header-grid-zone';

            let totalCells = getMaxCells();

            if (currentMode === 'year') {
                const c = document.createElement('div'); c.className = 'grid-header-cell'; c.style.width = `${totalCells * cellWidth}px`;
                c.innerText = "2026년도 월별 인덱스 (클릭시 월간 독립 뷰 확장)";
                g1.appendChild(c);

                for (let i = 0; i < 12; i++) {
                    const cell = document.createElement('div'); cell.className = 'grid-header-cell'; cell.style.width = `${cellWidth}px`;
                    cell.innerHTML = `<div>${i+1}월</div><div class="sub-date">진입하기</div>`;
                    cell.onclick = () => jumpToMode('month', i);
                    g2.appendChild(cell);
                }
            } 
            else if (currentMode === 'month') {
                const c = document.createElement('div'); c.className = 'grid-header-cell'; c.style.width = `${totalCells * cellWidth}px`;
                c.innerText = `${currentPath.month + 1}월 세부 주차 플랜`;
                g1.appendChild(c);

                for (let i = 0; i < 5; i++) {
                    const cell = document.createElement('div'); cell.className = 'grid-header-cell'; cell.style.width = `${cellWidth}px`;
                    cell.innerHTML = `<div>${i+1}주차</div><div class="sub-date">일별 확장</div>`;
                    cell.onclick = () => jumpToMode('day', currentPath.month, i);
                    g2.appendChild(cell);
                }
            } 
            else if (currentMode === 'day') {
                const c = document.createElement('div'); c.className = 'grid-header-cell'; c.style.width = `${totalCells * cellWidth}px`;
                c.innerText = `${currentPath.month + 1}월 ${currentPath.week + 1}주차 일별 계획`;
                g1.appendChild(c);

                for (let i = 0; i < 7; i++) {
                    const cell = document.createElement('div'); cell.className = 'grid-header-cell'; cell.style.width = `${cellWidth}px`;
                    cell.innerHTML = `<div>${i+1}일 차</div><div class="sub-date">5분 단위 제어</div>`;
                    cell.onclick = () => { currentPath.day = i + 1; jumpToMode('hour', currentPath.month, currentPath.week, i + 1); };
                    g2.appendChild(cell);
                }
            } 
            else if (currentMode === 'hour') {
                const c = document.createElement('div'); c.className = 'grid-header-cell'; c.style.width = `${totalCells * cellWidth}px`;
                c.innerText = `${currentPath.day}일차 24시간 초정밀 타임 플랜 (1칸 = 5분)`;
                g1.appendChild(c);

                // 24시간 표시 (각 시간은 12개의 5분 칸으로 구성)
                for (let h = 0; h < 24; h++) {
                    const cell = document.createElement('div'); cell.className = 'grid-header-cell'; cell.style.width = `${cellWidth * 12}px`;
                    cell.innerHTML = `<div>${h}시</div><div class="sub-date">(5분 단위 분할 영역)</div>`;
                    g2.appendChild(cell);
                }
            }

            row1.appendChild(g1); row2.appendChild(g2);
            wrapper.appendChild(row1); wrapper.appendChild(row2);
        }

        // 📍 5분 단위에 맞춰 텍스트 라벨을 이쁘게 포맷팅해 주는 파서 서브루틴
        function formatLabel(start, end) {
            if (currentMode !== 'hour') return `${start + 1} ~ ${end} 칸`;
            
            function parseMinutes(units) {
                let totalMin = units * 5;
                let h = Math.floor(totalMin / 60);
                let m = totalMin % 60;
                return `${h}시 ${m === 0 ? '00' : m}분`;
            }
            return `${parseMinutes(start)} - ${parseMinutes(end)}`;
        }

        function renderRows() {
            const container = document.getElementById('dynamic-rows-container');
            container.innerHTML = '';

            let tasks = getCurrentTasks();
            let totalCells = getMaxCells();

            tasks.forEach((task) => {
                const row = document.createElement('div'); row.className = 'task-row';

                const left = document.createElement('div'); left.className = 'task-left-panel';
                const input = document.createElement('input'); input.className = 'task-name-input'; input.value = task.name;
                input.onchange = (e) => { task.name = e.target.value; saveData(); };
                left.appendChild(input);

                const delBtn = document.createElement('button'); delBtn.className = 'danger'; delBtn.style.padding = '3px 7px'; delBtn.innerText = '✕';
                delBtn.onclick = () => { deleteRow(task.id); };
                left.appendChild(delBtn);
                row.appendChild(left);

                const rightTrack = document.createElement('div'); rightTrack.className = 'task-right-track';
                let renderCells = currentMode === 'hour' ? 24 * 12 : totalCells;
                rightTrack.style.width = `${renderCells * cellWidth}px`;

                for (let i = 0; i < renderCells; i++) {
                    const u = document.createElement('div'); u.className = 'track-grid-unit'; u.style.width = `${cellWidth}px`;
                    rightTrack.appendChild(u);
                }

                // 스케줄 실체 바 생성
                const bar = document.createElement('div'); bar.className = 'time-bar-element';
                bar.style.left = `${task.start * cellWidth}px`;
                bar.style.width = `${(task.end - task.start) * cellWidth}px`;

                const hL = document.createElement('div'); hL.className = 'resizer';
                const lbl = document.createElement('div'); lbl.className = 'bar-label'; lbl.innerText = `${formatLabel(task.start, task.end)} : ${task.name}`;
                const hR = document.createElement('div'); hR.className = 'resizer';

                bar.appendChild(hL); bar.appendChild(lbl); bar.appendChild(hR);

                hL.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'left', e.clientX); };
                hR.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'right', e.clientX); };
                lbl.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'move', e.clientX); };

                rightTrack.appendChild(bar);
                row.appendChild(rightTrack);
                container.appendChild(row);
            });
        }

        function startDrag(id, type, x) {
            currentDragBarId = id; dragType = type; dragStartX = x;
            let tasks = getCurrentTasks();
            let task = tasks.find(t => t.id === id);
            dragStartLeft = task.start; dragStartEnd = task.end;

            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', endDrag);
        }

        function onDragMove(e) {
            if (!currentDragBarId) return;
            let tasks = getCurrentTasks();
            let task = tasks.find(t => t.id === currentDragBarId);
            let totalCells = getMaxCells();

            let deltaX = e.clientX - dragStartX;
            let cellDelta = Math.round(deltaX / cellWidth);

            if (dragType === 'move') {
                let ns = dragStartLeft + cellDelta;
                let ne = dragStartEnd + cellDelta;
                if (ns >= 0 && ne <= totalCells) { task.start = ns; task.end = ne; }
            } else if (dragType === 'left') {
                let ns = dragStartLeft + cellDelta;
                if (ns >= 0 && ns < task.end) task.start = ns;
            } else if (dragType === 'right') {
                let ne = dragStartEnd + cellDelta;
                if (ne > task.start && ne <= totalCells) task.end = ne;
            }
            renderRows();
        }

        function endDrag() {
            currentDragBarId = null;
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', endDrag);
            saveData();
        }

        function addNewRow() {
            let tasks = getCurrentTasks();
            tasks.push({
                id: "item_" + Date.now(),
                name: "새 작업 항목 명칭 기입",
                start: 0,
                end: currentMode === 'hour' ? 12 : 2
            });
            saveData(); renderRows();
        }

        function deleteRow(id) {
            let key = getCurrentStorageKey();
            db[key] = db[key].filter(t => t.id !== id);
            saveData(); renderRows();
        }

        function adjustZoom(amt) {
            cellWidth = Math.max(25, Math.min(250, cellWidth + amt));
            renderAll();
        }

        function resetAllData() {
            if (confirm("모든 뎁스의 타임라인 데이터베이스가 영구 삭제됩니다. 진행할까요?")) {
                localStorage.clear(); location.reload();
            }
        }

        function renderAll() {
            renderHeader();
            renderRows();
        }

        window.onload = init;
    </script>
</body>
</html>
