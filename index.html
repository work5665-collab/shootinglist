<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 On-Set Tracker Pro (초정밀 타임라인)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color);
        }

        .title-container { display: flex; align-items: center; gap: 8px; }
        .title-input {
            background: transparent; border: 1px solid transparent; color: var(--text-color);
            font-size: 1.2rem; font-weight: 700; padding: 6px 12px; border-radius: 6px; width: 340px; cursor: pointer;
        }
        .title-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; cursor: text; }

        .navigation-trail {
            display: flex; align-items: center; gap: 6px; font-size: 0.9rem; background: #0f172a; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color);
        }
        .trail-link { color: #f59e0b; cursor: pointer; font-weight: bold; }
        .trail-link:hover { text-decoration: underline; }

        .control-panel { display: flex; gap: 8px; align-items: center; }
        button {
            background-color: var(--primary-color); color: white; border: none;
            padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: #475569; }
        button.danger { background-color: var(--danger-color); }

        .timeline-board { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .timeline-container-scroll { overflow-x: auto; width: 100%; }
        .timeline-table { display: flex; flex-direction: column; width: max-content; position: relative; }

        .table-header { display: flex; flex-direction: column; background: #111827; border-bottom: 2px solid var(--border-color); }
        .header-row { display: flex; }
        .header-frozen-zone {
            width: 420px; min-width: 420px; padding-left: 15px; display: flex; align-items: center;
            font-weight: bold; font-size: 0.85rem; color: var(--text-muted); border-right: 2px solid var(--border-color);
            background: #0f172a; position: sticky; left: 0; z-index: 25; height: 42px;
        }
        .header-grid-zone { display: flex; }
        
        .main-time-cell {
            border-right: 2px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: bold; color: var(--text-color); background: #111827; height: 42px; cursor: pointer;
        }
        .main-time-cell:hover { background: #1e293b; }
        
        .sub-tick-cell {
            border-right: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: var(--text-muted); font-family: monospace; cursor: pointer;
        }
        .sub-tick-cell:hover { background: #1e293b; color: white; }

        .task-row { display: flex; border-bottom: 1px solid var(--border-color); background: var(--card-bg); position: relative; }
        .task-row.completed-shading { opacity: 0.4; background: #0f172a; } 
        .task-row.hidden-node { display: none; }
        
        .task-left-panel {
            width: 420px; min-width: 420px; padding: 6px 8px; border-right: 2px solid var(--border-color);
            display: flex; align-items: center; gap: 6px; background: #1e293b; position: sticky; left: 0; z-index: 15;
        }

        .indent-space { display: inline-block; width: 12px; }
        .toggle-arrow { cursor: pointer; color: #f59e0b; font-weight: bold; padding: 0 2px; font-size: 0.8rem; }
        .task-checkbox { width: 16px; height: 16px; cursor: pointer; z-index: 5; }
        
        .color-dot-palette { display: flex; gap: 2px; }
        .color-dot { width: 8px; height: 8px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        .task-name-input {
            background: transparent; border: 1px solid transparent; color: var(--text-color);
            font-size: 0.8rem; flex: 1; padding: 4px; border-radius: 4px; font-weight: bold; cursor: pointer; min-width: 0;
        }
        .task-name-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; cursor: text; }

        /* 🛠️ 상하위 이동용 드롭다운 스타일 디자인 */
        .parent-selector {
            background: #0f172a; color: var(--text-muted); border: 1px solid var(--border-color);
            font-size: 0.7rem; padding: 2px; border-radius: 4px; width: 65px; cursor: pointer;
        }

        .task-right-track { position: relative; display: flex; background: #0f172a; height: 52px; }
        .track-grid-unit { border-right: 1px dashed rgba(51, 65, 85, 0.2); height: 100%; }

        .time-bar-element {
            position: absolute; height: 34px; top: 9px;
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; z-index: 5;
        }
        
        .time-bar-element.auto-gap-bar {
            background: repeating-linear-gradient(45deg, #115e59, #115e59 8px, #134e4a 8px, #134e4a 16px) !important;
            border: 1px dashed #2dd4bf;
        }

        .bar-label { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 700; color: white; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 4px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .resizer { width: 8px; height: 100%; background: rgba(255, 255, 255, 0.2); cursor: ew-resize; z-index: 10; }
        .resizer:hover { background: rgba(255, 255, 255, 0.5); }

        .archive-section { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-top: 10px; }
        .archive-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .archive-content { display: none; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .archive-content.open { display: block; }
        
        .archived-item { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-bottom: 1px solid #334155; background: #111827; border-radius: 6px; margin-bottom: 8px; }
        .archive-top { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <input type="text" id="main-title" class="title-input" value="🎬 On-Set Tracker Pro (초정밀 타임라인)">
        </div>
        
        <div class="navigation-trail" id="nav-trail-container"></div>

        <div class="control-panel">
            <button onclick="addNewRow()">➕ 최상위 항목 추가</button>
            <button class="secondary" onclick="adjustZoom(-10)">➖ 축소</button>
            <button class="secondary" onclick="adjustZoom(10)">➕ 확대</button>
            <button class="danger" onclick="resetAllData()">🔄 초기화</button>
        </div>
    </header>

    <div class="timeline-board">
        <div class="timeline-container-scroll">
            <div class="timeline-table">
                <div class="table-header" id="master-render-header"></div>
                <div id="dynamic-rows-container"></div>
            </div>
        </div>
    </div>

    <div class="archive-section">
        <div class="archive-header" onclick="toggleArchiveView()">
            <h3>📦 완료된 항목 프로덕션 피드백</h3>
            <div style="background:#334155; padding:4px 10px; border-radius:6px; font-size:0.8rem; color:#f59e0b; font-weight:bold;" id="archive-count-badge">0개 완료됨</div>
        </div>
        <div class="archive-content" id="archive-content-panel"></div>
    </div>

    <script>
        const MONTH_DAYS = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        const MONTH_STARTS = [];
        let acc = 0;
        for(let m=0; m<12; m++) {
            MONTH_STARTS.push(acc);
            acc += MONTH_DAYS[m];
        }

        let state = {
            viewMode: 'ALL', 
            focusMonth: 0,   
            focusWeek: 0,    
            focusDay: 0,     
            projectFocusId: null, 
            cellWidth: 60,
            titleBackup: "",
            inputBackups: {},
            collapsedNodes: {},
            colorPointer: 0, // 하위 목록 색상 순환용 포인터
            tasks: [
                { id: "p-1", parentId: null, name: "메인 프로덕션 빌드업", start: 0, end: 85, color: "#3b82f6", checked: false },
                { id: "p-2", parentId: "p-1", name: "세부 연출 콘티 확정", start: 0, end: 35, color: "#a855f7", checked: false },
                { id: "p-3", parentId: "p-1", name: "현장 장비 셋업 가이드", start: 60, end: 85, color: "#eab308", checked: false }
            ]
        };

        const PALETTE = ["#3b82f6", "#a855f7", "#eab308", "#10b981", "#ef4444"];
        const DAYS_OF_WEEK = ["일", "월", "화", "수", "목", "금", "토"];

        function getDayOfWeekString(dayIndex) {
            let d = new Date(2026, 0, dayIndex + 1);
            return DAYS_OF_WEEK[d.getDay()];
        }

        function getWeeksMapOfMonth(mIdx) {
            let totalDays = MONTH_DAYS[mIdx];
            let startDayIdx = MONTH_STARTS[mIdx];
            let weeks = [];
            let current = [];
            for (let d = 0; d < totalDays; d++) {
                current.push(startDayIdx + d);
                if (current.length === 7 || d === totalDays - 1) {
                    weeks.push(current);
                    current = [];
                }
            }
            return weeks;
        }

        function init() {
            const saved = localStorage.getItem('onset_tracker_absolute_v15');
            if (saved) state = JSON.parse(saved);
            setupTitleInput();
            fillTimeGapsWithTasks();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('onset_tracker_absolute_v15', JSON.stringify(state));
        }

        function setupTitleInput() {
            const titleInput = document.getElementById('main-title');
            titleInput.onfocus = () => { state.titleBackup = titleInput.value; };
            titleInput.onblur = () => { titleInput.value = state.titleBackup; }; 
            titleInput.onkeydown = (e) => {
                if (e.key === 'Enter') { state.titleBackup = titleInput.value; titleInput.blur(); saveData(); }
                else if (e.key === 'Escape') { titleInput.value = state.titleBackup; titleInput.blur(); }
            };
        }

        function renderTrail() {
            const container = document.getElementById('nav-trail-container');
            container.innerHTML = '';
            let html = `<span class="trail-link" onclick="clearProjectFocus(); changeView('ALL')">🏠 2026년 전체</span>`;
            
            if (state.viewMode === 'MONTH' || state.viewMode === 'WEEK' || state.viewMode === 'DAY') {
                html += ` <span>&gt;</span> <span class="trail-link" onclick="changeView('MONTH', ${state.focusMonth})">${state.focusMonth + 1}월</span>`;
            }
            if (state.viewMode === 'WEEK' || state.viewMode === 'DAY') {
                html += ` <span>&gt;</span> <span class="trail-link" onclick="changeView('WEEK', ${state.focusMonth}, ${state.focusWeek})">${state.focusWeek + 1}주차</span>`;
            }
            if (state.viewMode === 'DAY') {
                let weeks = getWeeksMapOfMonth(state.focusMonth);
                let dayAbs = weeks[state.focusWeek][state.focusDay];
                let dateNum = dayAbs - MONTH_STARTS[state.focusMonth] + 1;
                html += ` <span>&gt;</span> <span class="trail-link">${dateNum}일(${getDayOfWeekString(dayAbs)}) 초정밀</span>`;
            }
            if (state.projectFocusId) {
                let pTask = state.tasks.find(t => t.id === state.projectFocusId);
                if (pTask) {
                    html += ` <span style="color:#2dd4bf; margin-left:6px; font-weight:bold;">[🎯 뷰: ${pTask.name}]</span> <span class="trail-link" style="color:var(--danger-color);" onclick="clearProjectFocus()">✕ 해제</span>`;
                }
            }
            container.innerHTML = html;
        }

        function clearProjectFocus() {
            state.projectFocusId = null;
            saveData(); renderAll();
        }

        function changeView(mode, m = 0, w = 0, d = 0) {
            state.viewMode = mode; state.focusMonth = m; state.focusWeek = w; state.focusDay = d;
            state.cellWidth = (mode === 'DAY') ? 45 : 65;
            renderAll();
        }

        function getActiveTimeRange() {
            if (state.viewMode === 'ALL') return { start: 0, end: 365, step: 'MONTH' };
            if (state.viewMode === 'MONTH') {
                return { start: MONTH_STARTS[state.focusMonth], end: MONTH_STARTS[state.focusMonth] + MONTH_DAYS[state.focusMonth], step: 'DAY' };
            }
            if (state.viewMode === 'WEEK') {
                let weeks = getWeeksMapOfMonth(state.focusMonth);
                let currentWeek = weeks[state.focusWeek];
                return { start: currentWeek[0], end: currentWeek[currentWeek.length - 1] + 1, step: 'DAY' };
            }
            if (state.viewMode === 'DAY') {
                let weeks = getWeeksMapOfMonth(state.focusMonth);
                let dayAbs = weeks[state.focusWeek][state.focusDay];
                return { start: dayAbs, end: dayAbs + 1, step: 'MINUTE' };
            }
        }

        function renderHeader() {
            const wrapper = document.getElementById('master-render-header');
            wrapper.innerHTML = '';

            const row1 = document.createElement('div'); row1.className = 'header-row';
            const row2 = document.createElement('div'); row2.className = 'header-row';

            const f1 = document.createElement('div'); f1.className = 'header-frozen-zone'; f1.innerText = "진행 단계 / 컷 목록";
            const f2 = document.createElement('div'); f2.className = 'header-frozen-zone'; f2.innerText = "2026년 실제 달력 스케일 연동";
            row1.appendChild(f1); row2.appendChild(f2);

            const g1 = document.createElement('div'); g1.className = 'header-grid-zone';
            const g2 = document.createElement('div'); g2.className = 'header-grid-zone';

            if (state.viewMode === 'ALL') {
                for (let m = 0; m < 12; m++) {
                    let weeks = getWeeksMapOfMonth(m);
                    const cell = document.createElement('div');
                    cell.className = 'main-time-cell'; cell.style.width = `${state.cellWidth * weeks.length}px`;
                    cell.innerText = `${m + 1}월`;
                    cell.onclick = () => changeView('MONTH', m);
                    g1.appendChild(cell);

                    weeks.forEach((wDays, wIdx) => {
                        const sub = document.createElement('div'); sub.className = 'sub-tick-cell';
                        sub.style.width = `${state.cellWidth}px`; sub.innerText = `${wIdx + 1}주`;
                        sub.onclick = () => changeView('WEEK', m, wIdx);
                        g2.appendChild(sub);
                    });
                }
            } else if (state.viewMode === 'MONTH') {
                const cell = document.createElement('div');
                cell.className = 'main-time-cell'; cell.style.width = `${state.cellWidth * MONTH_DAYS[state.focusMonth]}px`;
                cell.innerText = `${state.focusMonth + 1}월 집중 스케일`;
                cell.onclick = () => changeView('ALL');
                g1.appendChild(cell);

                let weeks = getWeeksMapOfMonth(state.focusMonth);
                for (let d = 0; d < MONTH_DAYS[state.focusMonth]; d++) {
                    let absDay = MONTH_STARTS[state.focusMonth] + d;
                    const sub = document.createElement('div'); sub.className = 'sub-tick-cell';
                    sub.style.width = `${state.cellWidth}px`;
                    let yoil = getDayOfWeekString(absDay);
                    sub.innerHTML = `${d + 1}<span style="font-size:0.55rem;color:var(--text-muted);">(${yoil})</span>`;
                    
                    let wIdx = weeks.findIndex(w => w.includes(absDay));
                    sub.onclick = () => changeView('WEEK', state.focusMonth, wIdx);
                    g2.appendChild(sub);
                }
            } else if (state.viewMode === 'WEEK') {
                let weeks = getWeeksMapOfMonth(state.focusMonth);
                let currentWeekDays = weeks[state.focusWeek];

                const cell = document.createElement('div');
                cell.className = 'main-time-cell'; cell.style.width = `${state.cellWidth * currentWeekDays.length}px`;
                cell.innerText = `${state.focusMonth + 1}월 ${state.focusWeek + 1}주차 상세`;
                cell.onclick = () => changeView('MONTH', state.focusMonth);
                g1.appendChild(cell);

                currentWeekDays.forEach((absDay, dIdx) => {
                    const sub = document.createElement('div'); sub.className = 'sub-tick-cell';
                    sub.style.width = `${state.cellWidth}px`;
                    let dateNum = absDay - MONTH_STARTS[state.focusMonth] + 1;
                    let yoil = getDayOfWeekString(absDay);
                    sub.innerHTML = `${dateNum}일<span style="font-size:0.55rem;color:var(--text-muted);">(${yoil})</span>`;
                    sub.onclick = () => changeView('DAY', state.focusMonth, state.focusWeek, dIdx);
                    g2.appendChild(sub);
                });
            } else if (state.viewMode === 'DAY') {
                for(let h=0; h<24; h++) {
                    const cell = document.createElement('div');
                    cell.className = 'main-time-cell'; cell.style.width = `${state.cellWidth * 12}px`;
                    cell.innerText = `${h}시`;
                    g1.appendChild(cell);

                    for(let m=0; m<12; m++) {
                        const sub = document.createElement('div'); sub.className = 'sub-tick-cell';
                        sub.style.width = `${state.cellWidth}px`; sub.innerText = `${String(m*5).padStart(2, '0')}`;
                        g2.appendChild(sub);
                    }
                }
            }

            row1.appendChild(g1); row2.appendChild(g2);
            wrapper.appendChild(row1); wrapper.appendChild(row2);
        }

        // 🛠️ 대대적 알고리즘 튜닝: 형제 항목들 전체 집합의 '순수 공백(Timeline Union Complement)'을 역산하여 중복 완벽 제거
        function fillTimeGapsWithTasks() {
            let parentIds = [...new Set(state.tasks.map(t => t.parentId).filter(p => p !== null))];
            let createdAny = false;

            // 순수 갭 자동 생성 항목 초기화 (텍스트를 직접 편집해서 사용 중인 항목은 보존)
            state.tasks = state.tasks.filter(t => !t.id.startsWith('auto-gap-') || t.name !== '휴식 및 정비');

            parentIds.forEach(pId => {
                let parent = state.tasks.find(t => t.id === pId);
                if (!parent) return;

                // 해당 부모 아래 소속된 모든 커스텀 자식 항목들 수집
                let children = state.tasks.filter(t => t.parentId === pId && t.color !== 'auto-gap-emerald');
                
                // 시간축 타임 라인 맵 배열 생성 (부모의 스케일 길이만큼 크기 할당)
                let parentDuration = parent.end - parent.start;
                if (parentDuration <= 0) return;

                let occupied = new Array(parentDuration).fill(false);

                // 자식들이 점유한 영역을 타임 블록 맵에 꼼꼼히 기록
                children.forEach(c => {
                    let relStart = Math.max(0, c.start - parent.start);
                    let relEnd = Math.min(parentDuration, c.end - parent.start);
                    for (let i = relStart; i < relEnd; i++) {
                        occupied[i] = true;
                    }
                });

                // 점유되지 않은 연속된 공백(여백) 구간 검출 스캐너 구동
                let inGap = false;
                let gapStart = 0;

                for (let i = 0; i <= parentDuration; i++) {
                    let isVacant = (i < parentDuration) ? !occupied[i] : false;

                    if (!inGap && isVacant) {
                        inGap = true;
                        gapStart = i;
                    } else if (inGap && !isVacant) {
                        inGap = false;
                        let absStart = parent.start + gapStart;
                        let absEnd = parent.start + i;

                        if (absStart < absEnd) {
                            state.tasks.push({
                                id: "auto-gap-" + Date.now() + "-" + Math.random(),
                                parentId: pId,
                                name: "휴식 및 정비",
                                start: absStart,
                                end: absEnd,
                                color: "auto-gap-emerald",
                                checked: false
                            });
                            createdAny = true;
                        }
                    }
                }
            });

            if (createdAny) saveData();
        }

        function getDepth(task) {
            let depth = 0; let p = state.tasks.find(t => t.id === task.parentId);
            while(p) { depth++; p = state.tasks.find(t => t.id === p.parentId); }
            return depth;
        }

        function isAncestorCollapsed(task) {
            let p = state.tasks.find(t => t.id === task.parentId);
            while(p) { if (state.collapsedNodes[p.id]) return true; p = state.tasks.find(t => t.id === p.parentId); }
            return false;
        }

        function isFilteredByProjectFocus(task) {
            if (!state.projectFocusId) return false;
            if (task.id === state.projectFocusId) return false;
            
            let p = state.tasks.find(t => t.id === task.parentId);
            while(p) {
                if (p.id === state.projectFocusId) return false;
                p = state.tasks.find(t => t.id === p.parentId);
            }
            return true;
        }

        function updateParentTimeChain(parentId) {
            if (!parentId) return;
            let parent = state.tasks.find(t => t.id === parentId);
            if (!parent) return;

            let children = state.tasks.filter(t => t.parentId === parentId);
            if (children.length > 0) {
                parent.start = Math.min(...children.map(c => c.start));
                parent.end = Math.max(...children.map(c => c.end));
            }
            if (parent.parentId) updateParentTimeChain(parent.parentId);
        }

        function moveAllChildrenSet(parentId, delta) {
            let children = state.tasks.filter(t => t.parentId === parentId);
            children.forEach(c => {
                c.start += delta;
                c.end += delta;
                moveAllChildrenSet(c.id, delta); 
            });
        }

        // 🛠️ 상하위 계층 이동 모듈용 트리 구조 변경 핸들러
        function changeTaskParent(taskId, newParentId) {
            let task = state.tasks.find(t => t.id === taskId);
            if (!task) return;

            let oldParentId = task.parentId;

            if (newParentId === "NONE") {
                task.parentId = null;
            } else {
                // 순환 참조(자식을 자기 부모로 선택하는 현상) 방지 코드 가드
                let p = state.tasks.find(t => t.id === newParentId);
                let cyclical = false;
                while (p) {
                    if (p.id === taskId) { cyclical = true; break; }
                    p = state.tasks.find(t => t.id === p.parentId);
                }
                if (!cyclical) task.parentId = newParentId;
            }

            // 부모 구조가 바뀐 항목의 색상이 'auto-gap-emerald'라면 일반 업무 컬러로 강제 변환
            if (task.color === 'auto-gap-emerald') {
                task.color = PALETTE[0];
            }

            updateParentTimeChain(oldParentId);
            updateParentTimeChain(task.parentId);
            fillTimeGapsWithTasks();
            saveData(); renderAll();
        }

        // 🛠️ 간편 간결 원터치 항목 복제 기능
        function duplicateTask(taskId) {
            let src = state.tasks.find(t => t.id === taskId);
            if (!src) return;

            let newId = "p_" + Date.now() + "_" + Math.floor(Math.random()*1000);
            let dup = {
                id: newId,
                parentId: src.parentId,
                name: src.name + " (복사본)",
                start: src.start,
                end: src.end,
                color: src.color === 'auto-gap-emerald' ? PALETTE[0] : src.color,
                checked: false
            };

            state.tasks.push(dup);
            updateParentTimeChain(src.parentId);
            fillTimeGapsWithTasks();
            saveData(); renderAll();
        }

        function renderRows() {
            const container = document.getElementById('dynamic-rows-container');
            container.innerHTML = '';

            let timeConfig = getActiveTimeRange();
            let totalVisibleUnits = (state.viewMode === 'ALL') ? 52 : (timeConfig.end - timeConfig.start); 
            if (state.viewMode === 'DAY') totalVisibleUnits = 288;

            let sortedTasks = [...state.tasks].sort((a, b) => a.start - b.start);
            let treeSorted = [];
            function buildTree(pId) {
                sortedTasks.filter(t => t.parentId === pId).forEach(t => {
                    treeSorted.push(t); buildTree(t.id);
                });
            }
            buildTree(null);

            // 최상위 및 그룹 항목들 목록 추출 (드롭다운 바인딩용 세트)
            let potentialParents = state.tasks.filter(t => t.color !== 'auto-gap-emerald');

            treeSorted.forEach(task => {
                if (isAncestorCollapsed(task) || isFilteredByProjectFocus(task)) return;

                let isParentNode = state.tasks.some(t => t.parentId === task.id);
                const row = document.createElement('div');
                row.className = `task-row ${task.checked ? 'completed-shading' : ''}`;

                const left = document.createElement('div'); left.className = 'task-left-panel';
                let depth = getDepth(task);
                for(let d=0; d<depth; d++) {
                    let space = document.createElement('span'); space.className = 'indent-space'; left.appendChild(space);
                }

                if (isParentNode) {
                    const arrow = document.createElement('span'); arrow.className = 'toggle-arrow';
                    arrow.innerText = state.collapsedNodes[task.id] ? "▶" : "▼";
                    arrow.onclick = (e) => {
                        e.stopPropagation(); state.collapsedNodes[task.id] = !state.collapsedNodes[task.id];
                        saveData(); renderRows();
                    };
                    left.appendChild(arrow);
                } else {
                    let space = document.createElement('span'); space.className = 'indent-space'; left.appendChild(space);
                }

                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'task-checkbox';
                cb.checked = task.checked;
                cb.onchange = () => { task.checked = cb.checked; saveData(); renderAll(); };
                left.appendChild(cb);

                const pal = document.createElement('div'); pal.className = 'color-dot-palette';
                PALETTE.forEach(c => {
                    const dot = document.createElement('div'); dot.className = 'color-dot'; dot.style.backgroundColor = c;
                    dot.onclick = () => { task.color = c; saveData(); renderRows(); };
                    pal.appendChild(dot);
                });
                left.appendChild(pal);

                const nameInput = document.createElement('input'); nameInput.className = 'task-name-input';
                nameInput.value = task.name;
                nameInput.onfocus = () => { state.inputBackups[task.id] = nameInput.value; };
                nameInput.onblur = () => { nameInput.value = state.inputBackups[task.id]; };
                nameInput.onkeydown = (e) => {
                    if (e.key === 'Enter') {
                        state.inputBackups[task.id] = nameInput.value;
                        task.name = nameInput.value; 
                        
                        // 만약 자동 생성 여백 항목의 텍스트를 고쳤다면 실제 일반 개별 태스크 처리 격상 유도
                        if (task.id.startsWith('auto-gap-')) {
                            task.color = PALETTE[0]; 
                        }
                        
                        nameInput.blur(); fillTimeGapsWithTasks(); saveData(); renderAll();
                    } else if (e.key === 'Escape') {
                        nameInput.value = state.inputBackups[task.id]; nameInput.blur();
                    }
                };
                left.appendChild(nameInput);

                // 🛠️ 상하위 이동용 드롭다운 구조 UI 배치 구현부
                const sel = document.createElement('select'); sel.className = 'parent-selector';
                sel.innerHTML = `<option value="NONE">최상위</option>`;
                potentialParents.forEach(p => {
                    if (p.id !== task.id) {
                        let selectedAttr = (task.parentId === p.id) ? 'selected' : '';
                        sel.innerHTML += `<option value="${p.id}" ${selectedAttr}>포함: ${p.name.substring(0,6)}...</option>`;
                    }
                });
                sel.onchange = (e) => { changeTaskParent(task.id, e.target.value); };
                left.appendChild(sel);

                // 🛠️ 간편 원터치 복제 버튼 주입 구현부
                const dupBtn = document.createElement('button'); dupBtn.style.padding = '3px 5px'; dupBtn.style.fontSize = '0.7rem'; dupBtn.style.backgroundColor = '#4b5563'; dupBtn.innerText = "📋";
                dupBtn.title = "이 항목 간편 복제";
                dupBtn.onclick = () => { duplicateTask(task.id); };
                left.appendChild(dupBtn);

                const subAddBtn = document.createElement('button'); subAddBtn.style.padding = '3px 5px'; subAddBtn.style.fontSize = '0.7rem'; subAddBtn.innerText = "➕";
                subAddBtn.onclick = () => { addChildRow(task.id); };
                left.appendChild(subAddBtn);

                const delBtn = document.createElement('button'); delBtn.className = 'danger'; delBtn.style.padding = '3px 5px'; delBtn.innerText = "✕";
                delBtn.onclick = () => { 
                    let pId = task.parentId;
                    state.tasks = state.tasks.filter(t => t.id !== task.id); 
                    if(pId) updateParentTimeChain(pId);
                    fillTimeGapsWithTasks(); saveData(); renderAll(); 
                };
                left.appendChild(delBtn);

                row.appendChild(left);

                const rightTrack = document.createElement('div'); rightTrack.className = 'task-right-track';
                rightTrack.style.width = `${totalVisibleUnits * state.cellWidth}px`;

                for (let i = 0; i < totalVisibleUnits; i++) {
                    const unit = document.createElement('div'); unit.className = 'track-grid-unit'; unit.style.width = `${state.cellWidth}px`;
                    rightTrack.appendChild(unit);
                }

                let barRenderable = false;
                let renderLeftCell = 0;
                let renderWidthCells = 0;
                let unitText = "";

                if (state.viewMode === 'ALL') {
                    let totalYearWeeks = 52; 
                    let sWeek = Math.floor((task.start / 365) * totalYearWeeks);
                    let eWeek = Math.ceil((task.end / 365) * totalYearWeeks);
                    if (sWeek < totalYearWeeks && eWeek > 0) {
                        barRenderable = true;
                        renderLeftCell = Math.max(0, sWeek);
                        renderWidthCells = Math.min(totalYearWeeks, eWeek) - renderLeftCell;
                        unitText = `${Math.ceil((task.end - task.start)/7)}주간`;
                    }
                } else if (state.viewMode === 'MONTH' || state.viewMode === 'WEEK') {
                    let oStart = Math.max(timeConfig.start, task.start);
                    let oEnd = Math.min(timeConfig.end, task.end);
                    if (oStart < oEnd) {
                        barRenderable = true;
                        renderLeftCell = oStart - timeConfig.start;
                        renderWidthCells = oEnd - oStart;
                        unitText = `${task.end - task.start}일간`;
                    }
                } else if (state.viewMode === 'DAY') {
                    if (task.start <= timeConfig.start && task.end > timeConfig.start) {
                        barRenderable = true;
                        renderLeftCell = 0;
                        renderWidthCells = 288;
                        unitText = "하루 종일";
                    }
                }

                if (barRenderable && renderWidthCells > 0) {
                    const bar = document.createElement('div'); 
                    bar.className = 'time-bar-element';
                    
                    if (task.color === 'auto-gap-emerald') {
                        bar.classList.add('auto-gap-bar');
                    } else {
                        bar.style.backgroundColor = task.color || '#3b82f6';
                    }

                    bar.style.left = `${renderLeftCell * state.cellWidth}px`;
                    bar.style.width = `${renderWidthCells * state.cellWidth}px`;

                    const hL = document.createElement('div'); hL.className = 'resizer';
                    const lbl = document.createElement('div'); lbl.className = 'bar-label';
                    lbl.innerHTML = `<span>⏳ ${task.name} (${unitText})</span>`;
                    
                    // 🛠️ 충돌 방지 가드가 적용된 정밀 프로젝트 집중뷰 트리거 시스템
                    let clickMoveGuard = false;
                    lbl.onmousedown = (e) => {
                        clickMoveGuard = false;
                    };
                    lbl.onmousemove = () => {
                        clickMoveGuard = true; // 드래그 중일 땐 집중뷰 이벤트 발동안함
                    };
                    lbl.onmouseup = (e) => {
                        e.stopPropagation();
                        if (!clickMoveGuard && isParentNode) {
                            state.projectFocusId = task.id;
                            saveData(); renderAll();
                        }
                    };

                    const hR = document.createElement('div'); hR.className = 'resizer';

                    if (!isParentNode) {
                        bar.appendChild(hL); bar.appendChild(lbl); bar.appendChild(hR);
                        hL.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'left', e.clientX); };
                        hR.onmousedown = (e) => { e.stopPropagation(); startDrag(task.id, 'right', e.clientX); };
                        lbl.onmousedown = (e) => { e.stopPropagation(); if (e.buttons === 1) startDrag(task.id, 'move', e.clientX); };
                    } else {
                        bar.appendChild(lbl);
                        lbl.style.cursor = 'move';
                        lbl.onmousedown = (e) => { e.stopPropagation(); if (e.buttons === 1) startDrag(task.id, 'move', e.clientX); };
                    }

                    rightTrack.appendChild(bar);
                }

                row.appendChild(rightTrack);
                container.appendChild(row);
            });
        }

        let currentDragId = null, dragType = null, dragStartX = 0, dragStartS = 0, dragStartE = 0;
        let originalTasksState = [];

        function startDrag(id, type, x) {
            currentDragId = id; dragType = type; dragStartX = x;
            let task = state.tasks.find(t => t.id === id);
            dragStartS = task.start; dragStartE = task.end;
            originalTasksState = JSON.parse(JSON.stringify(state.tasks));
            
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', endDrag);
        }

        function onDragMove(e) {
            if (!currentDragId) return;
            let deltaX = e.clientX - dragStartX;
            let cellDelta = Math.round(deltaX / state.cellWidth);

            if (state.viewMode === 'ALL') {
                cellDelta = Math.round(cellDelta * (365 / 52));
            }

            state.tasks = JSON.parse(JSON.stringify(originalTasksState));
            let task = state.tasks.find(t => t.id === currentDragId);

            if (dragType === 'move') {
                let ns = dragStartS + cellDelta;
                let ne = dragStartE + cellDelta;
                if (ns >= 0 && ne <= 365) { 
                    task.start = ns; 
                    task.end = ne; 
                    moveAllChildrenSet(task.id, cellDelta);
                }
            } else if (dragType === 'left') {
                let ns = dragStartS + cellDelta;
                if (ns >= 0 && ns < task.end) task.start = ns;
            } else if (dragType === 'right') {
                let ne = dragStartE + cellDelta;
                if (ne > task.start && ne <= 365) task.end = ne;
            }

            updateParentTimeChain(task.parentId);
            renderRows();
        }

        function endDrag() {
            currentDragId = null;
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', endDrag);
            
            fillTimeGapsWithTasks();
            saveData();
            renderAll(); 
        }

        function addNewRow() {
            state.tasks.push({
                id: "p_" + Date.now(), parentId: null,
                name: "새로운 최상위 마스터 공정", start: 0, end: 45,
                color: "#3b82f6", checked: false
            });
            fillTimeGapsWithTasks(); saveData(); renderAll();
        }

        function addChildRow(pId) {
            let p = state.tasks.find(t => t.id === pId);
            
            // 🛠️ 색상 팔레트 순서대로 자동 로테이션 분배
            let assignedColor = PALETTE[state.colorPointer % PALETTE.length];
            state.colorPointer++;

            state.tasks.push({
                id: "p_" + Date.now(), parentId: pId,
                name: "└ 세부 서브 태스크 라인", start: p.start, end: Math.min(p.end, p.start + 15),
                color: assignedColor, checked: false
            });
            state.collapsedNodes[pId] = false;
            updateParentTimeChain(pId);
            fillTimeGapsWithTasks(); saveData(); renderAll();
        }

        function renderArchive() {
            const container = document.getElementById('archive-content-panel');
            const badge = document.getElementById('archive-count-badge');
            let completed = state.tasks.filter(t => t.checked);
            badge.innerText = `${completed.length}개 완료됨`;

            if (completed.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:10px;">완료 보관함이 비어있습니다.</div>`;
                return;
            }

            let html = '';
            completed.forEach(task => {
                html += `
                    <div class="archived-item">
                        <div class="archive-top">
                            <span>🟩 <strong>${task.name}</strong></span>
                            <button class="secondary" style="padding:4px 8px; font-size:0.75rem;" onclick="restoreTask('${task.id}')">🔄 타임라인 복원</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function restoreTask(id) {
            let task = state.tasks.find(t => t.id === id);
            if (task) { task.checked = false; saveData(); renderAll(); }
        }

        function toggleArchiveView() { document.getElementById('archive-content-panel').classList.toggle('open'); }
        function adjustZoom(amt) { state.cellWidth = Math.max(25, Math.min(200, state.cellWidth + amt)); renderAll(); }
        function resetAllData() { if (confirm("모든 데이터를 포맷팅하시겠습니까?")) { localStorage.clear(); location.reload(); } }

        function renderAll() {
            renderTrail();
            renderHeader();
            renderRows();
            renderArchive();
        }

        window.onload = init;
    </script>
</body>
</html>
