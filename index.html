<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 On-Set Tracker (촬영 마스터 플랜)</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
            --danger-color: #ef4444;
            
            /* 유닛별 지정 컬러들 */
            --color-orange: linear-gradient(90deg, #f59e0b, #d97706);
            --color-purple: linear-gradient(90deg, #a855f7, #7e22ce);
            --color-blue: linear-gradient(90deg, #3b82f6, #1d4ed8);
            --color-teal: linear-gradient(90deg, #14b8a6, #0f766e);
            --color-red: linear-gradient(90deg, #f43f5e, #be123c);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .header-title-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .control-panel {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button.secondary {
            background-color: #475569;
        }
        button.secondary:hover {
            background-color: #334155;
        }

        button.danger {
            background-color: var(--danger-color);
        }
        button.danger:hover {
            background-color: #dc2626;
        }

        .toggle-container {
            display: flex;
            background: #111827;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .toggle-btn {
            background: transparent;
            color: var(--text-muted);
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* 메인 타임라인 디자인 */
        .timeline-container {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .timeline-scroll-area {
            overflow-x: auto;
            width: 100%;
        }

        .timeline-table {
            display: flex;
            flex-direction: column;
            min-width: 1400px;
            position: relative;
        }

        /* 이중 구조 헤더 (시간 + 분) */
        .table-header {
            display: flex;
            background-color: #111827;
            border-bottom: 2px solid var(--border-color);
            height: 65px;
            flex-direction: column;
        }

        .header-top-row {
            display: flex;
            height: 35px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-bottom-row {
            display: flex;
            height: 30px;
        }

        .header-task-title {
            width: 320px;
            min-width: 320px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border-color);
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-color);
            background: #0f172a;
        }

        .time-slots-container {
            display: flex;
            width: 100%;
        }

        .time-slot-major {
            flex: 12; /* 12칸(60분) 공간 확보 */
            border-right: 2px solid #475569;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111827;
            color: var(--text-color);
        }

        .time-slot-minor-container {
            display: flex;
            width: 100%;
        }

        .time-slot-minor {
            flex: 1;
            border-right: 1px dashed rgba(51, 65, 85, 0.4);
            font-size: 0.65rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0f19;
        }

        .time-slot-minor:nth-child(12n) {
            border-right: 2px solid #475569;
        }

        /* 행 (Row) 디자인 */
        .task-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            position: relative;
        }

        .task-row.completed {
            opacity: 0.4;
            background-color: #0f172a;
        }

        .task-row.auto-break {
            background-color: rgba(245, 158, 11, 0.04);
        }

        /* 좌측 정보 영역 (320px 고정) */
        .task-info {
            width: 320px;
            min-width: 320px;
            padding: 10px 12px;
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e293b;
            z-index: 10;
        }

        .task-info input[type="text"] {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            font-size: 0.85rem;
            width: 100%;
            font-weight: 500;
            padding: 4px 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .task-info input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #0f172a;
        }

        .btn-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #64748b;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .completed .btn-check {
            background: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        /* 유닛별 컬러 셀렉터 */
        .color-picker {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.2);
        }

        .color-dot.active {
            border: 2px solid white;
            box-shadow: 0 0 4px white;
        }

        /* 우측 그리드 영역 */
        .timeline-grid {
            display: grid;
            grid-template-columns: repeat(120, 1fr);
            width: 100%;
            height: 60px;
            position: relative;
            background-color: #0f172a;
        }

        .grid-cell {
            border-right: 1px dashed rgba(51, 65, 85, 0.4);
            height: 100%;
        }

        .grid-cell:nth-child(12n) {
            border-right: 2px solid #475569;
        }

        /* 드래그 가능 컬러 타임 바 */
        .time-bar {
            position: absolute;
            height: 38px;
            top: 11px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: grab;
            touch-action: none;
            z-index: 5;
            transition: background 0.1s;
        }

        .time-bar:active {
            cursor: grabbing;
        }

        /* 테마별 그라데이션 */
        .bar-orange { background: var(--color-orange); box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        .bar-purple { background: var(--color-purple); box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }
        .bar-blue   { background: var(--color-blue);   box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        .bar-teal   { background: var(--color-teal);   box-shadow: 0 0 10px rgba(20, 184, 166, 0.4); }
        .bar-red    { background: var(--color-red);    box-shadow: 0 0 10px rgba(244, 63, 94, 0.4); }

        .resize-handle {
            width: 12px;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            cursor: ew-resize;
            transition: background 0.2s;
        }

        .resize-handle:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .resize-handle.left { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .resize-handle.right { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

        /* 실시간 인디케이터 (Red Line) */
        .current-time-indicator {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: var(--danger-color);
            z-index: 8;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
        }

        .current-time-indicator::after {
            content: "NOW";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger-color);
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 3px;
            white-space: nowrap;
        }

        /* 완료 영역 */
        .completed-section {
            background: #111827;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 15px;
        }

        .completed-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .completed-list {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            gap: 1px;
            background: var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .completed-list.active {
            display: flex;
        }

        .info-bar {
            background: #1e293b;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-bar span strong {
            color: #f59e0b;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title-area">
            <h1>🎬 On-Set Tracker (촬영 마스터 플랜)</h1>
            <div style="font-size: 0.8rem; color: var(--text-muted);" id="current-clock">현재 실제 시간: Loading...</div>
        </div>
        <div class="control-panel">
            <div class="toggle-container">
                <button class="toggle-btn active" id="mode-real" onclick="switchTimeMode('real')">실제 시간 (08:00~)</button>
                <button class="toggle-btn" id="mode-run" onclick="switchTimeMode('run')">진행 시간 (00:00~)</button>
            </div>
            <button onclick="addNewRow()">＋ 촬영 항목 추가</button>
            <button class="danger" onclick="resetLocalStorage()">🔄 초기화 (새로 짜기)</button>
            <button class="secondary" onclick="toggleCompletedSection()">📦 완료 보관함 (<span id="completed-count">0</span>)</button>
        </div>
    </header>

    <div class="info-bar">
        <span>💡 <strong>실시간 로컬 자동 저장 활성화 중!</strong> 새로고침을 하거나 창을 닫아도 소중한 계획이 그대로 유지됩니다.</span>
        <span id="active-task-alert">🚨 지금 할 일: -</span>
    </div>

    <div class="timeline-container">
        <div class="timeline-scroll-area">
            <div class="timeline-table">
                <div class="table-header">
                    <div class="header-top-row" id="header-top">
                        </div>
                    <div class="header-bottom-row" id="header-bottom">
                        </div>
                </div>

                <div id="task-rows-container">
                    </div>

                <div class="current-time-indicator" id="red-line"></div>
            </div>
        </div>
    </div>

    <div class="completed-section">
        <div class="completed-trigger" onclick="toggleCompletedSection()">
            <span>📦 완료된 항목 목록 (사라진 계획들 확인)</span>
            <span id="arrow-icon">▼</span>
        </div>
        <div id="completed-list" class="completed-list">
            </div>
    </div>

    <script>
        // 초기 템플릿 기본값 (로컬 스토리지에 데이터가 없으면 사용)
        const defaultTasks = [
            { id: 1, name: "장비 세팅 및 구도 잡기", startCell: 0, endCell: 12, completed: false, color: "orange", isAutoBreak: false },
            { id: 2, name: "A 카메라 바스트 샷 촬영", startCell: 12, endCell: 24, completed: false, color: "blue", isAutoBreak: false },
            { id: 3, name: "B 마이크 음향 체크 및 조명 조절", startCell: 6, endCell: 18, completed: false, color: "purple", isAutoBreak: false }
        ];

        let tasks = [];
        const totalCells = 120; // 5분 단위 * 12칸 * 10시간 = 총 120칸
        let timeMode = 'real';
        let relativeStartTime = null;

        // 드래그 제어 상태 변수들
        let isDragging = false;
        let isResizingLeft = false;
        let isResizingRight = false;
        let activeTaskId = null;
        let startX = 0;
        let originalStartCell = 0;
        let originalEndCell = 0;

        // 💾 1. 데이터 로드 (Local Storage)
        function loadSavedData() {
            const savedTasks = localStorage.getItem('onset_tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
            } else {
                tasks = JSON.parse(JSON.stringify(defaultTasks));
            }

            const savedTimeMode = localStorage.getItem('onset_time_mode');
            if (savedTimeMode) {
                timeMode = savedTimeMode;
            }

            const savedStartTime = localStorage.getItem('onset_relative_start');
            if (savedStartTime) {
                relativeStartTime = new Date(savedStartTime);
            }
        }

        // 💾 2. 데이터 세이브 (Local Storage)
        function saveData() {
            // 자동 생성된 휴식(isAutoBreak)은 로컬 스토리지 저장 대상에서 제외 (실시간 자동 재생성되므로)
            const userTasksOnly = tasks.filter(t => !t.isAutoBreak);
            localStorage.setItem('onset_tasks', JSON.stringify(userTasksOnly));
            localStorage.setItem('onset_time_mode', timeMode);
            if (relativeStartTime) {
                localStorage.setItem('onset_relative_start', relativeStartTime.toISOString());
            }
        }

        // 💾 3. 완전 초기화 (새로 짜기)
        function resetLocalStorage() {
            if (confirm("현재 작성한 데이터와 정비 현황을 전부 리셋하고 처음 초기상태로 가시겠습니까?")) {
                localStorage.clear();
                relativeStartTime = null;
                timeMode = 'real';
                tasks = JSON.parse(JSON.stringify(defaultTasks));
                saveData();
                location.reload();
            }
        }

        // 🛠️ 4. 정렬 및 자동 휴식(Break Gap) 채우기 코어 로직
        function processTimelineLogic() {
            // 4-1. 먼저 기존의 자동 생성되었던 휴식 정비 제거 (재평가용)
            tasks = tasks.filter(t => !t.isAutoBreak);

            // 4-2. 유저가 생성한 진행 중(체크 해제)인 항목들의 시간 점유 파악
            const activeUserTasks = tasks.filter(t => !t.completed);

            // 4-3. [중첩 작업 정렬] - 더 일찍 시작하고, 더 짧은 게 위로 가도록 정렬!
            activeUserTasks.sort((a, b) => {
                if (a.startCell !== b.startCell) {
                    return a.startCell - b.startCell; // 시작 시간 빠른 순
                }
                const durationA = a.endCell - a.startCell;
                const durationB = b.endCell - b.startCell;
                if (durationA !== durationB) {
                    return durationA - durationB; // 더 짧은(빨리 끝나는) 순
                }
                return a.endCell - b.endCell; // 종료 시간 빠른 순
            });

            // 완료된 태스크 목록 분리
            const completedUserTasks = tasks.filter(t => t.completed);

            // 4-4. [자동 휴식(Gap) 계산기]
            // 0부터 120칸 중 유저 작업이 아무것도 차지하지 않은 구간을 찾아서 자동으로 메워줌
            const occupied = new Array(totalCells).fill(false);
            activeUserTasks.forEach(t => {
                for (let i = t.startCell; i < t.endCell; i++) {
                    if (i >= 0 && i < totalCells) occupied[i] = true;
                }
            });

            let gapStart = null;
            let breakIdCounter = 99000;

            for (let i = 0; i <= totalCells; i++) {
                if (i < totalCells && !occupied[i]) {
                    if (gapStart === null) {
                        gapStart = i;
                    }
                } else {
                    if (gapStart !== null) {
                        // 빈 간격 발견! 자동으로 '휴식 및 정비' 태스크 삽입
                        tasks.push({
                            id: breakIdCounter++,
                            name: "🧹 [자동] 휴식 및 촬영 정비 시간",
                            startCell: gapStart,
                            endCell: i,
                            completed: false,
                            color: "teal",
                            isAutoBreak: true
                        });
                        gapStart = null;
                    }
                }
            }

            // 최종 정렬 반영 조립
            const activeBreaks = tasks.filter(t => t.isAutoBreak);
            
            // 본체 정렬: 정비 바와 사용자 지정 액션 정렬 결합
            const sortedActive = [...activeUserTasks, ...activeBreaks].sort((a, b) => {
                if (a.startCell !== b.startCell) return a.startCell - b.startCell;
                return (a.endCell - a.startCell) - (b.endCell - b.startCell);
            });

            tasks = [...sortedActive, ...completedUserTasks];
        }

        // ⏰ 5. 헤더 렌더링 (이중 구조)
        function renderHeader() {
            const headerTop = document.getElementById('header-top');
            const headerBottom = document.getElementById('header-bottom');

            headerTop.innerHTML = '<div class="header-task-title">진행 단계 / 컷 목록</div>';
            headerBottom.innerHTML = '<div class="header-task-title" style="font-size:0.75rem; color:#64748b; height:100%;">5분 단위 세부 눈금</div>';

            const topGrid = document.createElement('div');
            topGrid.className = 'time-slots-container';

            const bottomGrid = document.createElement('div');
            bottomGrid.className = 'time-slot-minor-container';

            // 큰 시간(1시간) 10칸 생성
            for (let i = 0; i < 10; i++) {
                const slot = document.createElement('div');
                slot.className = 'time-slot-major';
                
                if (timeMode === 'real') {
                    let hour = 8 + i;
                    let ampm = hour >= 12 ? '오후' : '오전';
                    let displayHour = hour > 12 ? hour - 12 : hour;
                    slot.innerText = `${ampm} ${displayHour}시`;
                } else {
                    slot.innerText = `+${String(i).padStart(2, '0')}:00`;
                }
                topGrid.appendChild(slot);

                // 각 시간 아래에 5분 단위 미세 단위 라벨 12개 채우기
                for (let m = 0; m < 12; m++) {
                    const minSlot = document.createElement('div');
                    minSlot.className = 'time-slot-minor';
                    // 가시성을 위해 10분, 30분, 50분 위치에만 분 라벨링
                    const minVal = m * 5;
                    if (minVal === 0) {
                        minSlot.innerText = "00분";
                        minSlot.style.color = "#94a3b8";
                    } else if (minVal === 30) {
                        minSlot.innerText = "30";
                    } else if (minVal === 10 || minVal === 20 || minVal === 40 || minVal === 50) {
                        minSlot.innerText = `${minVal}`;
                    } else {
                        minSlot.innerText = "·";
                    }
                    bottomGrid.appendChild(minSlot);
                }
            }

            headerTop.appendChild(topGrid);
            headerBottom.appendChild(bottomGrid);
        }

        // 🎨 6. 전체 목록 및 타임라인 렌더링
        function render() {
            processTimelineLogic();

            const container = document.getElementById('task-rows-container');
            const completedList = document.getElementById('completed-list');
            container.innerHTML = '';
            completedList.innerHTML = '';

            let completedCount = 0;

            tasks.forEach(task => {
                const row = document.createElement('div');
                row.className = `task-row ${task.completed ? 'completed' : ''} ${task.isAutoBreak ? 'auto-break' : ''}`;
                row.dataset.id = task.id;
                
                // 좌측 영역
                const infoDiv = document.createElement('div');
                infoDiv.className = 'task-info';
                
                const checkBtn = document.createElement('button');
                checkBtn.className = 'btn-check';
                checkBtn.innerHTML = '✓';
                checkBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleComplete(task.id);
                };
                
                const inputName = document.createElement('input');
                inputName.type = 'text';
                inputName.value = task.name;
                // 자동 생성된 휴식 행은 타이틀 직접 수정 불가하게 방어
                if (task.isAutoBreak) {
                    inputName.disabled = true;
                    inputName.style.color = "#f59e0b";
                    inputName.style.fontStyle = "italic";
                }
                inputName.onchange = (e) => { 
                    task.name = e.target.value; 
                    saveData();
                };

                infoDiv.appendChild(checkBtn);
                infoDiv.appendChild(inputName);

                // [유닛별 컬러 셀렉터] - 수동 작업에만 색상 변경 가능하게 적용
                if (!task.completed && !task.isAutoBreak) {
                    const picker = document.createElement('div');
                    picker.className = 'color-picker';
                    const colors = ['orange', 'purple', 'blue', 'teal', 'red'];
                    colors.forEach(col => {
                        const dot = document.createElement('div');
                        dot.className = `color-dot ${task.color === col ? 'active' : ''}`;
                        dot.style.background = `var(--color-${col})`;
                        dot.onclick = () => {
                            task.color = col;
                            saveData();
                            render();
                        };
                        picker.appendChild(dot);
                    });
                    infoDiv.appendChild(picker);
                }

                row.appendChild(infoDiv);

                // 우측 그리드
                const gridDiv = document.createElement('div');
                gridDiv.className = 'timeline-grid';

                for (let i = 0; i < totalCells; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    gridDiv.appendChild(cell);
                }

                // 타임라인 바 렌더링
                if (task.startCell !== null && task.endCell !== null) {
                    const bar = document.createElement('div');
                    bar.className = `time-bar bar-${task.color || 'orange'}`;
                    
                    const leftPercent = (task.startCell / totalCells) * 100;
                    const widthPercent = ((task.endCell - task.startCell) / totalCells) * 100;
                    bar.style.left = `${leftPercent}%`;
                    bar.style.width = `${widthPercent}%`;

                    // 좌핸들
                    const leftHandle = document.createElement('div');
                    leftHandle.className = 'resize-handle left';
                    
                    // 중앙 텍스트 (시간 경과 표기)
                    const barCenter = document.createElement('div');
                    barCenter.style.flex = '1';
                    barCenter.style.height = '100%';
                    barCenter.style.display = 'flex';
                    barCenter.style.alignItems = 'center';
                    barCenter.style.justifyContent = 'center';
                    barCenter.style.fontSize = '0.75rem';
                    barCenter.style.fontWeight = 'bold';
                    barCenter.style.color = 'white';
                    
                    const durationMinutes = (task.endCell - task.startCell) * 5;
                    barCenter.innerText = `${durationMinutes}분`;

                    // 우핸들
                    const rightHandle = document.createElement('div');
                    rightHandle.className = 'resize-handle right';

                    // 자동 생성된 휴식 행은 사용자가 핸들로 늘리거나 움직이지 못하게 방어 (유저의 오리지널 타임바가 움직이면 자동 크기 조절)
                    if (!task.isAutoBreak) {
                        bar.appendChild(leftHandle);
                        bar.appendChild(barCenter);
                        bar.appendChild(rightHandle);

                        // 마우스 및 터치 이벤트 부착
                        leftHandle.addEventListener('mousedown', (e) => { e.stopPropagation(); startDrag(task.id, e.clientX, 'left'); });
                        leftHandle.addEventListener('touchstart', (e) => { e.stopPropagation(); startDrag(task.id, e.touches[0].clientX, 'left'); });

                        rightHandle.addEventListener('mousedown', (e) => { e.stopPropagation(); startDrag(task.id, e.clientX, 'right'); });
                        rightHandle.addEventListener('touchstart', (e) => { e.stopPropagation(); startDrag(task.id, e.touches[0].clientX, 'right'); });

                        barCenter.addEventListener('mousedown', (e) => { e.stopPropagation(); startDrag(task.id, e.clientX, 'move'); });
                        barCenter.addEventListener('touchstart', (e) => { e.stopPropagation(); startDrag(task.id, e.touches[0].clientX, 'move'); });
                    } else {
                        // 자동 휴식바는 안내 텍스트 처리
                        barCenter.innerText = `☕ 정비 ${durationMinutes}분`;
                        bar.appendChild(barCenter);
                    }

                    gridDiv.appendChild(bar);
                }

                row.appendChild(gridDiv);

                if (task.completed) {
                    completedCount++;
                    completedList.appendChild(row);
                } else {
                    container.appendChild(row);
                }
            });

            document.getElementById('completed-count').innerText = completedCount;
            updateActiveTaskAlert();
        }

        // --- 실시간 5분 단위 세밀 드래그 가공 인터페이스 ---
        function startDrag(taskId, clientX, mode) {
            isDragging = mode === 'move';
            isResizingLeft = mode === 'left';
            isResizingRight = mode === 'right';
            activeTaskId = taskId;
            startX = clientX;

            const task = tasks.find(t => t.id === taskId);
            originalStartCell = task.startCell;
            originalEndCell = task.endCell;

            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchmove', onDragTouchMove, { passive: false });
            document.addEventListener('touchend', endDrag);
        }

        function onDragTouchMove(e) {
            e.preventDefault();
            onDragMove(e.touches[0]);
        }

        function onDragMove(e) {
            if (activeTaskId === null) return;
            const task = tasks.find(t => t.id === activeTaskId);
            
            const gridElement = document.querySelector('.timeline-grid');
            if (!gridElement) return;
            const cellWidth = gridElement.clientWidth / totalCells;

            const deltaX = e.clientX - startX;
            const cellDelta = Math.round(deltaX / cellWidth);

            if (isDragging) {
                let newStart = originalStartCell + cellDelta;
                let newEnd = originalEndCell + cellDelta;
                if (newStart >= 0 && newEnd <= totalCells) {
                    task.startCell = newStart;
                    task.endCell = newEnd;
                }
            } else if (isResizingLeft) {
                let newStart = originalStartCell + cellDelta;
                if (newStart >= 0 && newStart < task.endCell) {
                    task.startCell = newStart;
                }
            } else if (isResizingRight) {
                let newEnd = originalEndCell + cellDelta;
                if (newEnd > task.startCell && newEnd <= totalCells) {
                    task.endCell = newEnd;
                }
            }
            render();
        }

        function endDrag() {
            activeTaskId = null;
            isDragging = false;
            isResizingLeft = false;
            isResizingRight = false;
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchmove', onDragTouchMove);
            document.removeEventListener('touchend', endDrag);
            saveData(); // 드래그 마친 뒤 데이터 영구 저장!
        }

        // --- 시간 연동 및 인디케이터 기믹 ---
        function switchTimeMode(mode) {
            timeMode = mode;
            document.getElementById('mode-real').classList.toggle('active', mode === 'real');
            document.getElementById('mode-run').classList.toggle('active', mode === 'run');
            
            if (mode === 'run' && !relativeStartTime) {
                relativeStartTime = new Date();
            }
            saveData();
            renderHeader();
            updateTimelineClockAndRedLine();
        }

        function updateTimelineClockAndRedLine() {
            const now = new Date();
            
            const ampmStr = now.getHours() >= 12 ? '오후' : '오전';
            const displayHours = now.getHours() > 12 ? now.getHours() - 12 : now.getHours();
            document.getElementById('current-clock').innerText = 
                `현재 실제 시간: ${ampmStr} ${displayHours}시 ${String(now.getMinutes()).padStart(2, '0')}분 ${String(now.getSeconds()).padStart(2, '0')}초`;

            let percent = 0;
            const gridElement = document.querySelector('.timeline-grid');
            if (!gridElement) return;

            if (timeMode === 'real') {
                const startHour = 8;
                const endHour = 18;
                const totalMinutes = (endHour - startHour) * 60; // 600분

                const currentHour = now.getHours();
                const currentMinute = now.getMinutes();
                const minutesPassed = (currentHour - startHour) * 60 + currentMinute;

                if (minutesPassed >= 0 && minutesPassed <= totalMinutes) {
                    percent = (minutesPassed / totalMinutes) * 100;
                    document.getElementById('red-line').style.display = 'block';
                    document.getElementById('red-line').style.left = `calc(320px + ${percent}%)`;
                } else {
                    document.getElementById('red-line').style.display = 'none';
                }
            } else {
                if (relativeStartTime) {
                    const elapsedMs = now - relativeStartTime;
                    const elapsedMinutes = Math.floor(elapsedMs / 1000 / 60);
                    const totalMinutes = 600;

                    if (elapsedMinutes >= 0 && elapsedMinutes <= totalMinutes) {
                        percent = (elapsedMinutes / totalMinutes) * 100;
                        document.getElementById('red-line').style.display = 'block';
                        document.getElementById('red-line').style.left = `calc(320px + ${percent}%)`;
                    } else {
                        document.getElementById('red-line').style.display = 'none';
                    }
                } else {
                    document.getElementById('red-line').style.display = 'none';
                }
            }
        }

        function updateActiveTaskAlert() {
            const now = new Date();
            let currentCellIndex = -1;

            if (timeMode === 'real') {
                const startHour = 8;
                const minutesPassed = (now.getHours() - startHour) * 60 + now.getMinutes();
                if (minutesPassed >= 0) {
                    currentCellIndex = Math.floor(minutesPassed / 5);
                }
            } else if (relativeStartTime) {
                const elapsedMs = now - relativeStartTime;
                const elapsedMinutes = Math.floor(elapsedMs / 1000 / 60);
                if (elapsedMinutes >= 0) {
                    currentCellIndex = Math.floor(elapsedMinutes / 5);
                }
            }

            let activeTaskName = "현재 진행 중인 예정된 액션이 없습니다.";
            if (currentCellIndex >= 0 && currentCellIndex < totalCells) {
                const activeTask = tasks.find(t => !t.completed && currentCellIndex >= t.startCell && currentCellIndex < t.endCell);
                if (activeTask) {
                    if (activeTask.isAutoBreak) {
                        activeTaskName = `[${activeTask.name}] 장비 점검 및 티타임 진행 중 ☕`;
                    } else {
                        activeTaskName = `[${activeTask.name}] 촬영 진행 중`;
                    }
                }
            }
            document.getElementById('active-task-alert').innerHTML = `🚨 <strong>지금 할 일:</strong> ${activeTaskName}`;
        }

        function addNewRow() {
            // 빈 공간이나 끝자리 찾기
            const newId = tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
            tasks.push({
                id: newId,
                name: `새 촬영 항목 ${newId}`,
                startCell: 0,
                endCell: 12,
                completed: false,
                color: "orange",
                isAutoBreak: false
            });
            saveData();
            render();
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveData();
                render();
            }
        }

        function toggleCompletedSection() {
            const list = document.getElementById('completed-list');
            const arrow = document.getElementById('arrow-icon');
            list.classList.toggle('active');
            arrow.innerText = list.classList.contains('active') ? '▲' : '▼';
        }

        // 1초 단위 실시간 시계 & 레드라인 작동기
        setInterval(() => {
            updateTimelineClockAndRedLine();
            updateActiveTaskAlert();
        }, 1000);

        // 초기 스타트
        loadSavedData();
        renderHeader();
        render();
        updateTimelineClockAndRedLine();
    </script>
</body>
</html>
