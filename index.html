<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 하이퍼 리얼 프로덕션 마스터 타임라인</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --accent-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .title-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            font-size: 1.4rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            min-width: 300px;
        }
        .title-input:not(:disabled) {
            background: #0f172a;
            border-color: var(--primary-color);
        }

        .lock-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .control-panel {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button, select {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: #475569; }
        button.secondary:hover { background-color: #334155; }
        button.danger { background-color: var(--danger-color); }

        .settings-bar {
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .flex-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .timeline-board {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .timeline-container-scroll {
            overflow-x: auto;
            width: 100%;
        }

        .timeline-table {
            display: flex;
            flex-direction: column;
            position: relative;
            width: max-content;
        }

        .table-header {
            display: flex;
            flex-direction: column;
            background: #111827;
            border-bottom: 2px solid var(--border-color);
        }

        .header-row { display: flex; }

        .header-frozen-zone {
            width: 380px;
            min-width: 380px;
            padding-left: 15px;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-right: 2px solid var(--border-color);
            background: #0f172a;
            position: sticky;
            left: 0;
            z-index: 25;
        }

        .header-grid-zone { display: flex; }

        .grid-header-cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-color);
            background: #111827;
            height: 32px;
            cursor: pointer;
        }
        .grid-header-cell:hover { background: var(--primary-color); }

        .task-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            position: relative;
        }
        .task-row.break-row { background: #161e2e; }

        .task-left-panel {
            width: 380px;
            min-width: 380px;
            padding: 8px 12px;
            border-right: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1e293b;
            position: sticky;
            left: 0;
            z-index: 15;
        }

        .toggle-arrow { cursor: pointer; width: 14px; text-align: center; color: var(--accent-color); }
        .task-name-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            font-size: 0.85rem;
            font-weight: 500;
            flex: 1;
            padding: 3px;
        }
        .task-name-input:focus { background: #0f172a; border-color: var(--primary-color); outline: none; }

        .task-right-track { position: relative; display: flex; background: #0f172a; }
        .track-grid-unit { border-right: 1px dashed rgba(51, 65, 85, 0.2); height: 50px; }

        .time-bar-element {
            position: absolute;
            height: 30px;
            top: 10px;
            background: linear-gradient(90deg, #f59e0b, #d97706);
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            cursor: grab;
        }
        .time-bar-element.parent-bar { background: linear-gradient(90deg, #6366f1, #4f46e5); }
        .time-bar-element.auto-break-bar {
            background: repeating-linear-gradient(45deg, #475569, #475569 8px, #334155 8px, #334155 16px);
            cursor: not-allowed;
        }

        .bar-label {
            flex: 1;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 0 4px;
        }
        .resizer { width: 6px; height: 100%; background: rgba(255, 255, 255, 0.2); cursor: ew-resize; }

        .live-marker-line {
            position: absolute;
            top: 0; bottom: 0; width: 2px;
            background: var(--danger-color);
            z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <input type="text" id="main-title" class="title-input" value="🎬 마스터 프로덕션 스케줄러" disabled oninput="this.style.width = (this.value.length + 3) + 'ch';">
            <button id="lock-btn" class="lock-btn" onclick="toggleTitleLock()">🔒 수정</button>
        </div>
        <div class="control-panel">
            <button onclick="addNewRow(null)">➕ 최상위 항목 추가</button>
            <button class="secondary" onclick="resetAllData()">🔄 전체 초기화</button>
        </div>
    </header>

    <div class="settings-bar">
        <div class="flex-group">
            <button id="back-view-btn" class="secondary" onclick="navigateUpView()" style="display: none;">⬅️ 이전 단계로 (상위 뷰)</button>
            <span id="current-view-indicator" style="font-weight: bold; color: var(--accent-color);">상태: 연도별 마스터 뷰</span>
        </div>

        <div class="flex-group">
            <button class="secondary" onclick="adjustZoom(-10)">➖ 축소</button>
            <button class="secondary" onclick="adjustZoom(10)">➕ 확대</button>
        </div>
    </div>

    <div class="timeline-board">
        <div class="timeline-container-scroll">
            <div class="timeline-table" id="timeline-main-table">
                <div class="table-header" id="render-header-wrapper"></div>
                <div id="dynamic-rows-container"></div>
                <div class="live-marker-line" id="live-timeline-marker"></div>
            </div>
        </div>
    </div>

    <script>
        let projectTasks = [
            { id: "p1", name: "2026년 콘텐츠 제작 기획 및 슈팅", start: 0, end: 12, parentId: null, open: true },
            { id: "c1", name: "상반기 프리-프로덕션 세팅", start: 0, end: 4, parentId: "p1", open: true },
            { id: "c2", name: "하반기 메인 프로덕션 크랭크인", start: 6, end: 11, parentId: "p1", open: true }
        ];

        let currentView = 'year'; 
        let currentYear = 2026;
        let currentMonth = 0; 
        
        let cellWidth = 70;
        let totalCells = 12;

        let currentDragBarId = null;
        let dragType = null; 
        let dragStartX = 0;
        let dragStartLeftCell = 0;
        let dragStartEndCell = 0;
        let childInitialOffsets = [];

        const dayNames = ["일", "월", "화", "수", "목", "금", "토"];

        function init() {
            const saved = localStorage.getItem('hyper_timeline_tasks');
            const savedTitle = localStorage.getItem('hyper_timeline_title');
            if (saved) projectTasks = JSON.parse(saved);
            if (savedTitle) {
                const tInput = document.getElementById('main-title');
                tInput.value = savedTitle;
                tInput.style.width = (tInput.value.length + 3) + 'ch';
            }
            updateViewConfig();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('hyper_timeline_tasks', JSON.stringify(projectTasks));
            localStorage.setItem('hyper_timeline_title', document.getElementById('main-title').value);
        }

        function toggleTitleLock() {
            const input = document.getElementById('main-title');
            const btn = document.getElementById('lock-btn');
            if (input.disabled) { input.disabled = false; input.focus(); btn.innerText = "🔓 저장"; } 
            else { input.disabled = true; btn.innerText = "🔒 수정"; saveData(); }
        }

        function updateViewConfig() {
            const backBtn = document.getElementById('back-view-btn');
            const indicator = document.getElementById('current-view-indicator');

            if (currentView === 'year') {
                totalCells = 12; 
                backBtn.style.display = 'none';
                indicator.innerText = `📅 탐색 범위: ${currentYear}년 마스터 계획`;
            } else if (currentView === 'month') {
                totalCells = getWeeksInMonth(currentYear, currentMonth);
                backBtn.style.display = 'inline-flex';
                indicator.innerText = `📅 탐색 범위: ${currentYear}년 ➡️ ${currentMonth + 1}월 세부 계획 (${totalCells}주차 규격)`;
            } else if (currentView === 'day') {
                totalCells = new Date(currentYear, currentMonth + 1, 0).getDate();
                backBtn.style.display = 'inline-flex';
                indicator.innerText = `📅 탐색 범위: ${currentMonth + 1}월 ➡️ 일별/요일별 정밀 스케줄`;
            }
        }

        function getWeeksInMonth(year, month) {
            const firstOfYear = new Date(year, month, 1);
            const lastOfYear = new Date(year, month + 1, 0);
            const used = firstOfYear.getDay() + lastOfYear.getDate();
            return Math.ceil(used / 7);
        }

        function navigateUpView() {
            if (currentView === 'day') currentView = 'month';
            else if (currentView === 'month') currentView = 'year';
            updateViewConfig();
            renderAll();
        }

        function adjustZoom(amt) {
            cellWidth = Math.max(40, Math.min(200, cellWidth + amt));
            renderAll();
        }

        function resetAllData() {
            if(confirm("모든 데이터를 지우고 리셋할까요?")) { localStorage.clear(); location.reload(); }
        }

        function renderHeader() {
            const wrapper = document.getElementById('render-header-wrapper');
            wrapper.innerHTML = '';

            const row1 = document.createElement('div'); row1.className = 'header-row';
            const row2 = document.createElement('div'); row2.className = 'header-row';

            const f1 = document.createElement('div'); f1.className = 'header-frozen-zone'; f1.innerText = "분류 구조 및 타임라인";
            const f2 = document.createElement('div'); f2.className = 'header-frozen-zone'; f2.innerText = "단위 스케줄 바";
            row1.appendChild(f1); row2.appendChild(f2);

            const g1 = document.createElement('div'); g1.className = 'header-grid-zone';
            const g2 = document.createElement('div'); g2.className = 'header-grid-zone';

            if (currentView === 'year') {
                const titleCell = document.createElement('div'); titleCell.className = 'grid-header-cell';
                titleCell.style.width = `${totalCells * cellWidth}px`; titleCell.innerText = `${currentYear}년도 월별 인덱스 (클릭시 월간 뷰 확장)`;
                g1.appendChild(titleCell);

                for (let i = 0; i < 12; i++) {
                    const cell = document.createElement('div'); cell.className = 'grid-header-cell';
                    cell.style.width = `${cellWidth}px`; cell.innerText = `${i + 1}월`;
                    cell.onclick = () => { currentMonth = i; currentView = 'month'; updateViewConfig(); renderAll(); };
                    g2.appendChild(cell);
                }
            } else if (currentView === 'month') {
                const titleCell = document.createElement('div'); titleCell.className = 'grid-header-cell';
                titleCell.style.width = `${totalCells * cellWidth}px`; titleCell.innerText = `${currentMonth + 1}월 세부 주차 플랜 (클릭시 일별 뷰 확장)`;
                g1.appendChild(titleCell);

                for (let i = 0; i < totalCells; i++) {
                    const cell = document.createElement('div'); cell.className = 'grid-header-cell';
                    cell.style.width = `${cellWidth}px`; cell.innerText = `${i + 1}주차`;
                    cell.onclick = () => { currentView = 'day'; updateViewConfig(); renderAll(); };
                    g2.appendChild(cell);
                }
            } else if (currentView === 'day') {
                const titleCell = document.createElement('div'); titleCell.className = 'grid-header-cell';
                titleCell.style.width = `${totalCells * cellWidth}px`; titleCell.innerText = `${currentMonth + 1}월 일별 요일 자동 매칭 뷰`;
                g1.appendChild(titleCell);

                for (let i = 1; i <= totalCells; i++) {
                    const cell = document.createElement('div'); cell.className = 'grid-header-cell';
                    cell.style.width = `${cellWidth}px`;
                    const dateObj = new Date(currentYear, currentMonth, i);
                    const dayName = dayNames[dateObj.getDay()];
                    cell.innerText = `${i}(${dayName})`;
                    
                    if(dateObj.getDay() === 0) cell.style.color = "var(--danger-color)"; 
                    if(dateObj.getDay() === 6) cell.style.color = '#38bdf8'; 
                    
                    g2.appendChild(cell);
                }
            }

            row1.appendChild(g1); row2.appendChild(g2);
            wrapper.appendChild(row1); wrapper.appendChild(row2);
        }

        function renderRows() {
            const container = document.getElementById('dynamic-rows-container');
            container.innerHTML = '';

            let renderedList = [];
            const roots = projectTasks.filter(t => !t.parentId);

            roots.forEach(root => {
                renderedList.push({ task: root, isBreak: false });

                if (root.open) {
                    const children = projectTasks.filter(t => t.parentId === root.id);
                    children.sort((a, b) => a.start - b.start);

                    let currentMarker = root.start;

                    children.forEach(child => {
                        if (child.start > currentMarker) {
                            renderedList.push({
                                isBreak: true,
                                parentId: root.id,
                                start: currentMarker,
                                end: child.start,
                                name: "☕ 휴식 및 정비 (자식 간 공백)"
                            });
                        }
                        renderedList.push({ task: child, isBreak: false });
                        currentMarker = Math.max(currentMarker, child.end);
                    });

                    if (currentMarker < root.end && children.length > 0) {
                        renderedList.push({
                            isBreak: true,
                            parentId: root.id,
                            start: currentMarker,
                            end: root.end,
                            name: "☕ 휴식 및 정비 (자식 간 공백)"
                        });
                    }
                }
            });

            renderedList.forEach(item => {
                const row = document.createElement('div');
                row.className = `task-row ${item.isBreak ? 'break-row' : ''}`;

                const leftPanel = document.createElement('div');
                leftPanel.className = 'task-left-panel';

                if (item.isBreak) {
                    leftPanel.innerHTML = `<span style="color:var(--text-muted); font-size:0.75rem; font-style:italic; padding-left:30px;">${item.name}</span>`;
                    row.appendChild(leftPanel);
                } else {
                    const task = item.task;
                    if (task.parentId) leftPanel.style.paddingLeft = '30px';

                    const arrow = document.createElement('div');
                    arrow.className = 'toggle-arrow';
                    const hasChild = projectTasks.some(t => t.parentId === task.id);
                    arrow.innerText = hasChild ? (task.open ? '▼' : '▶') : '•';
                    arrow.onclick = () => { if (hasChild) { task.open = !task.open; renderAll(); } };
                    leftPanel.appendChild(arrow);

                    const nameInput = document.createElement('input');
                    nameInput.className = 'task-name-input';
                    nameInput.value = task.name;
                    nameInput.onchange = (e) => { task.name = e.target.value; saveData(); };
                    leftPanel.appendChild(nameInput);

                    if (!task.parentId) {
                        const btnSub = document.createElement('button');
                        btnSub.className = 'secondary'; btnSub.style.padding = '2px 6px'; btnSub.style.fontSize = '0.7rem';
                        btnSub.innerText = '+ 자식';
                        btnSub.onclick = () => addNewRow(task.id);
                        leftPanel.appendChild(btnSub);
                    }

                    const btnDel = document.createElement('button');
                    btnDel.className = 'danger'; btnDel.style.padding = '2px 6px'; btnDel.style.fontSize = '0.7rem'; btnDel.innerText = '✕';
                    btnDel.onclick = () => deleteRow(task.id);
                    leftPanel.appendChild(btnDel);

                    row.appendChild(leftPanel);
                }

                const rightTrack = document.createElement('div');
                rightTrack.className = 'task-right-track';
                rightTrack.style.width = `${totalCells * cellWidth}px`;

                for (let i = 0; i < totalCells; i++) {
                    const unit = document.createElement('div');
                    unit.className = 'track-grid-unit';
                    unit.style.width = `${cellWidth}px`;
                    rightTrack.appendChild(unit);
                }

                let bStart = item.isBreak ? item.start : item.task.start;
                let bEnd = item.isBreak ? item.end : item.task.end;

                if (!(bEnd <= 0 || bStart >= totalCells)) {
                    let rStart = Math.max(0, bStart);
                    let rEnd = Math.min(totalCells, bEnd);

                    const bar = document.createElement('div');
                    bar.className = `time-bar-element ${item.isBreak ? 'auto-break-bar' : (!item.task.parentId ? 'parent-bar' : '')}`;
                    bar.style.left = `${rStart * cellWidth}px`;
                    bar.style.width = `${(rEnd - rStart) * cellWidth}px`;

                    if (item.isBreak) {
                        bar.innerHTML = `<div class="bar-label">${item.start + 1} ~ ${item.end} 공백 정비</div>`;
                    } else {
                        const task = item.task;
                        const handleL = document.createElement('div'); handleL.className = 'resizer';
                        const label = document.createElement('div'); label.className = 'bar-label'; label.innerText = `${task.start + 1}~${task.end}칸 : ${task.name}`;
                        const handleR = document.createElement('div'); handleR.className = 'resizer';

                        bar.appendChild(handleL);
                        bar.appendChild(label);
                        bar.appendChild(handleR);

                        handleL.addEventListener('mousedown', (e) => { e.stopPropagation(); initDrag(task.id, 'left', e.clientX); });
                        handleR.addEventListener('mousedown', (e) => { e.stopPropagation(); initDrag(task.id, 'right', e.clientX); });
                        label.addEventListener('mousedown', (e) => { e.stopPropagation(); initDrag(task.id, 'move', e.clientX); });
                    }
                    rightTrack.appendChild(bar);
                }

                row.appendChild(rightTrack);
                container.appendChild(row);
            });
        }

        function initDrag(id, type, clientX) {
            currentDragBarId = id;
            dragType = type;
            dragStartX = clientX;

            const task = projectTasks.find(t => t.id === id);
            dragStartLeftCell = task.start;
            dragStartEndCell = task.end;

            if (!task.parentId && type === 'move') {
                childInitialOffsets = projectTasks
                    .filter(t => t.parentId === task.id)
                    .map(c => ({ id: c.id, startOffset: c.start - task.start, length: c.end - c.start }));
            }

            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', endDrag);
        }

        function onDragMove(e) {
            if (!currentDragBarId) return;
            const task = projectTasks.find(t => t.id === currentDragBarId);
            
            const deltaX = e.clientX - dragStartX;
            const cellDelta = Math.round(deltaX / cellWidth);

            if (dragType === 'move') {
                let ns = dragStartLeftCell + cellDelta;
                let ne = dragStartEndCell + cellDelta;
                
                if (ns >= 0 && ne <= totalCells) {
                    task.start = ns;
                    task.end = ne;

                    if (!task.parentId) {
                        childInitialOffsets.forEach(off => {
                            const child = projectTasks.find(t => t.id === off.id);
                            if (child) {
                                child.start = task.start + off.startOffset;
                                child.end = child.start + off.length;
                            }
                        });
                    }
                }
            } else {
                const children = projectTasks.filter(t => t.parentId === task.id);
                let minAllowedStart = dragStartLeftCell + cellDelta;
                let maxAllowedEnd = dragStartEndCell + cellDelta;

                if (!task.parentId && children.length > 0) {
                    let absoluteMinStart = Math.min(...children.map(c => c.start));
                    let absoluteMaxEnd = Math.max(...children.map(c => c.end));

                    if (dragType === 'left') {
                        if (minAllowedStart >= 0 && minAllowedStart <= absoluteMinStart) {
                            task.start = minAllowedStart;
                        }
                    } else if (dragType === 'right') {
                        if (maxAllowedEnd <= totalCells && maxAllowedEnd >= absoluteMaxEnd) {
                            task.end = maxAllowedEnd;
                        }
                    }
                } else {
                    if (dragType === 'left') {
                        if (minAllowedStart >= 0 && minAllowedStart < task.end) task.start = minAllowedStart;
                    } else if (dragType === 'right') {
                        if (maxAllowedEnd > task.start && maxAllowedEnd <= totalCells) task.end = maxAllowedEnd;
                    }
                }
            }

            if (task.parentId) {
                syncParentBoundsToFitChildren(task.parentId);
            }

            renderAll();
        }

        function endDrag() {
            currentDragBarId = null;
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', endDrag);
            saveData();
            renderAll();
        }

        function syncParentBoundsToFitChildren(parentId) {
            const parent = projectTasks.find(t => t.id === parentId);
            if (!parent) return;
            const children = projectTasks.filter(t => t.parentId === parentId);
            if (children.length === 0) return;

            let minS = Math.min(...children.map(c => c.start));
            let maxE = Math.max(...children.map(c => c.end));

            if (minS < parent.start) parent.start = minS;
            if (maxE > parent.end) parent.end = maxE;
        }

        function addNewRow(parentId = null) {
            const nextId = "t_" + Date.now();
            projectTasks.push({
                id: nextId,
                name: parentId ? "↳ 세부 워크포커스 하위 태스크" : "새 마스터 대분류 과업 항목",
                start: parentId ? projectTasks.find(t=>t.id===parentId).start : 0,
                end: parentId ? projectTasks.find(t=>t.id===parentId).start + 2 : 4,
                parentId: parentId,
                open: true
            });
            if (parentId) syncParentBoundsToFitChildren(parentId);
            saveData();
            renderAll();
        }

        function deleteRow(id) {
            if (confirm("이 항목과 하위 연계 데이터를 모두 영구 제거할까요?")) {
                projectTasks = projectTasks.filter(t => t.id !== id && t.parentId !== id);
                saveData();
                renderAll();
            }
        }

        function updateLiveMarker() {
            const now = new Date();
            const marker = document.getElementById('live-timeline-marker');
            let idx = -1;

            if (currentView === 'year' && now.getFullYear() === currentYear) {
                idx = now.getMonth() + (now.getDate() / 31);
            } else if (currentView === 'day' && now.getMonth() === currentMonth && now.getFullYear() === currentYear) {
                idx = now.getDate() - 1 + (now.getHours() / 24);
            }

            if (idx >= 0 && idx <= totalCells) {
                let pos = 380 + (idx * cellWidth);
                marker.style.left = `${pos}px`;
                marker.style.display = 'block';
            } else {
                marker.style.display = 'none';
            }
        }

        function renderAll() {
            renderHeader();
            renderRows();
            updateLiveMarker();
        }

        setInterval(updateLiveMarker, 15000);
        window.onload = init;
    </script>
</body>
</html>
