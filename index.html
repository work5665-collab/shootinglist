<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 마스터 프로덕션 타임라인 시스템</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --accent-color: #f59e0b;
            --break-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .title-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        /* 제목 칸 잘림 방지: 가변 폭 지향 */
        .title-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            font-size: 1.4rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            min-width: 300px;
            display: inline-block;
        }
        .title-input:not(:disabled) {
            background: #0f172a;
            border-color: var(--primary-color);
        }

        .lock-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .control-panel {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button, select, input[type="number"] {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: #475569; }
        button.secondary:hover { background-color: #334155; }
        button.danger { background-color: var(--danger-color); }
        
        select, input[type="number"] {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: white;
        }
        input[type="number"] {
            width: 50px;
            text-align: center;
        }

        .settings-bar {
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .flex-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        /* 타임라인 메인 구조 */
        .timeline-board {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .timeline-container-scroll {
            overflow-x: auto;
            width: 100%;
        }

        .timeline-table {
            display: flex;
            flex-direction: column;
            position: relative;
            width: max-content;
        }

        /* 🎬 2줄 대층형 헤더 스타일 */
        .table-header {
            display: flex;
            flex-direction: column;
            background: #111827;
            border-bottom: 2px solid var(--border-color);
        }

        .header-row {
            display: flex;
        }

        .header-frozen-zone {
            width: 380px;
            min-width: 380px;
            padding-left: 15px;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-right: 2px solid var(--border-color);
            background: #0f172a;
            position: sticky;
            left: 0;
            z-index: 25;
        }

        .header-grid-zone {
            display: flex;
        }

        .grid-header-cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-color);
            background: #111827;
            height: 30px;
            cursor: pointer;
        }
        .grid-header-cell:hover {
            background: var(--primary-color);
        }

        /* 행 구성 */
        .task-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            position: relative;
        }
        .task-row.break-row {
            background: #161e2e;
        }

        .task-left-panel {
            width: 380px;
            min-width: 380px;
            padding: 8px 12px;
            border-right: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1e293b;
            position: sticky;
            left: 0;
            z-index: 15;
        }

        .toggle-arrow { cursor: pointer; width: 14px; text-align: center; color: var(--accent-color); }

        .task-name-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            font-size: 0.85rem;
            font-weight: 500;
            flex: 1;
            padding: 3px;
        }
        .task-name-input:focus {
            background: #0f172a;
            border-color: var(--primary-color);
            outline: none;
        }

        .task-right-track {
            position: relative;
            display: flex;
            background: #0f172a;
        }

        .track-grid-unit {
            border-right: 1px dashed rgba(51, 65, 85, 0.25);
            height: 50px;
        }

        /* 인디케이터 바 디자인 */
        .time-bar-element {
            position: absolute;
            height: 30px;
            top: 10px;
            background: linear-gradient(90deg, #f59e0b, #d97706);
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            cursor: grab;
        }
        .time-bar-element.parent-bar {
            background: linear-gradient(90deg, #6366f1, #4f46e5);
        }
        .time-bar-element.auto-break-bar {
            background: repeating-linear-gradient(45deg, #475569, #475569 10px, #334155 10px, #334155 20px);
            cursor: not-allowed;
        }

        .bar-label {
            flex: 1;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 0 4px;
        }

        .resizer {
            width: 6px;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            cursor: ew-resize;
        }

        .live-marker-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--danger-color);
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <input type="text" id="main-title" class="title-input" value="🎬 마스터 워크플랜 프로덕션 트래커" disabled oninput="adjustTitleWidth(this)">
            <button id="lock-btn" class="lock-btn" onclick="toggleTitleLock()">🔒 수정</button>
        </div>
        <div class="control-panel">
            <button onclick="addNewRow(null)">➕ 최상위 대분류 추가</button>
            <button class="secondary" onclick="resetAllData()">🔄 초기화</button>
        </div>
    </header>

    <div class="settings-bar">
        <div class="flex-group">
            <label>📅 <strong>타임라인 모드:</strong></label>
            <select id="view-mode-select" onchange="changeViewMode(this.value)">
                <option value="year">연 단위 계획 (연 ➡️ 월 트리거)</option>
                <option value="month">월 단위 계획 (월 ➡️ 주 트리거)</option>
                <option value="hour">일일 시간 계획 (24시간 뷰)</option>
            </select>
        </div>

        <!-- ✂️ 뷰 윈도우 포커스 커스텀 컷 영역 -->
        <div class="flex-group" style="background: #0f172a; padding: 6px 12px; border-radius: 8px;">
            <span>✂️ <strong>뷰 윈도우 범위 제한:</strong></span>
            <input type="number" id="crop-start" value="0" min="0">
            <span>부터</span>
            <input type="number" id="crop-end" value="24" min="1">
            <span>까지 포커스</span>
            <button onclick="applyCropFilter()">적용</button>
            <button class="secondary" onclick="clearCropFilter()">🔓 해제</button>
        </div>

        <div class="flex-group">
            <button class="secondary" onclick="adjustZoom(-10)">➖ 축소</button>
            <button class="secondary" onclick="adjustZoom(10)">➕ 확대</button>
        </div>
    </div>

    <div class="timeline-board">
        <div class="timeline-container-scroll">
            <div class="timeline-table" id="timeline-main-table">
                
                <!-- 2줄 계층 헤더 렌더링 랙 -->
                <div class="table-header" id="render-header-wrapper"></div>

                <!-- 메인 로우 컨테이너 -->
                <div id="dynamic-rows-container"></div>

                <!-- 현재 추적 라인 -->
                <div class="live-marker-line" id="live-timeline-marker"></div>

            </div>
        </div>
    </div>

    <script>
        // 마스터 핵심 가변 상태 데이터셋
        let projectTasks = [
            { id: "p1", name: "2026년 대규모 촬영 마스터플랜", start: 0, end: 12, parentId: null, open: true },
            { id: "c1", name: "상반기 실내 세트 완공 및 프리 프로덕션", start: 0, end: 5, parentId: "p1", open: true },
            { id: "c2", name: "하반기 로케이션 및 메인 필름 슈팅", start: 6, end: 11, parentId: "p1", open: true }
        ];

        let viewMode = 'year'; // year, month, hour
        let cellWidth = 60;
        
        // ✂️ 크롭 범위 캐싱 상태 기어
        let isCropped = false;
        let cropStart = 0;
        let cropEnd = 12;

        // 드래그 제어 기어
        let currentDragBarId = null;
        let dragType = null; 
        let dragStartX = 0;
        let dragStartLeftCell = 0;
        let dragStartEndCell = 0;
        let childInitialOffsets = []; // 부모 드래그 시 자식들 세트 이동용 오프셋 저장소

        // 월 계층 이동을 위한 상태 가젯
        let selectedMonthIndex = 6; // 기본값 7월 (0-indexed 6)

        function init() {
            const saved = localStorage.getItem('master_timeline_tasks');
            const savedTitle = localStorage.getItem('master_timeline_title');
            if (saved) projectTasks = JSON.parse(saved);
            if (savedTitle) {
                const titleInput = document.getElementById('main-title');
                titleInput.value = savedTitle;
                adjustTitleWidth(titleInput);
            }
            setDefaultCropBounds();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('master_timeline_tasks', JSON.stringify(projectTasks));
            localStorage.setItem('master_timeline_title', document.getElementById('main-title').value);
        }

        function toggleTitleLock() {
            const input = document.getElementById('main-title');
            const btn = document.getElementById('lock-btn');
            if (input.disabled) {
                input.disabled = false;
                input.focus();
                btn.innerText = "🔓 저장";
            } else {
                input.disabled = true;
                btn.innerText = "🔒 수정";
                saveData();
            }
        }

        function adjustTitleWidth(element) {
            element.style.width = (element.value.length + 3) + "ch";
        }

        function setDefaultCropBounds() {
            if (!isCropped) {
                cropStart = 0;
                if (viewMode === 'year') cropEnd = 12;
                else if (viewMode === 'month') cropEnd = 5; // 5주차 규격
                else if (viewMode === 'hour') cropEnd = 24;
                
                document.getElementById('crop-start').value = cropStart;
                document.getElementById('crop-end').value = cropEnd;
            }
        }

        function changeViewMode(mode) {
            viewMode = mode;
            isCropped = false;
            setDefaultCropBounds();
            // 스위칭 타임 오버헤드 밸런싱 최적화
            projectTasks.forEach(t => {
                if (t.end > cropEnd) t.end = cropEnd;
                if (t.start >= cropEnd) t.start = 0;
            });
            renderAll();
        }

        function applyCropFilter() {
            let s = parseInt(document.getElementById('crop-start').value, 10);
            let e = parseInt(document.getElementById('crop-end').value, 10);
            if (s >= e) { alert("시작 지점은 끝 지점보다 작아야 합니다."); return; }
            cropStart = s;
            cropEnd = e;
            isCropped = true;
            renderAll();
        }

        function clearCropFilter() {
            isCropped = false;
            setDefaultCropBounds();
            renderAll();
        }

        function adjustZoom(amt) {
            cellWidth = Math.max(30, Math.min(180, cellWidth + amt));
            renderAll();
        }

        function resetAllData() {
            if (confirm("정말 초기화하시겠습니까?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // 🎨 2줄 레이어 헤더 렌더링 엔진
        function renderHeader() {
            const wrapper = document.getElementById('render-header-wrapper');
            wrapper.innerHTML = '';

            const row1 = document.createElement('div'); row1.className = 'header-row';
            const row2 = document.createElement('div'); row2.className = 'header-row';

            const frozen1 = document.createElement('div'); frozen1.className = 'header-frozen-zone'; frozen1.innerText = "프로젝트 구조 및 대분류";
            const frozen2 = document.createElement('div'); frozen2.className = 'header-frozen-zone'; frozen2.innerText = "세부 태스크 단계";
            row1.appendChild(frozen1);
            row2.appendChild(frozen2);

            const gridZone1 = document.createElement('div'); gridZone1.className = 'header-grid-zone';
            const gridZone2 = document.createElement('div'); gridZone2.className = 'header-grid-zone';

            let totalVisibleCells = cropEnd - cropStart;

            if (viewMode === 'year') {
                // 상단 줄: 연도 통합 표시
                const yrCell = document.createElement('div');
                yrCell.className = 'grid-header-cell';
                yrCell.style.width = `${totalVisibleCells * cellWidth}px`;
                yrCell.innerText = "2026년 마스터 대타임라인 (클릭시 월 단위 이동)";
                gridZone1.appendChild(yrCell);

                // 하단 줄: 1월 ~ 12월 배치
                for (let i = cropStart; i < cropEnd; i++) {
                    const mCell = document.createElement('div');
                    mCell.className = 'grid-header-cell';
                    mCell.style.width = `${cellWidth}px`;
                    mCell.innerText = `${i + 1}월`;
                    mCell.onclick = () => {
                        selectedMonthIndex = i;
                        document.getElementById('view-mode-select').value = 'month';
                        changeViewMode('month');
                    };
                    gridZone2.appendChild(mCell);
                }
            } else if (viewMode === 'month') {
                const moCell = document.createElement('div');
                moCell.className = 'grid-header-cell';
                moCell.style.width = `${totalVisibleCells * cellWidth}px`;
                moCell.innerText = `${selectedMonthIndex + 1}월 세부 타임라인`;
                gridZone1.appendChild(moCell);

                for (let i = cropStart; i < cropEnd; i++) {
                    const wCell = document.createElement('div');
                    wCell.className = 'grid-header-cell';
                    wCell.style.width = `${cellWidth}px`;
                    wCell.innerText = `${i + 1}주차`;
                    gridZone2.appendChild(wCell);
                }
            } else {
                // 시간 모드
                const dCell = document.createElement('div');
                dCell.className = 'grid-header-cell';
                dCell.style.width = `${totalVisibleCells * cellWidth}px`;
                dCell.innerText = "일일 프로덕션 슈팅 타임라인";
                gridZone1.appendChild(dCell);

                for (let i = cropStart; i < cropEnd; i++) {
                    const hCell = document.createElement('div');
                    hCell.className = 'grid-header-cell';
                    hCell.style.width = `${cellWidth}px`;
                    hCell.innerText = `${i}시`;
                    gridZone2.appendChild(hCell);
                }
            }

            row1.appendChild(gridZone1);
            row2.appendChild(gridZone2);
            wrapper.appendChild(row1);
            wrapper.appendChild(row2);
        }

        // 🎨 행 정보 렌더링 및 자동 공백(휴식) 연산 장치
        function renderRows() {
            const container = document.getElementById('dynamic-rows-container');
            container.innerHTML = '';

            const visibleCells = cropEnd - cropStart;

            // 계층 구조 트리 가공 빌드
            let processedList = [];
            const roots = projectTasks.filter(t => !t.parentId);
            
            roots.forEach(root => {
                processedList.push({ task: root, isBreak: false });
                
                if (root.open) {
                    const children = projectTasks.filter(t => t.parentId === root.id);
                    // 자식 정렬
                    children.sort((a,b) => a.start - b.start);
                    
                    // ⚙️ 자식 요소들 사이에 공백구간(휴식 및 정비) 계산 엔진 복구
                    let currentMarker = cropStart;
                    
                    children.forEach((child) => {
                        if (child.start > currentMarker) {
                            processedList.push({
                                isBreak: true,
                                start: currentMarker,
                                end: child.start,
                                name: "☕ 휴식 및 정비 (자동 계산 구간)"
                            });
                        }
                        processedList.push({ task: child, isBreak: false });
                        currentMarker = Math.max(currentMarker, child.end);
                    });

                    if (currentMarker < cropEnd && children.length > 0) {
                        processedList.push({
                            isBreak: true,
                            start: currentMarker,
                            end: cropEnd,
                            name: "☕ 휴식 및 정비 (자동 계산 구간)"
                        });
                    }
                }
            });

            // 렌더러 루프 가동
            processedList.forEach((item) => {
                const row = document.createElement('div');
                row.className = `task-row ${item.isBreak ? 'break-row' : ''}`;

                // 1. 좌측 제어기 마운트
                const leftPanel = document.createElement('div');
                leftPanel.className = 'task-left-panel';

                if (item.isBreak) {
                    leftPanel.innerHTML = `<span style="color:var(--text-muted); font-size:0.75rem; font-style:italic;">${item.name}</span>`;
                    row.appendChild(leftPanel);
                } else {
                    const task = item.task;
                    if (task.parentId) leftPanel.style.paddingLeft = '30px';

                    const arrow = document.createElement('div');
                    arrow.className = 'toggle-arrow';
                    const hasChild = projectTasks.some(t => t.parentId === task.id);
                    arrow.innerText = hasChild ? (task.open ? '▼' : '▶') : '•';
                    arrow.onclick = () => { if(hasChild) { task.open = !task.open; renderAll(); } };
                    leftPanel.appendChild(arrow);

                    const nameInput = document.createElement('input');
                    nameInput.className = 'task-name-input';
                    nameInput.value = task.name;
                    nameInput.onchange = (e) => { task.name = e.target.value; saveData(); };
                    leftPanel.appendChild(nameInput);

                    if (!task.parentId) {
                        const btnSub = document.createElement('button');
                        btnSub.className = 'secondary';
                        btnSub.style.padding = '2px 6px'; btnSub.style.fontSize = '0.7rem';
                        btnSub.innerText = '+ 자식';
                        btnSub.onclick = () => addNewRow(task.id);
                        leftPanel.appendChild(btnSub);
                    }

                    const btnDel = document.createElement('button');
                    btnDel.className = 'danger';
                    btnDel.style.padding = '2px 6px'; btnDel.style.fontSize = '0.7rem'; btnDel.innerText = '✕';
                    btnDel.onclick = () => deleteRow(task.id);
                    leftPanel.appendChild(btnDel);

                    row.appendChild(leftPanel);
                }

                // 2. 우측 그리드 트랙 영역
                const rightTrack = document.createElement('div');
                rightTrack.className = 'task-right-track';
                rightTrack.style.width = `${visibleCells * cellWidth}px`;

                for (let i = 0; i < visibleCells; i++) {
                    const unit = document.createElement('div');
                    unit.className = 'track-grid-unit';
                    unit.style.width = `${cellWidth}px`;
                    rightTrack.appendChild(unit);
                }

                // 3. 인디케이터 바 계산 및 포지셔닝 (크롭 뷰포트 오프셋 보정 적용)
                let bStart = item.isBreak ? item.start : item.task.start;
                let bEnd = item.isBreak ? item.end : item.task.end;

                // 크롭 영역 바깥 예외 가드 처리
                if (!(bEnd <= cropStart || bStart >= cropEnd)) {
                    let renderStart = Math.max(cropStart, bStart) - cropStart;
                    let renderEnd = Math.min(cropEnd, bEnd) - cropStart;
                    
                    const bar = document.createElement('div');
                    bar.className = `time-bar-element ${item.isBreak ? 'auto-break-bar' : (!item.task.parentId ? 'parent-bar' : '')}`;
                    bar.style.left = `${renderStart * cellWidth}px`;
                    bar.style.width = `${(renderEnd - renderStart) * cellWidth}px`;

                    if (item.isBreak) {
                        bar.innerHTML = `<div class="bar-label">${item.start} ~ ${item.end} 공백</div>`;
                    } else {
                        const task = item.task;
                        const handleL = document.createElement('div'); handleL.className = 'resizer';
                        const label = document.createElement('div'); label.className = 'bar-label'; label.innerText = `${task.start}~${task.end} : ${task.name}`;
                        const handleR = document.createElement('div'); handleR.className = 'resizer';

                        bar.appendChild(handleL);
                        bar.appendChild(label);
                        bar.appendChild(handleR);

                        // 마우스 트리거 바인딩
                        handleL.addEventListener('mousedown', (e) => { e.stopPropagation(); initDrag(task.id, 'left', e.clientX); });
                        handleR.addEventListener('mousedown', (e) => { e.stopPropagation(); initDrag(task.id, 'right', e.clientX); });
                        label.addEventListener('mousedown', (e) => { e.stopPropagation(); initDrag(task.id, 'move', e.clientX); });
                    }
                    rightTrack.appendChild(bar);
                }

                row.appendChild(rightTrack);
                container.appendChild(row);
            });
        }

        // 🏗️ 3. 물려있는 유기적 세트 드래그 기계공학 컨트롤러
        function initDrag(id, type, clientX) {
            currentDragBarId = id;
            dragType = type;
            dragStartX = clientX;

            const task = projectTasks.find(t => t.id === id);
            dragStartLeftCell = task.start;
            dragStartEndCell = task.end;

            // ⚡ 부모 항목을 움직일 때 밑에 연동된 자식들의 시작 거리 오프셋 계산 저장
            if (!task.parentId && type === 'move') {
                childInitialOffsets = projectTasks
                    .filter(t => t.parentId === task.id)
                    .map(c => ({ id: c.id, startOffset: c.start - task.start, length: c.end - c.start }));
            }

            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', endDrag);
        }

        function onDragMove(e) {
            if (!currentDragBarId) return;
            const task = projectTasks.find(t => t.id === currentDragBarId);
            
            const deltaX = e.clientX - dragStartX;
            const cellDelta = Math.round(deltaX / cellWidth);

            if (dragType === 'move') {
                let ns = dragStartLeftCell + cellDelta;
                let ne = dragStartEndCell + cellDelta;
                
                if (ns >= 0 && ne <= 100) { // 하이퍼 범위 넉넉히 가이드
                    task.start = ns;
                    task.end = ne;

                    // 🔗 [연동 가젯] 부모가 이동하면 자식 세트들도 오프셋 간격 맞춰 일제히 이동
                    if (!task.parentId) {
                        childInitialOffsets.forEach(cOffset => {
                            const child = projectTasks.find(t => t.id === cOffset.id);
                            if (child) {
                                child.start = task.start + cOffset.startOffset;
                                child.end = child.start + cOffset.length;
                            }
                        });
                    }
                }
            } else if (dragType === 'left') {
                let ns = dragStartLeftCell + cellDelta;
                if (ns >= 0 && ns < task.end) task.start = ns;
            } else if (dragType === 'right') {
                let ne = dragStartEndCell + cellDelta;
                if (ne > task.start) task.end = ne;
            }

            // 🔗 [연동 가젯] 자식 항목 범위를 건드리면 상위 부모 바가 실시간으로 자식을 다 품도록 범위 스케일 오토 조절
            if (task.parentId) {
                syncParentBoundsToFitChildren(task.parentId);
            }

            renderAll();
        }

        function endDrag() {
            currentDragBarId = null;
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', endDrag);
            saveData();
            renderAll();
        }

        function syncParentBoundsToFitChildren(parentId) {
            const parent = projectTasks.find(t => t.id === parentId);
            if (!parent) return;
            const children = projectTasks.filter(t => t.parentId === parentId);
            if (children.length === 0) return;

            let minStart = Math.min(...children.map(c => c.start));
            let maxEnd = Math.max(...children.map(c => c.end));

            parent.start = minStart;
            parent.end = maxEnd;
        }

        // ➕ 로우 가공 메커니즘
        function addNewRow(parentId = null) {
            const nextId = "t_" + Date.now();
            projectTasks.push({
                id: nextId,
                name: parentId ? "↳ 세부 하위 워크 단계 태스크" : "새 마스터 대분류 프로젝트 범주 항목",
                start: cropStart,
                end: Math.min(cropEnd, cropStart + 3),
                parentId: parentId,
                open: true
            });
            if (parentId) syncParentBoundsToFitChildren(parentId);
            saveData();
            renderAll();
        }

        function deleteRow(id) {
            if (confirm("이 항목과 연계된 리소스를 모두 정리할까요?")) {
                projectTasks = projectTasks.filter(t => t.id !== id && t.parentId !== id);
                saveData();
                renderAll();
            }
        }

        function updateLiveMarker() {
            const now = new Date();
            const marker = document.getElementById('live-timeline-marker');
            let idx = -1;

            if (viewMode === 'hour') idx = now.getHours() + (now.getMinutes() / 60);
            else if (viewMode === 'year') idx = now.getMonth() + (now.getDate() / 30);
            
            if (idx >= cropStart && idx <= cropEnd) {
                let pos = 380 + ((idx - cropStart) * cellWidth);
                marker.style.left = `${pos}px`;
                marker.style.display = 'block';
            } else {
                marker.style.display = 'none';
            }
        }

        function renderAll() {
            renderHeader();
            renderRows();
            updateLiveMarker();
        }

        setInterval(updateLiveMarker, 10000);
        window.onload = init;
    </script>
</body>
</html>
