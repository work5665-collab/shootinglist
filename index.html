<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 범용 프로젝트 마스터 플랜</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --accent-color: #f59e0b;
        }

        /* 기본 고딕체 스타일 적용 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-x: hidden;
        }

        /* 헤더 섹션 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .title-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            font-size: 1.4rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            width: 350px;
        }
        .title-input:not(:disabled) {
            background: #0f172a;
            border-color: var(--primary-color);
        }

        .lock-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .control-panel {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 공통 버튼 크기 규격 */
        button, select {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: #475569; }
        button.secondary:hover { background-color: #334155; }
        button.danger { background-color: var(--danger-color); }
        
        select {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
        }

        /* 글로벌 세팅 바 */
        .settings-bar {
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .flex-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        /* 타임라인 메인 보드 */
        .timeline-board {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .timeline-container-scroll {
            overflow-x: auto;
            width: 100%;
        }

        .timeline-table {
            display: flex;
            flex-direction: column;
            position: relative;
            width: max-content; /* 내부 폭에 따라 무한히 늘어남 */
        }

        /* 헤더 디자인 */
        .table-header {
            display: flex;
            background: #111827;
            border-bottom: 2px solid var(--border-color);
            height: 45px;
        }

        .header-frozen-zone {
            width: 400px;
            min-width: 400px;
            padding-left: 15px;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-right: 2px solid var(--border-color);
            background: #0f172a;
            position: sticky;
            left: 0;
            z-index: 20;
        }

        .header-grid-zone {
            display: flex;
        }

        .grid-header-cell {
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-color);
            background: #111827;
        }

        /* 행 데이터 디자인 */
        .task-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            position: relative;
        }
        .task-row.completed { opacity: 0.4; }
        .task-row.dragging { opacity: 0.5; background: #334155; }

        /* 좌측 컨트롤 영역 (고정 스트리밍 마운트) */
        .task-left-panel {
            width: 400px;
            min-width: 400px;
            padding: 8px 12px;
            border-right: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e293b;
            position: sticky;
            left: 0;
            z-index: 15;
        }

        .drag-handle {
            cursor: grab;
            color: var(--text-muted);
            font-size: 1.1rem;
            padding: 0 4px;
        }

        .toggle-arrow {
            cursor: pointer;
            width: 16px;
            text-align: center;
            color: var(--accent-color);
            font-size: 0.8rem;
        }

        .task-name-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            font-size: 0.85rem;
            font-weight: 500;
            flex: 1;
            padding: 3px 5px;
            border-radius: 4px;
        }
        .task-name-input:focus {
            background: #0f172a;
            border-color: var(--primary-color);
            outline: none;
        }

        /* 수치 직접 입력란 */
        .cell-range-inputs {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .cell-range-inputs input {
            width: 34px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            color: white;
            text-align: center;
            border-radius: 4px;
            padding: 2px 0;
        }

        /* 타임라인 바 우측 그리드 메인 트랙 */
        .task-right-track {
            position: relative;
            display: flex;
            background: #0f172a;
        }

        .track-grid-unit {
            border-right: 1px dashed rgba(51, 65, 85, 0.3);
            height: 100%;
            height: 52px;
        }

        /* 드래그 인디케이터 바 */
        .time-bar-element {
            position: absolute;
            height: 32px;
            top: 10px;
            background: linear-gradient(90deg, #f59e0b, #d97706);
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: grab;
            touch-action: none;
        }

        .bar-label {
            flex: 1;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding: 0 4px;
        }

        .resizer {
            width: 8px;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            cursor: ew-resize;
        }
        .resizer.left { border-top-left-radius: 6px; border-bottom-left-radius: 6px; }
        .resizer.right { border-top-right-radius: 6px; border-bottom-right-radius: 6px; }

        /* 실시간 오늘/현재 인디케이터 라인 */
        .live-marker-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--danger-color);
            z-index: 10;
            pointer-events: none;
        }

        /* 보관함 */
        .archive-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
        }
    </style>
</head>
<body>

    <!-- 상단 헤더 영역 -->
    <header>
        <div class="title-container">
            <input type="text" id="main-title" class="title-input" value="🎬 On-Set Tracker (촬영 마스터 플랜)" disabled>
            <button id="lock-btn" class="lock-btn" onclick="toggleTitleLock()">🔒 수정</button>
        </div>
        <div class="control-panel">
            <button onclick="addNewProjectRow(null)">➕ 최상위 항목 추가</button>
            <button class="secondary" onclick="resetAllData()">🔄 전체 초기화</button>
        </div>
    </header>

    <!-- 세팅 및 뷰 가젯 콘솔 -->
    <div class="settings-bar">
        <div class="flex-group">
            <label>📅 <strong>타임라인 모드:</strong></label>
            <select id="view-mode-select" onchange="changeViewMode(this.value)">
                <option value="hour">시간 단위 뷰 (24시간)</option>
                <option value="day">일 단위 뷰 (1일 ~ 31일)</option>
                <option value="month">월 단위 뷰 (1월 ~ 12월)</option>
                <option value="year">년 단위 뷰 (5개년 계획)</option>
            </select>
        </div>

        <div class="flex-group">
            <label>⚙️ 정렬 설정:</label>
            <select id="sort-mode-select" onchange="changeSortMode(this.value)">
                <option value="auto">⚡ 자동 스마트 정렬 모드</option>
                <option value="manual">☰ 사용자 커스텀 드래그 정렬</option>
            </select>
        </div>

        <div class="flex-group">
            <span>🔍 <strong>그리드 줌 조절:</strong></span>
            <button class="secondary" onclick="adjustZoom(-10)">➖ 축소</button>
            <button class="secondary" onclick="adjustZoom(10)">➕ 확대</button>
        </div>
    </div>

    <!-- 메인 가로 스크롤 타임라인 보드 -->
    <div class="timeline-board">
        <div class="timeline-container-scroll" id="scroll-wrapper">
            <div class="timeline-table" id="timeline-main-table">
                
                <!-- 상단 타이밍 스케일 헤더 헤드 -->
                <div class="table-header" id="render-header-row">
                    <!-- JS 동적 주입 -->
                </div>

                <!-- 렌더링 컨테이너 트랙 -->
                <div id="dynamic-rows-container">
                    <!-- JS 동적 주입 -->
                </div>

                <!-- 현재 지점 추적 세로 마커 -->
                <div class="live-marker-line" id="live-timeline-marker"></div>

            </div>
        </div>
    </div>

    <!-- 보관 영역 정보 -->
    <div class="archive-box">
        <span style="font-size: 0.85rem; color: var(--text-muted);">
            💡 <strong>커스텀 가이드:</strong> 각 항목의 <code>시작</code> / <code>종료</code> 칸 숫자를 직접 수정해도 인디케이터에 즉시 반영됩니다. 항목들을 계층 구조로 폴더처럼 접고 펼쳐 관리하세요.
        </span>
    </div>

    <script>
        // 기본 초기 데이터셋 구조
        const initialTemplate = [
            { id: "t1", name: "1단계: 사전 프로덕션 기획", start: 2, end: 12, parentId: null, completed: false, open: true },
            { id: "t2", name: "콘셉트 미팅 및 시나리오 확정", start: 2, end: 6, parentId: "t1", completed: false, open: true },
            { id: "t3", name: "2단계: 메인 촬영 일정", start: 12, end: 30, parentId: null, completed: false, open: true },
            { id: "t4", name: "A캠 메인 드라마 촬영", start: 12, end: 20, parentId: "t3", completed: false, open: true }
        ];

        let projectTasks = [];
        let viewMode = 'hour'; // hour, day, month, year
        let sortMode = 'auto'; // auto, manual
        let cellWidth = 50;    // 1칸의 기본 가로폭 픽셀수 (Zoom 데이터)
        let totalGridCount = 24; // 모드별 총 칸수 개수 기본 배치

        // 드래그 상태 관리 변수
        let currentDragBarId = null;
        let dragType = null; // 'move', 'left', 'right'
        let dragStartX = 0;
        let dragStartLeftCell = 0;
        let dragStartEndCell = 0;

        // 수동 행 순서 변경용 변수
        let rowDragSourceId = null;

        // 💾 1. 초기 데이터 불러오기
        function init() {
            const savedData = localStorage.getItem('pm_project_tasks');
            const savedTitle = localStorage.getItem('pm_project_title');
            const savedMode = localStorage.getItem('pm_view_mode');
            const savedSort = localStorage.getItem('pm_sort_mode');

            if (savedData) projectTasks = JSON.parse(savedData);
            else projectTasks = JSON.parse(JSON.stringify(initialTemplate));

            if (savedTitle) document.getElementById('main-title').value = savedTitle;
            if (savedMode) { viewMode = savedMode; document.getElementById('view-mode-select').value = savedMode; }
            if (savedSort) { sortMode = savedSort; document.getElementById('sort-mode-select').value = savedSort; }

            configureGridUnits();
            renderAll();
        }

        function saveData() {
            localStorage.setItem('pm_project_tasks', JSON.stringify(projectTasks));
            localStorage.setItem('pm_project_title', document.getElementById('main-title').value);
            localStorage.setItem('pm_view_mode', viewMode);
            localStorage.setItem('pm_sort_mode', sortMode);
        }

        // 🔒 제목 수정 및 잠금 토글
        function toggleTitleLock() {
            const titleInput = document.getElementById('main-title');
            const lockBtn = document.getElementById('lock-btn');
            if (titleInput.disabled) {
                titleInput.disabled = false;
                titleInput.focus();
                lockBtn.innerText = "🔓 저장";
            } else {
                titleInput.disabled = true;
                lockBtn.innerText = "🔒 수정";
                saveData();
            }
        }

        // ⚙️ 모드 체인저 설정 규칙 정의
        function configureGridUnits() {
            if (viewMode === 'hour') totalGridCount = 24;      // 24시간
            else if (viewMode === 'day') totalGridCount = 31;   // 31일
            else if (viewMode === 'month') totalGridCount = 12; // 12개월
            else if (viewMode === 'year') totalGridCount = 5;   // 5개년
        }

        function changeViewMode(mode) {
            viewMode = mode;
            configureGridUnits();
            // 모드 전환 시 인디케이터가 화면 범위를 초과하는 것 가드 처리
            projectTasks.forEach(t => {
                if(t.end > totalGridCount) t.end = totalGridCount;
                if(t.start >= totalGridCount) t.start = Math.max(0, totalGridCount - 2);
            });
            saveData();
            renderAll();
        }

        function changeSortMode(mode) {
            sortMode = mode;
            saveData();
            renderAll();
        }

        function adjustZoom(amount) {
            cellWidth = Math.max(25, Math.min(150, cellWidth + amount));
            renderAll();
        }

        function resetAllData() {
            if(confirm("모든 기획 데이터와 커스텀 설정을 초기화하고 처음 상태로 복구할까요?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // 🛠️ 2. 구조화 정렬 트랙 헬퍼 엔진
        function getSortedTasks() {
            if (sortMode === 'manual') {
                // 수동 정렬일 때는 트리 계층만 유지한 채 사용자가 섞은 원본 리스트 순서 가공 배치
                return buildTreeStructure(projectTasks);
            } else {
                // 자동 모드: 상위 수준 정렬(시작점이 빠르고 길이가 짧은 것 위주 정렬) 후 트리 조립
                const roots = projectTasks.filter(t => !t.parentId);
                roots.sort((a,b) => a.start - b.start || (a.end - a.start) - (b.end - b.start));
                
                let result = [];
                roots.forEach(root => {
                    result.push(root);
                    const children = projectTasks.filter(t => t.parentId === root.id);
                    children.sort((a,b) => a.start - b.start || (a.end - a.start) - (b.end - b.start));
                    result.push(...children);
                });
                return buildTreeStructure(result);
            }
        }

        function buildTreeStructure(flatList) {
            // 트리 렌더링 시 숨겨진 부모 자식 예외처리 필터링용 마킹 적용
            let renderedList = [];
            let hiddenSet = new Set();

            // 부모 숨김 상태 체크
            flatList.forEach(t => {
                if (t.parentId && (hiddenSet.has(t.parentId) || !isParentOpen(t.parentId, flatList))) {
                    hiddenSet.add(t.id);
                }
            });

            return flatList.filter(t => !hiddenSet.has(t.id));
        }

        function isParentOpen(parentId, list) {
            const parent = list.find(t => t.id === parentId);
            if (!parent) return true;
            if (!parent.open) return false;
            if (parent.parentId) return isParentOpen(parent.parentId, list);
            return true;
        }

        // 🎨 3. 렌더링 마스터 엔진 (Core)
        function renderAll() {
            renderHeader();
            renderRows();
            updateLiveMarker();
        }

        function renderHeader() {
            const headerRow = document.getElementById('render-header-row');
            headerRow.innerHTML = `<div class="header-frozen-zone">분류 및 진행 단계 목록</div>`;

            const gridZone = document.createElement('div');
            gridZone.className = 'header-grid-zone';

            for (let i = 0; i < totalGridCount; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-header-cell';
                cell.style.width = `${cellWidth}px`;
                cell.innerText = getHeaderLabel(i);
                gridZone.appendChild(cell);
            }
            headerRow.appendChild(gridZone);
        }

        function getHeaderLabel(index) {
            if (viewMode === 'hour') return `${index}시`;
            if (viewMode === 'day') return `${index + 1}일`;
            if (viewMode === 'month') return `${index + 1}월`;
            if (viewMode === 'year') return `${2026 + index}년`;
            return index;
        }

        function renderRows() {
            const container = document.getElementById('dynamic-rows-container');
            container.innerHTML = '';

            const activeList = getSortedTasks();

            activeList.forEach((task, index) => {
                const row = document.createElement('div');
                row.className = `task-row ${task.completed ? 'completed' : ''}`;
                row.dataset.id = task.id;

                // 수동 위치 변경용 행 드래그 이벤트
                if (sortMode === 'manual') {
                    row.draggable = true;
                    row.addEventListener('dragstart', (e) => { rowDragSourceId = task.id; row.classList.add('dragging'); });
                    row.addEventListener('dragover', (e) => e.preventDefault());
                    row.addEventListener('drop', (e) => {
                        e.preventDefault();
                        handleRowDrop(task.id);
                    });
                    row.addEventListener('dragend', () => row.classList.remove('dragging'));
                }

                // 1. 좌측 정보 컨트롤 패널
                const leftPanel = document.createElement('div');
                leftPanel.className = 'task-left-panel';
                // 하위 레이어일 때 들여쓰기 시각 효과 디자인
                if (task.parentId) {
                    leftPanel.style.paddingLeft = '30px';
                }

                // 드래그 핸들 (수동 정렬 시에만 노출)
                if (sortMode === 'manual') {
                    const handle = document.createElement('div');
                    handle.className = 'drag-handle';
                    handle.innerText = '☰';
                    leftPanel.appendChild(handle);
                }

                // 아코디언 토글 화살표 (자식이 있는 경우만 처리)
                const hasChild = projectTasks.some(t => t.parentId === task.id);
                const arrow = document.createElement('div');
                arrow.className = 'toggle-arrow';
                arrow.innerText = hasChild ? (task.open ? '▼' : '▶') : '•';
                arrow.onclick = () => {
                    if (hasChild) {
                        task.open = !task.open;
                        saveData();
                        renderAll();
                    }
                };
                leftPanel.appendChild(arrow);

                // 완료 체크 박스
                const chk = document.createElement('button');
                chk.className = 'btn-check';
                chk.style.width = '20px'; chk.style.height = '20px'; chk.style.borderRadius = '50%';
                chk.style.border = '2px solid #64748b'; chk.style.background = task.completed ? 'var(--success-color)' : 'transparent';
                chk.innerText = task.completed ? '✓' : '';
                chk.onclick = () => {
                    task.completed = !task.completed;
                    saveData();
                    renderAll();
                };
                leftPanel.appendChild(chk);

                // 명칭 입력 인풋
                const inputName = document.createElement('input');
                inputName.className = 'task-name-input';
                inputName.value = task.name;
                inputName.onchange = (e) => { task.name = e.target.value; saveData(); };
                leftPanel.appendChild(inputName);

                // [추가 기능] 수치 직접 입력 가젯 상자
                const rangeBox = document.createElement('div');
                rangeBox.className = 'cell-range-inputs';
                rangeBox.innerHTML = `
                    <input type="number" min="0" max="${totalGridCount}" value="${task.start}" onchange="updateTaskRange('${task.id}', 'start', this.value)">
                    <span>~</span>
                    <input type="number" min="1" max="${totalGridCount}" value="${task.end}" onchange="updateTaskRange('${task.id}', 'end', this.value)">
                `;
                leftPanel.appendChild(rangeBox);

                // 하위 단계 추가 및 삭제 버튼 액션 제어기
                if (!task.parentId) {
                    const btnAddSub = document.createElement('button');
                    btnAddSub.className = 'secondary';
                    btnAddSub.style.padding = '3px 6px'; btnAddSub.style.fontSize = '0.7rem';
                    btnAddSub.innerText = '📁 +';
                    btnAddSub.title = '하위 자식 업무 단계를 개설합니다';
                    btnAddSub.onclick = () => addNewProjectRow(task.id);
                    leftPanel.appendChild(btnAddSub);
                }

                const btnDel = document.createElement('button');
                btnDel.className = 'danger';
                btnDel.style.padding = '3px 6px'; btnDel.style.fontSize = '0.7rem'; btnDel.innerText = '✕';
                btnDel.onclick = () => deleteProjectRow(task.id);
                leftPanel.appendChild(btnDel);

                row.appendChild(leftPanel);

                // 2. 우측 타임라인 인디케이터 트랙 채우기
                const rightTrack = document.createElement('div');
                rightTrack.className = 'task-right-track';
                rightTrack.style.width = `${cellWidth * totalGridCount}px`;

                for (let i = 0; i < totalGridCount; i++) {
                    const unit = document.createElement('div');
                    unit.className = 'track-grid-unit';
                    unit.style.width = `${cellWidth}px`;
                    rightTrack.appendChild(unit);
                }

                // 실제 주황 바 장착
                const bar = document.createElement('div');
                bar.className = 'time-bar-element';
                
                const leftPos = task.start * cellWidth;
                const barWidth = (task.end - task.start) * cellWidth;
                bar.style.left = `${leftPos}px`;
                bar.style.width = `${barWidth}px`;

                // 조절부 레고 조립
                const handleL = document.createElement('div'); handleL.className = 'resizer left';
                const label = document.createElement('div'); label.className = 'bar-label'; label.innerText = task.name || '이름 없음';
                const handleR = document.createElement('div'); handleR.className = 'resizer right';

                bar.appendChild(handleL);
                bar.appendChild(label);
                bar.appendChild(handleR);

                // 마우스/터치 바 컨트롤 어태치먼트
                handleL.addEventListener('mousedown', (e) => { e.stopPropagation(); initBarDrag(task.id, 'left', e.clientX); });
                handleR.addEventListener('mousedown', (e) => { e.stopPropagation(); initBarDrag(task.id, 'right', e.clientX); });
                label.addEventListener('mousedown', (e) => { e.stopPropagation(); initBarDrag(task.id, 'move', e.clientX); });

                rightTrack.appendChild(bar);
                row.appendChild(rightTrack);
                container.appendChild(row);
            });
        }

        // 🔢 수치 직접 변경 파서
        function updateTaskRange(id, field, val) {
            const task = projectTasks.find(t => t.id === id);
            if (!task) return;
            let num = parseInt(val, 10);
            if (isNaN(num)) return;

            if (field === 'start') {
                if (num >= 0 && num < task.end) task.start = num;
            } else {
                if (num > task.start && num <= totalGridCount) task.end = num;
            }
            saveData();
            renderAll();
        }

        // 🏗️ 4. 인터랙티브 마우스 드래그 핸들링 제어 장치
        function initBarDrag(id, type, clientX) {
            currentDragBarId = id;
            dragType = type;
            dragStartX = clientX;

            const task = projectTasks.find(t => t.id === id);
            dragStartLeftCell = task.start;
            dragStartEndCell = task.end;

            document.addEventListener('mousemove', onBarDragMove);
            document.addEventListener('mouseup', endBarDrag);
        }

        function onBarDragMove(e) {
            if (!currentDragBarId) return;
            const task = projectTasks.find(t => t.id === currentDragBarId);
            
            const deltaX = e.clientX - dragStartX;
            const cellDelta = Math.round(deltaX / cellWidth);

            if (dragType === 'move') {
                let ns = dragStartLeftCell + cellDelta;
                let ne = dragStartEndCell + cellDelta;
                if (ns >= 0 && ne <= totalGridCount) {
                    task.start = ns;
                    task.end = ne;
                }
            } else if (dragType === 'left') {
                let ns = dragStartLeftCell + cellDelta;
                if (ns >= 0 && ns < task.end) task.start = ns;
            } else if (dragType === 'right') {
                let ne = dragStartEndCell + cellDelta;
                if (ne > task.start && ne <= totalGridCount) task.end = ne;
            }
            renderAll();
        }

        function endBarDrag() {
            currentDragBarId = null;
            document.removeEventListener('mousemove', onBarDragMove);
            document.removeEventListener('mouseup', endBarDrag);
            saveData();
        }

        // ☰ 수동 행 순서 변경 로직 (정렬 교체 연산)
        function handleRowDrop(targetId) {
            if (!rowDragSourceId || rowDragSourceId === targetId) return;

            const sourceIdx = projectTasks.findIndex(t => t.id === rowDragSourceId);
            const targetIdx = projectTasks.findIndex(t => t.id === targetId);
            
            if (sourceIdx !== -1 && targetIdx !== -1) {
                // 배열 순서 스왑 연산 가공 처리
                const [removed] = projectTasks.splice(sourceIdx, 1);
                projectTasks.splice(targetIdx, 0, removed);
                saveData();
                renderAll();
            }
        }

        // ➕ 행 생성 및 제어 로직들
        function addNewProjectRow(parentId = null) {
            const nextId = "t_" + Date.now();
            projectTasks.push({
                id: nextId,
                name: parentId ? "↳ 하위 세부 단계 과업 명칭" : "새 마스터 비즈니스 대분류 항목",
                start: 0,
                end: 4,
                parentId: parentId,
                completed: false,
                open: true
            });
            saveData();
            renderAll();
        }

        function deleteProjectRow(id) {
            if(confirm("이 항목을 삭제할까요? (자식 하위 단계가 있다면 함께 삭제됩니다)")) {
                projectTasks = projectTasks.filter(t => t.id !== id && t.parentId !== id);
                saveData();
                renderAll();
            }
        }

        // 🚨 5. 실시간 동적 타임라인 트래커 라인 매칭 가젯
        function updateLiveMarker() {
            const now = new Date();
            const marker = document.getElementById('live-timeline-marker');
            let matchedCellIndex = -1;

            if (viewMode === 'hour') {
                // 시간축: 0~24시간 인덱스 대입
                matchedCellIndex = now.getHours() + (now.getMinutes() / 60);
            } else if (viewMode === 'day') {
                // 일별축: 1~31일 인덱스 대입 (0부터 매칭하기 위해 -1 가공)
                matchedCellIndex = (now.getDate() - 1) + (now.getHours() / 24);
            } else if (viewMode === 'month') {
                // 월별축: 1~12월 인덱스 대입
                matchedCellIndex = now.getMonth() + (now.getDate() / 30);
            } else if (viewMode === 'year') {
                // 년별축: 2026년 기준 5개년 트랙킹 가공
                const baseYear = 2026;
                matchedCellIndex = (now.getFullYear() - baseYear) + (now.getMonth() / 12);
            }

            if (matchedCellIndex >= 0 && matchedCellIndex <= totalGridCount) {
                const finalLeftPx = 400 + (matchedCellIndex * cellWidth); // 고정폭 400px 가중치 합산
                marker.style.left = `${finalLeftPx}px`;
                marker.style.display = 'block';
            } else {
                marker.style.display = 'none';
            }
        }

        // 실시간 인디케이터 실시간 리프레시 엔진 구동
        setInterval(updateLiveMarker, 5000);

        // 첫 페이지 로드 및 하트비트 시동
        window.onload = init;
    </script>
</body>
</html>
